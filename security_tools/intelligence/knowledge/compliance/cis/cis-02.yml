description: "02\nInventory and Control of Software Assets\nActively manage (inventory,\
  \ track, and correct) all software (operating systems and applications) on the network\
  \ so that only authorized software \nis installed and can execute, and that unauthorized\
  \ and unmanaged software is found and prevented from installation or execution.\n\
  2.1\nEstablish and Maintain a Software Inventory\nApplications\n-Identify-\n• •\
  \ •\nEstablish and maintain a detailed inventory of all licensed software installed\
  \ on enterprise assets. The software inventory must document \nthe title, publisher,\
  \ initial install/use date, and business purpose for each entry; where appropriate,\
  \ include the Uniform Resource Locator \n(URL), app store(s), version(s), deployment\
  \ mechanism, and decommission date. Review and update the software inventory bi-annually,\
  \ \nor more frequently.\n2.2\nEnsure Authorized Software is Currently Supported\
  \ \nApplications\n-Identify-\n• • •\nEnsure that only currently supported software\
  \ is designated as authorized in the software inventory for enterprise assets. If\
  \ software \nis unsupported, yet necessary for the fulfillment of the enterprise’s\
  \ mission, document an exception detailing mitigating controls and \nresidual risk\
  \ acceptance. For any unsupported software without an exception documentation, designate\
  \ as unauthorized. Review the \nsoftware list to verify software support at least\
  \ monthly, or more frequently.\n2.3\nAddress Unauthorized Software\nApplications\n\
  -Respond-\n• • •\nEnsure that unauthorized software is either removed from use on\
  \ enterprise assets or receives a documented exception. Review monthly, \nor more\
  \ frequently.\n\nCIS Controls v8\nA5 \n\uFEFFControls and Safeguards Index\nControl\
  \ 02 / Safeguard 2.4 — Control 03 / Safeguard 3.9\nCONTROL\nSAFEGUARD\nNUMBER\n\
  TITLE/ \nDESCRIPTION\nASSET TYPE\nSECURITY FUNCTION\nIG1\nIG2\nIG3\n2.4\nUtilize\
  \ Automated Software Inventory Tools\nApplications\n-Detect-\n• •\nUtilize software\
  \ inventory tools, when possible, throughout the enterprise to automate the discovery\
  \ and documentation of \ninstalled software. \n2.5\nAllowlist Authorized Software\n\
  Applications\n-Protect-\n• •\nUse technical controls, such as application allowlisting,\
  \ to ensure that only authorized software can execute or be accessed. \nReassess bi-annually,\
  \ or more frequently.\n2.6\nAllowlist Authorized Libraries\nApplications\n-Protect-\n\
  • •\nUse technical controls to ensure that only authorized software libraries, such\
  \ as specific .dll, .ocx, .so, etc., files are allowed to load into a \nsystem process.\
  \ Block unauthorized libraries from loading into a system process. Reassess bi-annually,\
  \ or more frequently.\n2.7\nAllowlist Authorized Scripts\nApplications\n-Protect-\n\
  •\nUse technical controls, such as digital signatures and version control, to ensure\
  \ that only authorized scripts, such as specific .ps1, .py, etc., \nfiles are allowed\
  \ to execute. Block unauthorized scripts from executing. Reassess bi-annually, or\
  \ more frequently."
