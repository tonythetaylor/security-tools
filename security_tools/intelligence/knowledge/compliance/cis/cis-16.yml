description: "16 \nApplication Software Security\nManage the security life cycle of\
  \ in-house developed, hosted, or acquired software to prevent, detect, and remediate\
  \ security weaknesses before \nthey can impact the enterprise.\n16.1\nEstablish\
  \ and Maintain a Secure Application Development Process\nApplications\n-Protect-\n\
  • •\nEstablish and maintain a secure application development process. In the process,\
  \ address such items as: secure application design \nstandards, secure coding practices,\
  \ developer training, vulnerability management, security of third-party code, and\
  \ application security \ntesting procedures. Review and update documentation annually,\
  \ or when significant enterprise changes occur that could impact \nthis Safeguard.\n\
  16.2\nEstablish and Maintain a Process to Accept and Address Software Vulnerabilities\n\
  Applications\n-Protect-\n• •\nEstablish and maintain a process to accept and address\
  \ reports of software vulnerabilities, including providing a means for external\
  \ \nentities to report. The process is to include such items as: a vulnerability\
  \ handling policy that identifies reporting process, responsible \nparty for handling\
  \ vulnerability reports, and a process for intake, assignment, remediation, and\
  \ remediation testing. As part of the \nprocess, use a vulnerability tracking system\
  \ that includes severity ratings, and metrics for measuring timing for identification,\
  \ analysis, \nand remediation of vulnerabilities. Review and update documentation\
  \ annually, or when significant enterprise changes occur that could \nimpact this\
  \ Safeguard. \nThird-party application developers need to consider this an externally-facing\
  \ policy that helps to set expectations for outside \nstakeholders. \n16.3\nPerform\
  \ Root Cause Analysis on Security Vulnerabilities\nApplications\n-Protect-\n• •\n\
  Perform root cause analysis on security vulnerabilities. When reviewing vulnerabilities,\
  \ root cause analysis is the task of evaluating \nunderlying issues that create\
  \ vulnerabilities in code, and allows development teams to move beyond just fixing\
  \ individual vulnerabilities \nas they arise.\n16.4\nEstablish and Manage an Inventory\
  \ of Third-Party Software Components\nApplications\n-Protect-\n• •\nEstablish and\
  \ manage an updated inventory of third-party components used in development, often\
  \ referred to as a “bill of materials,” as \nwell as components slated for future\
  \ use. This inventory is to include any risks that each third-party component could\
  \ pose. Evaluate the \nlist at least monthly to identify any changes or updates\
  \ to these components, and validate that the component is still supported. \n16.5\n\
  Use Up-to-Date and Trusted Third-Party Software Components\nApplications\n-Protect-\n\
  • •\nUse up-to-date and trusted third-party software components. When possible,\
  \ choose established and proven frameworks and libraries \nthat provide adequate\
  \ security. Acquire these components from trusted sources or evaluate the software\
  \ for vulnerabilities before use.\n16.6\nEstablish and Maintain a Severity Rating\
  \ System and Process for Application \nVulnerabilities\nApplications\n-Protect-\n\
  • •\nEstablish and maintain a severity rating system and process for application\
  \ vulnerabilities that facilitates prioritizing the order in \nwhich discovered\
  \ vulnerabilities are fixed. This process includes setting a minimum level of security\
  \ acceptability for releasing code or \napplications. Severity ratings bring a systematic\
  \ way of triaging vulnerabilities that improves risk management and helps ensure\
  \ the most \nsevere bugs are fixed first. Review and update the system and process\
  \ annually.\n16.7\nUse Standard Hardening Configuration Templates for Application\
  \ Infrastructure\nApplications\n-Protect-\n• •\nUse standard, industry-recommended\
  \ hardening configuration templates for application infrastructure components. This\
  \ includes \nunderlying servers, databases, and web servers, and applies to cloud\
  \ containers, Platform as a Service (PaaS) components, and SaaS \ncomponents. Do\
  \ not allow in-house developed software to weaken configuration hardening"
