description: "11\nData Recovery\nEstablish and maintain data recovery practices sufficient\
  \ to restore in-scope enterprise assets to a pre-incident and trusted state.\n11.1\n\
  Establish and Maintain a Data Recovery Process \nData\n-Recover-\n• • •\nEstablish\
  \ and maintain a data recovery process. In the process, address the scope of data\
  \ recovery activities, recovery prioritization, and \nthe security of backup data.\
  \ Review and update documentation annually, or when significant enterprise changes\
  \ occur that could impact \nthis Safeguard. \n11.2\nPerform Automated Backups \n\
  Data\n-Recover-\n• • •\nPerform automated backups of in-scope enterprise assets.\
  \ Run backups weekly, or more frequently, based on the sensitivity of the data.\n\
  11.3\nProtect Recovery Data\nData\n-Protect-\n• • •\nProtect recovery data with\
  \ equivalent controls to the original data. Reference encryption or data separation,\
  \ based on requirements.\n11.4\nEstablish and Maintain an Isolated Instance of Recovery\
  \ Data \nData\n-Recover-\n• • •\nEstablish and maintain an isolated instance of\
  \ recovery data. Example implementations include, version controlling backup destinations\
  \ \nthrough offline, cloud, or off-site systems or services.\n11.5\nTest Data Recovery\n\
  Data\n-Recover-\n• •\nTest backup recovery quarterly, or more frequently, for a\
  \ sampling of in-scope enterprise assets."
