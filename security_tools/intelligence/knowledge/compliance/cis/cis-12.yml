description: "12\nNetwork Infrastructure Management\nEstablish, implement, and actively\
  \ manage (track, report, correct) network devices, in order to prevent attackers\
  \ from exploiting vulnerable \nnetwork services and access points.\n12.1\nEnsure\
  \ Network Infrastructure is Up-to-Date\nNetwork\n-Protect-\n• • •\nEnsure network\
  \ infrastructure is kept up-to-date. Example implementations include running the\
  \ latest stable release of software and/\nor using currently supported network-as-a-service\
  \ (NaaS) offerings. Review software versions monthly, or more frequently, to verify\
  \ \nsoftware support.\n12.2\nEstablish and Maintain a Secure Network Architecture\n\
  Network\n-Protect-\n• •\nEstablish and maintain a secure network architecture. A\
  \ secure network architecture must address segmentation, least privilege, and \n\
  availability, at a minimum.\n12.3\nSecurely Manage Network Infrastructure\nNetwork\n\
  -Protect-\n• •\nSecurely manage network infrastructure. Example implementations\
  \ include version-controlled-infrastructure-as-code, and the use of \nsecure network\
  \ protocols, such as SSH and HTTPS. \n12.4\nEstablish and Maintain Architecture\
  \ Diagram(s)\nNetwork\n-Identify-\n• •\nEstablish and maintain architecture diagram(s)\
  \ and/or other network system documentation. Review and update documentation \n\
  annually, or when significant enterprise changes occur that could impact this Safeguard.\n\
  12.5\nCentralize Network Authentication, Authorization, and Auditing (AAA)\nNetwork\n\
  -Protect-\n• •\nCentralize network AAA.\n12.6\nUse of Secure Network Management\
  \ and Communication Protocols \nNetwork\n-Protect-\n• •\nUse secure network management\
  \ and communication protocols (e.g., 802.1X, Wi-Fi Protected Access 2 (WPA2) Enterprise\
  \ or greater).\n12.7\nEnsure Remote Devices Utilize a VPN and are Connecting to\
  \ an Enterprise’s AAA \nInfrastructure\nDevices\n-Protect-\n• •\nRequire users to\
  \ authenticate to enterprise-managed VPN and authentication services prior to accessing\
  \ enterprise resources on end-\nuser devices.\n12.8\nEstablish and Maintain Dedicated\
  \ Computing Resources for All Administrative Work\nDevices\n-Protect-\n•\nEstablish\
  \ and maintain dedicated computing resources, either physically or logically separated,\
  \ for all administrative tasks or tasks \nrequiring administrative access. The computing\
  \ resources should be segmented from the enterprise’s primary network and not be\
  \ \nallowed internet access.\n\nCIS Controls v8\nA12 \n\uFEFFControls and Safeguards\
  \ Index\nControl 13 / Safeguard 13.1 — Control 14 / Safeguard 14.2\nCONTROL\nSAFEGUARD\n\
  NUMBER\nTITLE/ \nDESCRIPTION\nASSET TYPE\nSECURITY FUNCTION\nIG1\nIG2\nIG3"
