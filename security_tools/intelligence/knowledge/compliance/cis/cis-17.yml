description: "17\nIncident Response Management\nEstablish a program to develop and\
  \ maintain an incident response capability (e.g., policies, plans, procedures, defined\
  \ roles, training, and \ncommunications) to prepare, detect, and quickly respond\
  \ to an attack.\n17.1\nDesignate Personnel to Manage Incident Handling\nN/A\n-Respond-\n\
  • • •\nDesignate one key person, and at least one backup, who will manage the enterprise’s\
  \ incident handling process. Management personnel \nare responsible for the coordination\
  \ and documentation of incident response and recovery efforts and can consist of\
  \ employees \ninternal to the enterprise, third-party vendors, or a hybrid approach.\
  \ If using a third-party vendor, designate at least one person internal \nto the\
  \ enterprise to oversee any third-party work. Review annually, or when significant\
  \ enterprise changes occur that could impact \nthis Safeguard.\n17.2\nEstablish\
  \ and Maintain Contact Information for Reporting Security Incidents\nN/A\n-Respond-\n\
  • • •\nEstablish and maintain contact information for parties that need to be informed\
  \ of security incidents. Contacts may include internal \nstaff, third-party vendors,\
  \ law enforcement, cyber insurance providers, relevant government agencies, Information\
  \ Sharing and Analysis \nCenter (ISAC) partners, or other stakeholders. Verify contacts\
  \ annually to ensure that information is up-to-date.\n17.3\nEstablish and Maintain\
  \ an Enterprise Process for Reporting Incidents\nN/A\n-Respond-\n• • •\nEstablish\
  \ and maintain an enterprise process for the workforce to report security incidents.\
  \ The process includes reporting timeframe, \npersonnel to report to, mechanism\
  \ for reporting, and the minimum information to be reported. Ensure the process\
  \ is publicly available to \nall of the workforce. Review annually, or when significant\
  \ enterprise changes occur that could impact this Safeguard.\n17.4\nEstablish and\
  \ Maintain an Incident Response Process\nN/A\n-Respond-\n• •\nEstablish and maintain\
  \ an incident response process that addresses roles and responsibilities, compliance\
  \ requirements, and a \ncommunication plan. Review annually, or when significant\
  \ enterprise changes occur that could impact this Safeguard.\n\nCIS Controls v8\n\
  A16 \n\uFEFFControls and Safeguards Index\nControl 17 / Safeguard 17.5 — Control\
  \ 18 / Safeguard 18.5\nCONTROL\nSAFEGUARD\nNUMBER\nTITLE/ \nDESCRIPTION\nASSET TYPE\n\
  SECURITY FUNCTION\nIG1\nIG2\nIG3\n17.5\nAssign Key Roles and Responsibilities\n\
  N/A\n-Respond-\n• •\nAssign key roles and responsibilities for incident response,\
  \ including staff from legal, IT, information security, facilities, public relations,\
  \ \nhuman resources, incident responders, and analysts, as applicable. Review annually,\
  \ or when significant enterprise changes occur that \ncould impact this Safeguard.\n\
  17.6\nDefine Mechanisms for Communicating During Incident Response\nN/A\n-Respond-\n\
  • •\nDetermine which primary and secondary mechanisms will be used to communicate\
  \ and report during a security incident. Mechanisms \ncan include phone calls, emails,\
  \ or letters. Keep in mind that certain mechanisms, such as emails, can be affected\
  \ during a security \nincident. Review annually, or when significant enterprise\
  \ changes occur that could impact this Safeguard.\n17.7\nConduct Routine Incident\
  \ Response Exercises\nN/A\n-Recover-\n• •\nPlan and conduct routine incident response\
  \ exercises and scenarios for key personnel involved in the incident response process\
  \ to \nprepare for responding to real-world incidents. Exercises need to test communication\
  \ channels, decision making, and workflows. \nConduct testing on an annual basis,\
  \ at a minimum.\n17.8\nConduct Post-Incident Reviews\nN/A\n-Recover-\n• •\nConduct\
  \ post-incident reviews. Post-incident reviews help prevent incident recurrence\
  \ through identifying lessons learned and \nfollow-up action.\n17.9\nEstablish and\
  \ Maintain Security Incident Thresholds\nN/A\n-Recover-\n•\nEstablish and maintain\
  \ security incident thresholds, including, at a minimum, differentiating between\
  \ an incident and an event. Examples \ncan include: abnormal activity, securit"
