description: "14\nSecurity Awareness and Skills Training\nEstablish and maintain a\
  \ security awareness program to influence behavior among the workforce to be security\
  \ conscious and properly skilled to \nreduce cybersecurity risks to the enterprise.\n\
  14.1\nEstablish and Maintain a Security Awareness Program\nN/A\n-Protect-\n• • •\n\
  Establish and maintain a security awareness program. The purpose of a security awareness\
  \ program is to educate the enterprise’s \nworkforce on how to interact with enterprise\
  \ assets and data in a secure manner. Conduct training at hire and, at a minimum,\
  \ annually. \nReview and update content annually, or when significant enterprise\
  \ changes occur that could impact this Safeguard.\n14.2\nTrain Workforce Members\
  \ to Recognize Social Engineering Attacks\nN/A\n-Protect-\n• • •\nTrain workforce\
  \ members to recognize social engineering attacks, such as phishing, pre-texting,\
  \ and tailgating.\n\nCIS Controls v8\nA13 \n\uFEFFControls and Safeguards Index\n\
  Control 14 / Safeguard 14.3 — Control 15 / Safeguard 15.4\nCONTROL\nSAFEGUARD\n\
  NUMBER\nTITLE/ \nDESCRIPTION\nASSET TYPE\nSECURITY FUNCTION\nIG1\nIG2\nIG3\n14.3\n\
  Train Workforce Members on Authentication Best Practices\nN/A\n-Protect-\n• • •\n\
  Train workforce members on authentication best practices. Example topics include\
  \ MFA, password composition, and \ncredential management.\n14.4\nTrain Workforce\
  \ on Data Handling Best Practices\nN/A\n-Protect-\n• • •\nTrain workforce members\
  \ on how to identify and properly store, transfer, archive, and destroy sensitive\
  \ data. This also includes training \nworkforce members on clear screen and desk\
  \ best practices, such as locking their screen when they step away from their enterprise\
  \ \nasset, erasing physical and virtual whiteboards at the end of meetings, and\
  \ storing data and assets securely.\n14.5\nTrain Workforce Members on Causes of\
  \ Unintentional Data Exposure\nN/A\n-Protect-\n• • •\nTrain workforce members to\
  \ be aware of causes for unintentional data exposure. Example topics include mis-delivery\
  \ of sensitive data, \nlosing a portable end-user device, or publishing data to\
  \ unintended audiences.\n14.6\nTrain Workforce Members on Recognizing and Reporting\
  \ Security Incidents\nN/A\n-Protect-\n• • •\nTrain workforce members to be able\
  \ to recognize a potential incident and be able to report such an incident. \n14.7\n\
  Train Workforce on How to Identify and Report if Their Enterprise Assets are Missing\
  \ \nSecurity Updates\nN/A\n-Protect-\n• • •\nTrain workforce to understand how to\
  \ verify and report out-of-date software patches or any failures in automated processes\
  \ and tools. \nPart of this training should include notifying IT personnel of any\
  \ failures in automated processes and tools.\n14.8\nTrain Workforce on the Dangers\
  \ of Connecting to and Transmitting Enterprise Data \nOver Insecure Networks\nN/A\n\
  -Protect-\n• • •\nTrain workforce members on the dangers of connecting to, and transmitting\
  \ data over, insecure networks for enterprise activities. \nIf the enterprise has\
  \ remote workers, training must include guidance to ensure that all users securely\
  \ configure their home network \ninfrastructure.\n14.9\nConduct Role-Specific Security\
  \ Awareness and Skills Training\nN/A\n-Protect-\n• •\nConduct role-specific security\
  \ awareness and skills training. Example implementations include secure system administration\
  \ courses for \nIT professionals, OWASP® Top 10 vulnerability awareness and prevention\
  \ training for web application developers, and advanced social \nengineering awareness\
  \ training for high-profile roles."
