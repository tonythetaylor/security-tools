severity_guidance: high
description: In addition to the re-authentication requirements associated with device
  locks, organizations may require re-authentication of individuals in certain situations,
  including when roles, authenticators or credentials change, when security categories
  of systems change, when the execution of privileged functions occurs, after a fixed
  time period, or periodically.
rationale: In addition to the re-authentication requirements associated with device
