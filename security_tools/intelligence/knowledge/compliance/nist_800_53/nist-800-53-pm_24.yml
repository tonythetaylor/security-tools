description: 'PM-24 DATA INTEGRITY BOARD requires: Review proposals to conduct or
  participate in a matching program; and; Conduct an annual review of all matching
  programs in which the agency has participated.'
rationale: A Data Integrity Board is the board of senior officials designated by the
  head of a federal agency and is responsible for, among other things, reviewing the
  agency’s proposals to conduct or participate in a matching program and conducting
  an annual review of all matching programs in which the agency has participated.
  As a general matter, a matching program is a computerized comparison of records
  from two or more automated [PRIVACT] systems of records or an automated system of
  records and automated records maintained by a non-federal agency (or agent thereof).
  A matching program either pertains to Federal benefit programs or Federal personnel
  or payroll records. At a minimum, the Data Integrity Board includes the Inspector
  General of the agency, if any, and the senior agency official for privacy.
developer_guidance: 'PM-24 DATA INTEGRITY BOARD is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Review proposals to conduct or participate in a matching program; and

  - Conduct an annual review of all matching programs in which the agency has participated'
