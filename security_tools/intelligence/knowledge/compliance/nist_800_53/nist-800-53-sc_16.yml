rationale: Security and privacy attributes can be explicitly or implicitly associated
  with the information contained in organizational systems or system components. Attributes
  are abstractions that represent the basic properties or characteristics of an entity
  with respect to protecting information or the management of personally identifiable
  information. Attributes are typically associated with internal data structures,
  including records, buffers, and files within the system. Security and privacy attributes
  are used to implement access control and information flow control policies; reflect
  special dissemination, management, or distribution instructions, including permitted
  uses of personally identifiable information; or support other aspects of the information
  security and privacy policies. Privacy attributes may be used independently or in
  conjunction with security attributes.
