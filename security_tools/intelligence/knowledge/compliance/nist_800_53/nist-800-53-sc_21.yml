rationale: Each client of name resolution services either performs this validation
  on its own or has authenticated channels to trusted validation providers. Systems
  that provide name and _________________________________________________________________________________________________
  CHAPTER THREE PAGE 314 address resolution services for local clients include recursive
  resolving or caching domain name system (DNS) servers. DNS client resolvers either
  perform validation of DNSSEC signatures, or clients use authenticated channels to
  recursive resolvers that perform such validations. Systems that use technologies
  other than the DNS to map between host and service names and network addresses provide
  some other means to enable clients to verify the authenticity and integrity of response
  data.
