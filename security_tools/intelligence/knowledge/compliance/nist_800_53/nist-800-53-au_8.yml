severity_guidance: medium
description: 'AU-8 TIME STAMPS requires: Use internal system clocks to generate time
  stamps for audit records; and; Record time stamps for audit records that meet [Assignment:
  organization-defined granularity of time measurement] and that use Coordinated Universal
  Time, have a fixed local time offset from Coordinated Universal Time, or that include
  the local time offset as part of the time stamp.'
rationale: Time stamps generated by the system include date and time. Time is commonly
  expressed in Coordinated Universal Time (UTC), a modern continuation of Greenwich
  Mean Time (GMT), or local time with an offset from UTC. Granularity of time measurements
  refers to the degree of synchronization between system clocks and reference clocks
  (e.g., clocks synchronizing within hundreds of milliseconds or tens of milliseconds).
  Organizations may define different time granularities for different system components.
  Time service can be critical to other security capabilities such as access control
  and identification and authentication, depending on the nature of the mechanisms
  used to support those capabilities.
developer_guidance: 'AU-8 TIME STAMPS is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Use internal system clocks to generate time stamps for audit records; and

  - Record time stamps for audit records that meet [Assignment: organization-defined
  granularity of time measurement] and that use Coordinated Universal Time, have a
  fixed local time offset from Coordinated Universal Time, or that include the local
  time offset as part of the time stamp'
