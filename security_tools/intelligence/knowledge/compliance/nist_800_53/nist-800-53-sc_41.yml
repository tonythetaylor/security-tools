severity_guidance: high
description: Connection ports include Universal Serial Bus (USB), Thunderbolt, and
  Firewire (IEEE 1394). Input/output (I/O) devices include compact disc and digital
  versatile disc drives. Disabling or removing such connection ports and I/O devices
  helps prevent the exfiltration of information from systems and the introduction
  of malicious code from those ports or devices. Physically disabling or removing
  ports and/or devices is the stronger action.
