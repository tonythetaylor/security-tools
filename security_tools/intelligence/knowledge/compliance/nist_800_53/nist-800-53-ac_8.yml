severity_guidance: high
description: 'AC-8 SYSTEM USE NOTIFICATION requires: Display [Assignment: organization-defined
  system use notification message or banner] to users before granting access to the
  system that provides privacy and security notices consistent with applicable laws,
  executive orders, directives, regulations, policies, standards, and guidelines and
  state that: 1. Users are accessing a U.S. Government system; 2. System usage may
  be monitored, recorded, and subject to audit; 3. Unauthorized use of the system
  is prohibited and subject to criminal and civil penalties; and 4. Use of the system
  indicates consent to monitoring and recording; Retain the notification message or
  banner on the screen until users acknowledge the usage conditions and take explicit
  actions to log on to or further access the system; and; For publicly accessible
  systems: 1. Display system use information [Assignment: organization-defined conditions],
  before granting further access to the publicly accessible system; 2. Display references,
  if any, to monitoring, recording, or auditing that are consistent with privacy accommodations
  for such systems that generally prohibit those activities; and _________________________________________________________________________________________________
  CHAPTER THREE PAGE 41 3. Include a description of the authorized uses of the system.'
rationale: System use notifications can be implemented using messages or warning banners
  displayed before individuals log in to systems. System use notifications are used
  only for access via logon interfaces with human users. Notifications are not required
  when human interfaces do not exist. Based on an assessment of risk, organizations
  consider whether or not a secondary system use notification is needed to access
  applications or other system resources after the initial network logon. Organizations
  consider system use notification messages or banners displayed in multiple languages
  based on organizational needs and the demographics of system users. Organizations
  consult with the privacy office for input regarding privacy messaging and the Office
  of the General Counsel or organizational equivalent for legal review and approval
  of warning banner content.
developer_guidance: 'AC-8 SYSTEM USE NOTIFICATION is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Display [Assignment: organization-defined system use notification message or banner]
  to users before granting access to the system that provides privacy and security
  notices consistent with applicable laws, executive orders, directives, regulations,
  policies, standards, and guidelines and state that: 1. Users are accessing a U.S.
  Government system; 2. System usage may be monitored, recorded, and subject to audit;
  3. Unauthorized use of the system is prohibited and subject to criminal and civil
  penalties; and 4. Use of the system indicates consent to monitoring and recording

  - Retain the notification message or banner on the screen until users acknowledge
  the usage conditions and take explicit actions to log on to or further access the
  system; and

  - For publicly accessible systems: 1. Display system use information [Assignment:
  organization-defined conditions], before granting further access to the publicly
  accessible system; 2. Display references, if any, to monitoring, recording, or auditing
  that are consistent with privacy accommodations for such systems that generally
  prohibit those activities; and _________________________________________________________________________________________________
  CHAPTER THREE PAGE 41 3. Include a description of the authorized uses of the system'
