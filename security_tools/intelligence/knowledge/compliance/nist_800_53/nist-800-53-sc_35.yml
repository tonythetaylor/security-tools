rationale: External malicious code identification differs from decoys in SC-26 in
  that the components actively probe networks, including the Internet, in search of
  malicious code contained on external websites. Like decoys, the use of external
  malicious code identification techniques requires some supporting isolation measures
  to ensure that any malicious code discovered during the search and subsequently
  executed does not infect organizational systems. Virtualization is a common technique
  for achieving such isolation.
