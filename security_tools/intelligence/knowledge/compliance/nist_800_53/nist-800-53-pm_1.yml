description: 'PM-1 INFORMATION SECURITY PROGRAM PLAN requires: Develop and disseminate
  an organization-wide information security program plan that: 1. Provides an overview
  of the requirements for the security program and a description of the security program
  management controls and common controls in place or planned for meeting those requirements;
  2. Includes the identification and assignment of roles, responsibilities, management
  commitment, coordination among organizational entities, and compliance; 3. Reflects
  the coordination among organizational entities responsible for information security;
  and 4. Is approved by a senior official with responsibility and accountability for
  the risk being incurred to organizational operations (including mission, functions,
  image, and reputation), organizational assets, individuals, other organizations,
  and the Nation; Review and update the organization-wide information security program
  plan [Assignment: organization-defined frequency] and following [Assignment: organization-defined
  events]; and; Protect the information security program plan from unauthorized disclosure
  and modification.'
rationale: An information security program plan is a formal document that provides
  an overview of the security requirements for an organization-wide information security
  program PROGRAM MANAGEMENT CONTROLS [FISMA], [PRIVACT], and [OMB A-130] require
  federal agencies to develop, implement, and provide oversight for organization-wide
  information security and privacy programs to help ensure the confidentiality, integrity,
  and availability of federal information processed, stored, and transmitted by federal
  information systems and to protect individual privacy. The program management (PM)
  controls described in this section are implemented at the organization level and
  not directed at individual information systems. The PM controls have been designed
  to facilitate organizational compliance with applicable federal laws, executive
  orders, directives, policies, regulations, and standards. The controls are independent
  of [FIPS 200] impact levels and, therefore, are not associated with the control
  baselines described in [SP 800-53B]. Organizations document program management controls
  in the information security and privacy program plans. The organization-wide information
  security program plan (see PM-1) and privacy program plan (see PM-18) supplement
  system security and privacy plans (see PL-2) developed for organizational information
  systems. Together, the system security and privacy plans for the individual information
  systems and the information security and privacy program plans cover the totality
  of security and privacy controls employed by the organization. _________________________________________________________________________________________________
  CHAPTER THREE PAGE 204 and describes the program management controls and common
  controls in place or planned for meeting those requirements. An information security
  program plan can be represented in a single document or compilations of documents.
  Privacy program plans and supply chain risk management plans are addressed separately
  in PM-18 and SR-2, respectively. An information security program plan documents
  implementation details about program management and common controls. The plan provides
  sufficient information about the controls (including specification of parameters
  for assignment and selection operations, explicitly or by reference) to enable implementations
  that are unambiguously compliant with the intent of the plan and a determination
  of the risk to be incurred if the plan is implemented as intended. Updates to information
  security program plans include organizational changes and problems identified during
  plan implementation or control assessments. Program management controls may be implemented
  at the organization level or the mission or business process level, and are essential
  for managing
developer_guidance: 'PM-1 INFORMATION SECURITY PROGRAM PLAN is a NIST SP 800-53 Rev.
  5 requirement.

  Implementation expectations include:

  - Develop and disseminate an organization-wide information security program plan
  that: 1. Provides an overview of the requirements for the security program and a
  description of the security program management controls and common controls in place
  or planned for meeting those requirements; 2. Includes the identification and assignment
  of roles, responsibilities, management commitment, coordination among organizational
  entities, and compliance; 3. Reflects the coordination among organizational entities
  responsible for information security; and 4. Is approved by a senior official with
  responsibility and accountability for the risk being incurred to organizational
  operations (including mission, functions, image, and reputation), organizational
  assets, individuals, other organizations, and the Nation

  - Review and update the organization-wide information security program plan [Assignment:
  organization-defined frequency] and following [Assignment: organization-defined
  events]; and

  - Protect the information security program plan from unauthorized disclosure and
  modification'
