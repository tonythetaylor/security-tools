rationale: The integration of security and privacy requirements and controls into
  the enterprise architecture helps to ensure that security and privacy considerations
  are addressed throughout the system development life cycle and are explicitly related
  to the organization’s mission and business processes. The process of security and
  privacy requirements integration also embeds into the enterprise architecture and
  the organization’s security and privacy architectures consistent with the organizational
  risk management strategy. For PM-7, security and privacy architectures are developed
  at a system-of-systems level, representing all organizational _________________________________________________________________________________________________
  CHAPTER THREE PAGE 207 systems. For PL-8, the security and privacy architectures
  are developed at a level that represents an individual system. The system-level
  architectures are consistent with the security and privacy architectures defined
  for the organization. Security and privacy requirements and control integration
  are most effectively accomplished through the rigorous application of the Risk Management
  Framework [SP 800-37] and supporting security standards and guidelines.
developer_guidance: 'PM-7 ENTERPRISE ARCHITECTURE is a NIST SP 800-53 Rev. 5 requirement.

