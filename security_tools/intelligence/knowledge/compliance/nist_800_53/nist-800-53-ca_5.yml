severity_guidance: medium
description: 'CA-5 PLAN OF ACTION AND MILESTONES requires: Develop a plan of action
  and milestones for the system to document the planned remediation actions of the
  organization to correct weaknesses or deficiencies noted during the assessment of
  the controls and to reduce or eliminate known vulnerabilities in the system; and;
  Update existing plan of action and milestones [Assignment: organization-defined
  frequency] based on the findings from control assessments, independent audits or
  reviews, and continuous monitoring activities.'
rationale: Plans of action and milestones are useful for any type of organization
  to track planned remedial actions. Plans of action and milestones are required in
  authorization packages and subject to federal reporting requirements established
  by OMB.
developer_guidance: 'CA-5 PLAN OF ACTION AND MILESTONES is a NIST SP 800-53 Rev. 5
  requirement.

  Implementation expectations include:

  - Develop a plan of action and milestones for the system to document the planned
  remediation actions of the organization to correct weaknesses or deficiencies noted
  during the assessment of the controls and to reduce or eliminate known vulnerabilities
  in the system; and

  - Update existing plan of action and milestones [Assignment: organization-defined
  frequency] based on the findings from control assessments, independent audits or
  reviews, and continuous monitoring activities'
