rationale: Organizations determine the types of protection necessary for the power
  equipment and cabling employed at different locations that are both internal and
  external to organizational facilities and environments of operation. Types of power
  equipment and cabling include internal cabling and uninterruptable power sources
  in offices or data centers, generators and power cabling outside of buildings, and
  power sources for self-contained components such as satellites, vehicles, and other
  deployable systems.
