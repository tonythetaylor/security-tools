description: 'IR-6 INCIDENT REPORTING requires: Require personnel to report suspected
  incidents to the organizational incident response capability within [Assignment:
  organization-defined time period]; and; Report incident information to [Assignment:
  organization-defined authorities].'
rationale: The types of incidents reported, the content and timeliness of the reports,
  and the designated reporting authorities reflect applicable laws, executive orders,
  directives, regulations, policies, standards, and guidelines. Incident information
  can inform risk assessments, control effectiveness assessments, security requirements
  for acquisitions, and selection criteria for technology products.
developer_guidance: 'IR-6 INCIDENT REPORTING is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Require personnel to report suspected incidents to the organizational incident
  response capability within [Assignment: organization-defined time period]; and

  - Report incident information to [Assignment: organization-defined authorities]'
