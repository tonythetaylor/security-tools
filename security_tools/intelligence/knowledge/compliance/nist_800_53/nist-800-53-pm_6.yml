description: Measures of performance are outcome-based metrics used by an organization
  to measure the effectiveness or efficiency of the information security and privacy
  programs and the controls employed in support of the program. To facilitate security
  and privacy risk management, organizations consider aligning measures of performance
  with the organizational risk tolerance as defined in the risk management strategy.
