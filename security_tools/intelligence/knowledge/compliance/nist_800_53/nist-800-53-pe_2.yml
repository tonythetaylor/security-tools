severity_guidance: medium
description: 'PE-2 PHYSICAL ACCESS AUTHORIZATIONS requires: Develop, approve, and
  maintain a list of individuals with authorized access to the facility where the
  system resides; Issue authorization credentials for facility access; Review the
  access list detailing authorized facility access by individuals [Assignment: organization-defined
  frequency]; and.'
rationale: Physical access authorizations apply to employees and visitors. Individuals
  with permanent physical access authorization credentials are not considered visitors.
  Authorization credentials include ID badges, identification cards, and smart cards.
  Organizations determine the strength of authorization credentials needed consistent
  with applicable laws, executive orders, directives, regulations, policies, standards,
  and guidelines. Physical access authorizations may not be necessary to access certain
  areas within facilities that are designated as publicly accessible.
developer_guidance: 'PE-2 PHYSICAL ACCESS AUTHORIZATIONS is a NIST SP 800-53 Rev.
  5 requirement.

  Implementation expectations include:

  - Develop, approve, and maintain a list of individuals with authorized access to
  the facility where the system resides

  - Issue authorization credentials for facility access

  - Review the access list detailing authorized facility access by individuals [Assignment:
  organization-defined frequency]; and

  - Remove individuals from the facility access list when access is no longer required'
