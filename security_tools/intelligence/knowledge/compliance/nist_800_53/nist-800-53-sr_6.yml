rationale: An assessment and review of supplier risk includes security and supply
  chain risk management processes, foreign ownership, control or influence (FOCI),
  and the ability of the supplier to effectively assess subordinate second-tier and
  third-tier suppliers and contractors. The reviews may be conducted by the organization
  or by an independent third party. The reviews consider documented processes, documented
  controls, all-source intelligence, and publicly available information related to
  the supplier or contractor. Organizations can use open-source information to monitor
  for indications of stolen information, poor development and quality control practices,
  information spillage, or counterfeits. In some cases, it may be appropriate or required
  to share assessment and review results with other organizations in accordance with
  any applicable rules, policies, or inter-organizational agreements or contracts.
