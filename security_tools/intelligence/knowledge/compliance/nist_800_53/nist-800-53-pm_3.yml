severity_guidance: medium
description: 'PM-3 INFORMATION SECURITY AND PRIVACY RESOURCES requires: Include the
  resources needed to implement the information security and privacy programs in capital
  planning and investment requests and document all exceptions to this requirement;
  Prepare documentation required for addressing information security and privacy programs
  in capital planning and investment requests in accordance with applicable laws,
  executive orders, directives, policies, regulations, standards; and; Make available
  for expenditure, the planned information security and privacy resources.'
rationale: Organizations consider establishing champions for information security
  and privacy and, as part of including the necessary resources, assign specialized
  expertise and resources as needed. Organizations may designate and empower an Investment
  Review Board or similar group to manage and provide oversight for the information
  security and privacy aspects of the capital planning and investment control process.
developer_guidance: 'PM-3 INFORMATION SECURITY AND PRIVACY RESOURCES is a NIST SP
  800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Include the resources needed to implement the information security and privacy
  programs in capital planning and investment requests and document all exceptions
  to this requirement

  - Prepare documentation required for addressing information security and privacy
  programs in capital planning and investment requests in accordance with applicable
  laws, executive orders, directives, policies, regulations, standards; and

  - Make available for expenditure, the planned information security and privacy resources'
