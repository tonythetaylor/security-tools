description: 'SI-5 SECURITY ALERTS, ADVISORIES, AND DIRECTIVES requires: Receive system
  security alerts, advisories, and directives from [Assignment: organization- defined
  external organizations] on an ongoing basis; Generate internal security alerts,
  advisories, and directives as deemed necessary; Disseminate security alerts, advisories,
  and directives to: [Selection (one or more): [Assignment: organization-defined personnel
  or roles]; [Assignment: organization-defined elements within the organization];
  [Assignment: organization-defined external organizations]]; and.'
rationale: The Cybersecurity and Infrastructure Security Agency (CISA) generates security
  alerts and advisories to maintain situational awareness throughout the Federal Government.
  Security directives are issued by OMB or other designated organizations with the
  responsibility and authority to issue such directives. Compliance with security
  directives is essential due to the critical nature of many of these directives and
  the potential (immediate) adverse effects on organizational operations and assets,
  individuals, other organizations, and the Nation should the directives not be implemented
  in a timely manner. External organizations include supply chain _________________________________________________________________________________________________
  CHAPTER THREE PAGE 344 partners, external mission or business partners, external
  service providers, and other peer or supporting organizations.
developer_guidance: 'SI-5 SECURITY ALERTS, ADVISORIES, AND DIRECTIVES is a NIST SP
  800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Receive system security alerts, advisories, and directives from [Assignment: organization-
  defined external organizations] on an ongoing basis

  - Generate internal security alerts, advisories, and directives as deemed necessary

  - Disseminate security alerts, advisories, and directives to: [Selection (one or
  more): [Assignment: organization-defined personnel or roles]; [Assignment: organization-defined
  elements within the organization]; [Assignment: organization-defined external organizations]];
  and

  - Implement security directives in accordance with established time frames, or notify
  the issuing organization of the degree of noncompliance'
