severity_guidance: medium
description: 'SA-22 UNSUPPORTED SYSTEM COMPONENTS requires: Replace system components
  when support for the components is no longer available from the developer, vendor,
  or manufacturer; or; Provide the following options for alternative sources for continued
  support for unsupported components [Selection (one or more): in-house support; [Assignment:
  organization-defined support from external providers]].'
rationale: Support for system components includes software patches, firmware updates,
  replacement parts, and maintenance contracts. An example of unsupported components
  includes when vendors no longer provide critical software patches or product updates,
  which can result in an opportunity for adversaries to exploit weaknesses in the
  installed components. Exceptions to replacing unsupported system components include
  systems that provide critical mission or business capabilities where newer technologies
  are not available or where the systems are so isolated that installing replacement
  components is not an option. Alternative sources for support address the need to
  provide continued support for system components that are no longer supported by
  the original manufacturers, developers, or vendors when such components remain essential
  to organizational mission and business functions. If necessary, organizations can
  establish in-house support by developing customized patches for critical software
  components or, alternatively, obtain the services of external providers who provide
  ongoing support for the designated unsupported components through contractual relationships.
  Such contractual relationships can include open-source software value-added vendors.
  The increased risk of using unsupported system components can be mitigated, for
  example, by prohibiting the connection of such components to public or uncontrolled
  networks, or implementing other forms of isolation.
developer_guidance: 'SA-22 UNSUPPORTED SYSTEM COMPONENTS is a NIST SP 800-53 Rev.
  5 requirement.

  Implementation expectations include:

  - Replace system components when support for the components is no longer available
  from the developer, vendor, or manufacturer; or

  - Provide the following options for alternative sources for continued support for
  unsupported components [Selection (one or more): in-house support; [Assignment:
  organization-defined support from external providers]]'
