severity_guidance: high
description: 'AC-22 PUBLICLY ACCESSIBLE CONTENT requires: Designate individuals authorized
  to make information publicly accessible; Train authorized individuals to ensure
  that publicly accessible information does not contain nonpublic information; Review
  the proposed content of information prior to posting onto the publicly accessible
  system to ensure that nonpublic information is not included; and.'
rationale: In accordance with applicable laws, executive orders, directives, policies,
  regulations, standards, and guidelines, the public is not authorized to have access
  to nonpublic information, including information protected under the [PRIVACT] and
  proprietary information. Publicly accessible content addresses systems that are
  controlled by the organization and accessible to the public, typically without identification
  or authentication. Posting information on non- organizational systems (e.g., non-organizational
  public websites, forums, and social media) is covered by organizational policy.
  While organizations may have individuals who are responsible for developing and
  implementing policies about the information that can be made publicly accessible,
  publicly accessible content addresses the management of the individuals who make
  such information publicly accessible.
developer_guidance: 'AC-22 PUBLICLY ACCESSIBLE CONTENT is a NIST SP 800-53 Rev. 5
  requirement.

  Implementation expectations include:

  - Designate individuals authorized to make information publicly accessible

  - Train authorized individuals to ensure that publicly accessible information does
  not contain nonpublic information

  - Review the proposed content of information prior to posting onto the publicly
  accessible system to ensure that nonpublic information is not included; and

  - Review the content on the publicly accessible system for nonpublic information
  [Assignment: organization-defined frequency] and remove such information, if discovered'
