severity_guidance: high
description: 'AC-21 INFORMATION SHARING requires: Enable authorized users to determine
  whether access authorizations assigned to a sharing partner match the information’s
  access and use restrictions for [Assignment: organization- defined information sharing
  circumstances where user discretion is required]; and; Employ [Assignment: organization-defined
  automated mechanisms or manual processes] to assist users in making information
  sharing and collaboration decisions.'
rationale: Information sharing applies to information that may be restricted in some
  manner based on some formal or administrative determination. Examples of such information
  include, contract-sensitive information, classified information related to special
  access programs or compartments, privileged information, proprietary information,
  and personally identifiable information. Security and privacy risk assessments as
  well as applicable laws, regulations, and policies can provide useful inputs to
  these determinations. Depending on the circumstances, sharing partners may be defined
  at the individual, group, or organizational level. Information may be defined by
  content, type, security category, or special access program or compartment. Access
  restrictions may include non-disclosure agreements (NDA). Information flow techniques
  and security attributes may be used to provide automated assistance to users making
  sharing and collaboration decisions.
developer_guidance: 'AC-21 INFORMATION SHARING is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Enable authorized users to determine whether access authorizations assigned to
  a sharing partner match the information’s access and use restrictions for [Assignment:
  organization- defined information sharing circumstances where user discretion is
  required]; and

  - Employ [Assignment: organization-defined automated mechanisms or manual processes]
  to assist users in making information sharing and collaboration decisions'
