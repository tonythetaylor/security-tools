rationale: For systems that support critical mission and business functions—including
  military operations, civilian space operations, nuclear power plant operations,
  and air traffic control operations (especially real-time operational environments)—organizations
  can identify certain conditions under which those systems revert to a predefined
  safe mode of operation. The safe mode of operation, which can be activated either
  automatically or manually, restricts the operations that systems can execute when
  those conditions are encountered. Restriction includes allowing only selected functions
  to execute that can be carried out under limited power or with reduced communications
  bandwidth.
developer_guidance: 'CP-12 SAFE MODE is a NIST SP 800-53 Rev. 5 requirement.

