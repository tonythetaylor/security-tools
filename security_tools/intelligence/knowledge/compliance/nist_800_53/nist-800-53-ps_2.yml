description: 'PS-2 POSITION RISK DESIGNATION requires: Assign a risk designation to
  all organizational positions; Establish screening criteria for individuals filling
  those positions; and; Review and update position risk designations [Assignment:
  organization-defined frequency].'
rationale: Position risk designations reflect Office of Personnel Management (OPM)
  policy and guidance. Proper position designation is the foundation of an effective
  and consistent suitability and personnel security program. The Position Designation
  System (PDS) assesses the duties and responsibilities of a position to determine
  the degree of potential damage to the efficiency or integrity of the service due
  to misconduct of an incumbent of a position and establishes the risk level of that
  position. The PDS assessment also determines if the duties and responsibilities
  of the position present the potential for position incumbents to bring about a material
  adverse effect on national security and the degree of that potential effect, which
  establishes the sensitivity level of a position. The results of the assessment determine
  what level of investigation is conducted for a position. Risk designations can guide
  and inform the types of authorizations that individuals receive when accessing organizational
  information and information systems. Position screening criteria include explicit
  information security role appointment requirements. Parts 1400 and 731 of Title
  5, Code of Federal Regulations, establish the requirements for organizations to
  evaluate relevant covered positions for a position sensitivity and position risk
  designation commensurate with the duties and responsibilities of those positions.
developer_guidance: 'PS-2 POSITION RISK DESIGNATION is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Assign a risk designation to all organizational positions

  - Establish screening criteria for individuals filling those positions; and

  - Review and update position risk designations [Assignment: organization-defined
  frequency]'
