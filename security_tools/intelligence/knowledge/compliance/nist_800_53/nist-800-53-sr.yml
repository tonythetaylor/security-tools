description: Organizations consider the types of auditing to be performed and the
  audit processing requirements when allocating audit storage capacity. Allocating
  sufficient audit storage capacity reduces the likelihood of such capacity being
  exceeded and resulting in the potential loss or reduction of auditing capability.
