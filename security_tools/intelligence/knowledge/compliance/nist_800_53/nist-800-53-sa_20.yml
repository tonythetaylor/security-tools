rationale: Organizations determine that certain system components likely cannot be
  trusted due to specific threats to and vulnerabilities in those components for which
  there are no viable security controls to adequately mitigate risk. Reimplementation
  or custom development of such components may satisfy requirements for higher assurance
  and is carried out by initiating changes to system components (including hardware,
  software, and firmware) such that the standard attacks by adversaries are less likely
  to succeed. In situations where no alternative sourcing is available and organizations
  choose not to reimplement or custom develop critical system components, additional
  controls can be employed. Controls include enhanced auditing, restrictions on source
  code and system utility access, and protection from deletion of system and application
  files.
developer_guidance: 'SA-20 CUSTOMIZED DEVELOPMENT OF CRITICAL COMPONENTS is a NIST
  SP 800-53 Rev. 5 requirement.

  Review and implement the control requirements within the applicable system and process
  boundaries.'
