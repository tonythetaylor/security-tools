rationale: Platforms are combinations of hardware, firmware, and software components
  used to execute software applications. Platforms include operating systems, the
  underlying computer architectures, or both. Platform-independent applications are
  applications with the capability to execute on multiple platforms. Such applications
  promote portability and reconstitution on different platforms. Application portability
  and the ability to reconstitute on different platforms increase the availability
  of mission-essential functions within organizations in situations where systems
  with specific operating systems are under attack.
