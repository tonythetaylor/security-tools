description: 'PS-7 EXTERNAL PERSONNEL SECURITY requires: Establish personnel security
  requirements, including security roles and responsibilities for external providers;
  Require external providers to comply with personnel security policies and procedures
  established by the organization; Document personnel security requirements.'
rationale: External provider refers to organizations other than the organization operating
  or acquiring the system. External providers include service bureaus, contractors,
  and other organizations that provide system development, information technology
  services, testing or assessment services, outsourced applications, and network/security
  management. Organizations explicitly include personnel security requirements in
  acquisition-related documents. External providers may have personnel working at
  organizational facilities with credentials, badges, or system privileges issued
  by organizations. Notifications of external personnel changes ensure the appropriate
  termination of privileges and credentials. Organizations define the transfers and
  terminations deemed reportable by security-related characteristics that include
  functions, roles, and the nature of credentials or privileges associated with transferred
  or terminated individuals.
developer_guidance: 'PS-7 EXTERNAL PERSONNEL SECURITY is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Establish personnel security requirements, including security roles and responsibilities
  for external providers

  - Require external providers to comply with personnel security policies and procedures
  established by the organization

  - Document personnel security requirements

  - Require external providers to notify [Assignment: organization-defined personnel
  or roles] of any personnel transfers or terminations of external personnel who possess
  organizational credentials and/or badges, or who have system privileges within [Assignment:
  organization- defined time period]; and

  - Monitor provider compliance with personnel security requirements'
