description: 'PM-20 DISSEMINATION OF PRIVACY PROGRAM INFORMATION requires: Ensures
  that the public has access to information about organizational privacy activities
  and can communicate with its senior agency official for privacy; _________________________________________________________________________________________________
  CHAPTER THREE PAGE 214; Ensures that organizational privacy practices and reports
  are publicly available; and; Employs publicly facing email addresses and/or phone
  lines to enable the public to provide feedback and/or direct questions to privacy
  offices regarding privacy practices.'
rationale: For federal agencies, the webpage is located at www.[agency].gov/privacy.
  Federal agencies include public privacy impact assessments, system of records notices,
  computer matching notices and agreements, [PRIVACT] exemption and implementation
  rules, privacy reports, privacy policies, instructions for individuals making an
  access or amendment request, email addresses for questions/complaints, blogs, and
  periodic publications.
developer_guidance: 'PM-20 DISSEMINATION OF PRIVACY PROGRAM INFORMATION is a NIST
  SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Ensures that the public has access to information about organizational privacy
  activities and can communicate with its senior agency official for privacy; _________________________________________________________________________________________________
  CHAPTER THREE PAGE 214

  - Ensures that organizational privacy practices and reports are publicly available;
  and

  - Employs publicly facing email addresses and/or phone lines to enable the public
  to provide feedback and/or direct questions to privacy offices regarding privacy
  practices'
