description: The privacy officer is an organizational official. For federal agencies—as
  defined by applicable laws, executive orders, directives, regulations, policies,
  standards, and guidelines—this official is designated as the senior agency official
  for privacy. Organizations may also refer to this official as the chief privacy
  officer. The senior agency official for privacy also has roles on the data management
  board (see PM-23) and the data integrity board (see PM-24).
