severity_guidance: medium
description: 'PT-6 SYSTEM OF RECORDS NOTICE requires: Draft system of records notices
  in accordance with OMB guidance and submit new and significantly modified system
  of records notices to the OMB and appropriate congressional committees for advance
  review; Publish system of records notices in the Federal Register; and; Keep system
  of records notices accurate, up-to-date, and scoped in accordance with policy.'
rationale: The [PRIVACT] requires that federal agencies publish a system of records
  notice in the Federal Register upon the establishment and/or modification of a [PRIVACT]
  system of records. As a general matter, a system of records notice is required when
  an agency maintains a group of any records under the control of the agency from
  which information is retrieved by the name of an individual or by some identifying
  number, symbol, or other identifier. The notice describes the existence and character
  of the system and identifies the system of records, the purpose(s) of the system,
  the authority for maintenance of the records, the categories of records maintained
  in the system, the categories of individuals about whom records are maintained,
  the routine uses to which the records are subject, and additional details about
  the system as described in [OMB A-108].
developer_guidance: 'PT-6 SYSTEM OF RECORDS NOTICE is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Draft system of records notices in accordance with OMB guidance and submit new
  and significantly modified system of records notices to the OMB and appropriate
  congressional committees for advance review

  - Publish system of records notices in the Federal Register; and

  - Keep system of records notices accurate, up-to-date, and scoped in accordance
  with policy'
