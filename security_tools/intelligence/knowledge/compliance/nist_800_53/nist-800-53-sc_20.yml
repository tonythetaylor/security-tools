severity_guidance: high
description: 'SC-20 SECURE NAME/ADDRESS RESOLUTION SERVICE (AUTHORITATIVE SOURCE)
  requires: Provide additional data origin authentication and integrity verification
  artifacts along with the authoritative name resolution data the system returns in
  response to external name/address resolution queries; and; Provide the means to
  indicate the security status of child zones and (if the child supports secure resolution
  services) to enable verification of a chain of trust among parent and child domains,
  when operating as part of a distributed, hierarchical namespace.'
rationale: Providing authoritative source information enables external clients, including
  remote Internet clients, to obtain origin authentication and integrity verification
  assurances for the host/service name to network address resolution information obtained
  through the service. Systems that provide name and address resolution services include
  domain name system (DNS) servers. Additional artifacts include DNS Security Extensions
  (DNSSEC) digital signatures and cryptographic keys. Authoritative data includes
  DNS resource records. The means for indicating the security status of child zones
  include the use of delegation signer resource records in the DNS. Systems that use
  technologies other than the DNS to map between host and service names and network
  addresses provide other means to assure the authenticity and integrity of response
  data.
developer_guidance: 'SC-20 SECURE NAME/ADDRESS RESOLUTION SERVICE (AUTHORITATIVE SOURCE)
  is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Provide additional data origin authentication and integrity verification artifacts
  along with the authoritative name resolution data the system returns in response
  to external name/address resolution queries; and

  - Provide the means to indicate the security status of child zones and (if the child
  supports secure resolution services) to enable verification of a chain of trust
  among parent and child domains, when operating as part of a distributed, hierarchical
  namespace'
