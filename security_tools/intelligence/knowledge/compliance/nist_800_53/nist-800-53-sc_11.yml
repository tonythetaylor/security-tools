severity_guidance: high
description: 'SC-11 TRUSTED PATH requires: Provide a [Selection: physically; logically]
  isolated trusted communications path for communications between the user and the
  trusted components of the system; and _________________________________________________________________________________________________
  CHAPTER THREE PAGE 307; Permit users to invoke the trusted communications path for
  communications between the user and the following security functions of the system,
  including at a minimum, authentication and re-authentication: [Assignment: organization-defined
  security functions].'
rationale: Trusted paths are mechanisms by which users can communicate (using input
  devices such as keyboards) directly with the security functions of systems with
  the requisite assurance to support security policies. Trusted path mechanisms can
  only be activated by users or the security functions of organizational systems.
  User responses that occur via trusted paths are protected from modification by and
  disclosure to untrusted applications. Organizations employ trusted paths for trustworthy,
  high-assurance connections between security functions of systems and users, including
  during system logons. The original implementations of trusted paths employed an
  out-of-band signal to initiate the path, such as using the <BREAK> key, which does
  not transmit characters that can be spoofed. In later implementations, a key combination
  that could not be hijacked was used (e.g., the <CTRL> + <ALT> + <DEL> keys). Such
  key combinations, however, are platform-specific and may not provide a trusted path
  implementation in every case. The enforcement of trusted communications paths is
  provided by a specific implementation that meets the reference monitor concept.
developer_guidance: 'SC-11 TRUSTED PATH is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Provide a [Selection: physically; logically] isolated trusted communications path
  for communications between the user and the trusted components of the system; and
  _________________________________________________________________________________________________
  CHAPTER THREE PAGE 307

  - Permit users to invoke the trusted communications path for communications between
  the user and the following security functions of the system, including at a minimum,
  authentication and re-authentication: [Assignment: organization-defined security
  functions]'
