description: 'PS-4 PERSONNEL TERMINATION requires: Disable system access within [Assignment:
  organization-defined time period]; Terminate or revoke any authenticators and credentials
  associated with the individual; Conduct exit interviews that include a discussion
  of [Assignment: organization-defined information security topics].'
rationale: System property includes hardware authentication tokens, system administration
  technical manuals, keys, identification cards, and building passes. Exit interviews
  ensure that terminated individuals understand the security constraints imposed by
  being former employees and that proper accountability is achieved for system-related
  property. Security topics at exit interviews include reminding individuals of nondisclosure
  agreements and potential limitations on future employment. Exit interviews may not
  always be possible for some individuals, including _________________________________________________________________________________________________
  CHAPTER THREE PAGE 225 in cases related to the unavailability of supervisors, illnesses,
  or job abandonment. Exit interviews are important for individuals with security
  clearances. The timely execution of termination actions is essential for individuals
  who have been terminated for cause. In certain situations, organizations consider
  disabling the system accounts of individuals who are being terminated prior to the
  individuals being notified.
developer_guidance: 'PS-4 PERSONNEL TERMINATION is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Disable system access within [Assignment: organization-defined time period]

  - Terminate or revoke any authenticators and credentials associated with the individual

  - Conduct exit interviews that include a discussion of [Assignment: organization-defined
  information security topics]

  - Retrieve all security-related organizational system-related property; and

  - Retain access to organizational information and systems formerly controlled by
  terminated individual'
