severity_guidance: high
description: 'AC-14 PERMITTED ACTIONS WITHOUT IDENTIFICATION OR AUTHENTICATION requires:
  Identify [Assignment: organization-defined user actions] that can be performed on
  the system without identification or authentication consistent with organizational
  mission and business functions; and; Document and provide supporting rationale in
  the security plan for the system, user actions not requiring identification or authentication.'
rationale: Specific user actions may be permitted without identification or authentication
  if organizations determine that identification and authentication are not required
  for the specified user actions. Organizations may allow a limited number of user
  actions without identification or authentication, including when individuals access
  public websites or other publicly accessible federal systems, when individuals use
  mobile phones to receive calls, or when facsimiles are received. Organizations identify
  actions that normally require identification or authentication but may, under certain
  circumstances, allow identification or authentication mechanisms to be bypassed.
  Such bypasses may occur, for example, via a software-readable physical switch that
  commands bypass of the logon functionality and is protected from accidental or unmonitored
  use. Permitting actions without identification or authentication does not apply
  to situations where identification and authentication have already occurred and
  are not repeated but rather to situations where identification and authentication
  have not yet occurred. Organizations may decide that there are no user actions that
  can be performed on organizational systems without identification and authentication,
  and therefore, the value for the assignment operation can be “none.”
developer_guidance: 'AC-14 PERMITTED ACTIONS WITHOUT IDENTIFICATION OR AUTHENTICATION
  is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Identify [Assignment: organization-defined user actions] that can be performed
  on the system without identification or authentication consistent with organizational
  mission and business functions; and

  - Document and provide supporting rationale in the security plan for the system,
  user actions not requiring identification or authentication'
