id: nist-800-53-ac_14
title: AC-14 PERMITTED ACTIONS WITHOUT IDENTIFICATION OR AUTHENTICATION
category: access_security
applies_to:
- access_control
- authorization
- least_privilege
- identity_security
tags:
- 800-53
- ac
- ac_14
