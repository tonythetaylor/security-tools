severity_guidance: medium
description: 'CM-12 INFORMATION LOCATION requires: Identify and document the location
  of [Assignment: organization-defined information] and the specific system components
  on which the information is processed and stored; Identify and document the users
  who have access to the system and system components where the information is processed
  and stored; and; Document changes to the location (i.e., system or system components)
  where the information is processed and stored.'
rationale: Information location addresses the need to understand where information
  is being processed and stored. Information location includes identifying where specific
  information types and information reside in system components and how information
  is being processed so that information flow can be understood and adequate protection
  and policy management provided for such information and system components. The security
  category of the information is also a factor in determining the controls necessary
  to protect the information and the system component where the information resides
  (see FIPS 199). The location of the information and system components is also a
  factor in the architecture and design of the system (see SA-4, SA-8, SA-17).
developer_guidance: 'CM-12 INFORMATION LOCATION is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Identify and document the location of [Assignment: organization-defined information]
  and the specific system components on which the information is processed and stored

  - Identify and document the users who have access to the system and system components
  where the information is processed and stored; and

  - Document changes to the location (i.e., system or system components) where the
  information is processed and stored'
