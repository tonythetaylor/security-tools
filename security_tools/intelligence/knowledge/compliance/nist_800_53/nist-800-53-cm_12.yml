id: nist-800-53-cm_12
title: CM-12 INFORMATION LOCATION
category: configuration_security
applies_to:
- secure_configuration
- baseline_configuration
- change_management
tags:
- 800-53
- baseline
- cm
- cm_12
- configuration
- hardening
