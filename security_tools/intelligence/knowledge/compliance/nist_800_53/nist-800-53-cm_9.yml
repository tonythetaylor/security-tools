description: 'CM-9 CONFIGURATION MANAGEMENT PLAN requires: Addresses roles, responsibilities,
  and configuration management processes and procedures; Establishes a process for
  identifying configuration items throughout the system development life cycle and
  for managing the configuration of the configuration items; Defines the configuration
  items for the system and places the configuration items under configuration management.'
rationale: Configuration management activities occur throughout the system development
  life cycle. As such, there are developmental configuration management activities
  (e.g., the control of code and software libraries) and operational configuration
  management activities (e.g., control of installed components and how the components
  are configured). Configuration management plans satisfy the requirements in configuration
  management policies while being tailored to _________________________________________________________________________________________________
  CHAPTER THREE PAGE 111 individual systems. Configuration management plans define
  processes and procedures for how configuration management is used to support system
  development life cycle activities. Configuration management plans are generated
  during the development and acquisition stage of the system development life cycle.
  The plans describe how to advance changes through change management processes; update
  configuration settings and baselines; maintain component inventories; control development,
  test, and operational environments; and develop, release, and update key documents.
  Organizations can employ templates to help ensure the consistent and timely development
  and implementation of configuration management plans. Templates can represent a
  configuration management plan for the organization with subsets of the plan implemented
  on a system by system basis. Configuration management approval processes include
  the designation of key stakeholders responsible for reviewing and approving proposed
  changes to systems, and personnel who conduct security and privacy impact analyses
  prior to the implementation of changes to the systems. Configuration items are the
  system components, such as the hardware, software, firmware, and documentation to
  be configuration-managed. As systems continue through the system development life
  cycle, new configuration items may be identified, and some existing configuration
  items may no longer need to be under configuration control.
developer_guidance: 'CM-9 CONFIGURATION MANAGEMENT PLAN is a NIST SP 800-53 Rev. 5
  requirement.

  Implementation expectations include:

  - Addresses roles, responsibilities, and configuration management processes and
  procedures

  - Establishes a process for identifying configuration items throughout the system
  development life cycle and for managing the configuration of the configuration items

  - Defines the configuration items for the system and places the configuration items
  under configuration management

  - Is reviewed and approved by [Assignment: organization-defined personnel or roles];
  and

  - Protects the configuration management plan from unauthorized disclosure and modification'
