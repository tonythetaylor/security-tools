severity_guidance: medium
description: Security controls applied to system distribution and transmission lines
  prevent accidental damage, disruption, and physical tampering. Such controls may
  also be necessary to prevent eavesdropping or modification of unencrypted transmissions.
  Security controls used to control physical access to system distribution and transmission
  lines include disconnected or locked spare jacks, locked wiring closets, protection
  of cabling by conduit or cable trays, and wiretapping sensors.
