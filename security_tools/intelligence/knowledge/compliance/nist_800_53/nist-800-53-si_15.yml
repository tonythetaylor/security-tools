severity_guidance: high
description: Certain types of attacks, including SQL injections, produce output results
  that are unexpected or inconsistent with the output results that would be expected
  from software programs or applications. Information output filtering focuses on
  detecting extraneous content, preventing such extraneous content from being displayed,
  and then alerting monitoring tools that anomalous behavior has been discovered.
