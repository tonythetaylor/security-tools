severity_guidance: high
description: 'SI-11 ERROR HANDLING requires: Generate error messages that provide
  information necessary for corrective actions without revealing information that
  could be exploited; and; Reveal error messages only to [Assignment: organization-defined
  personnel or roles].'
rationale: Organizations consider the structure and content of error messages. The
  extent to which systems can handle error conditions is guided and informed by organizational
  policy and operational requirements. Exploitable information includes stack traces
  and implementation details; erroneous logon attempts with passwords mistakenly entered
  as the username; mission or business information that can be derived from, if not
  stated explicitly by, the information recorded; and personally identifiable information,
  such as account numbers, social security numbers, and credit card numbers. Error
  messages may also provide a covert channel for transmitting information.
developer_guidance: 'SI-11 ERROR HANDLING is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Generate error messages that provide information necessary for corrective actions
  without revealing information that could be exploited; and

  - Reveal error messages only to [Assignment: organization-defined personnel or roles]'
