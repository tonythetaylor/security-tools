description: 'CP-6 ALTERNATE STORAGE SITE requires: Establish an alternate storage
  site, including necessary agreements to permit the storage and retrieval of system
  backup information; and; Ensure that the alternate storage site provides controls
  equivalent to that of the primary site.'
rationale: Alternate storage sites are geographically distinct from primary storage
  sites and maintain duplicate copies of information and data if the primary storage
  site is not available. Similarly, alternate processing sites provide processing
  capability if the primary processing site is not available. Geographically distributed
  architectures that support contingency requirements may be considered alternate
  storage sites. Items covered by alternate storage site agreements include environmental
  conditions at the alternate sites, access rules for systems and facilities, physical
  and environmental protection requirements, and coordination of delivery and retrieval
  of backup media. Alternate storage sites reflect the requirements in contingency
  plans so that organizations can maintain essential mission and business functions
  despite compromise, failure, or disruption in organizational systems.
developer_guidance: 'CP-6 ALTERNATE STORAGE SITE is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Establish an alternate storage site, including necessary agreements to permit
  the storage and retrieval of system backup information; and

  - Ensure that the alternate storage site provides controls equivalent to that of
  the primary site'
