rationale: System media includes digital and non-digital media. Digital media includes
  flash drives, diskettes, magnetic tapes, external or removable hard disk drives
  (e.g., solid state, magnetic), compact discs, and digital versatile discs. Non-digital
  media includes paper and microfilm. Denying access to patient medical records in
  a community hospital unless the individuals seeking access to such records are authorized
  healthcare providers is an example of restricting access to non-digital media. Limiting
  access to the design specifications stored on compact discs in the media library
  to individuals on the system development team is an example of restricting access
  to digital media.
developer_guidance: 'MP-2 MEDIA ACCESS is a NIST SP 800-53 Rev. 5 requirement.

