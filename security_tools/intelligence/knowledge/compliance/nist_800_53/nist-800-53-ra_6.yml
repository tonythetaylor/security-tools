rationale: A technical surveillance countermeasures survey is a service provided by
  qualified personnel to detect the presence of technical surveillance devices and
  hazards and to identify technical security weaknesses that could be used in the
  conduct of a technical penetration of the surveyed facility. Technical surveillance
  countermeasures surveys also provide evaluations of the technical security posture
  of organizations and facilities and include visual, electronic, and physical examinations
  of surveyed facilities, internally and externally. The surveys also provide useful
  input for risk assessments and information regarding organizational exposure to
  potential adversaries.
