description: 'PM-15 SECURITY AND PRIVACY GROUPS AND ASSOCIATIONS requires: To facilitate
  ongoing security and privacy education and training for organizational personnel;
  To maintain currency with recommended security and privacy practices, techniques,
  and technologies; and; To share current security and privacy information, including
  threats, vulnerabilities, and incidents.'
rationale: Ongoing contact with security and privacy groups and associations is important
  in an environment of rapidly changing technologies and threats. Groups and associations
  include special interest groups, professional associations, forums, news groups,
  users’ groups, and peer groups of security and privacy professionals in similar
  organizations. Organizations select security and privacy groups and associations
  based on mission and business functions. Organizations share threat, vulnerability,
  and incident information as well as contextual insights, compliance techniques,
  and privacy problems consistent with applicable laws, executive orders, directives,
  policies, regulations, standards, and guidelines.
developer_guidance: 'PM-15 SECURITY AND PRIVACY GROUPS AND ASSOCIATIONS is a NIST
  SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - To facilitate ongoing security and privacy education and training for organizational
  personnel

  - To maintain currency with recommended security and privacy practices, techniques,
  and technologies; and

  - To share current security and privacy information, including threats, vulnerabilities,
  and incidents'
