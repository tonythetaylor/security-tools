severity_guidance: medium
description: 'IR-2 INCIDENT RESPONSE TRAINING requires: Provide incident response
  training to system users consistent with assigned roles and responsibilities: 1.
  Within [Assignment: organization-defined time period] of assuming an incident response
  role or responsibility or acquiring system access; 2. When required by system changes;
  and 3. [Assignment: organization-defined frequency] thereafter; and; Review and
  update incident response training content [Assignment: organization-defined frequency]
  and following [Assignment: organization-defined events].'
rationale: Incident response training is associated with the assigned roles and responsibilities
  of organizational personnel to ensure that the appropriate content and level of
  detail are included in such training. For example, users may only need to know who
  to call or how to recognize an incident; system administrators may require additional
  training on how to handle incidents; and incident responders may receive more specific
  training on forensics, data collection techniques, reporting, system recovery, and
  system restoration. Incident response training includes user training in identifying
  and reporting suspicious activities from external and internal sources. Incident
  response training for users may be provided as part of AT-2 or AT-3. Events that
  may precipitate an update to incident response training content include, but are
  not limited to, incident response plan testing or response to an actual incident
  (lessons learned), assessment or audit findings, or changes in applicable laws,
  executive orders, directives, regulations, policies, standards, and guidelines.
developer_guidance: 'IR-2 INCIDENT RESPONSE TRAINING is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Provide incident response training to system users consistent with assigned roles
  and responsibilities: 1. Within [Assignment: organization-defined time period] of
  assuming an incident response role or responsibility or acquiring system access;
  2. When required by system changes; and 3. [Assignment: organization-defined frequency]
  thereafter; and

  - Review and update incident response training content [Assignment: organization-defined
  frequency] and following [Assignment: organization-defined events]'
