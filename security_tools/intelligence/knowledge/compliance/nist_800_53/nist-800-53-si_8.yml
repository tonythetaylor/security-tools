severity_guidance: high
description: 'SI-8 SPAM PROTECTION requires: Employ spam protection mechanisms at
  system entry and exit points to detect and act on unsolicited messages; and; Update
  spam protection mechanisms when new releases are available in accordance with organizational
  configuration management policy and procedures.'
rationale: System entry and exit points include firewalls, remote-access servers,
  electronic mail servers, web servers, proxy servers, workstations, notebook computers,
  and mobile devices. Spam can be transported by different means, including email,
  email attachments, and web accesses. Spam protection mechanisms include signature
  definitions.
developer_guidance: 'SI-8 SPAM PROTECTION is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Employ spam protection mechanisms at system entry and exit points to detect and
  act on unsolicited messages; and

  - Update spam protection mechanisms when new releases are available in accordance
  with organizational configuration management policy and procedures'
