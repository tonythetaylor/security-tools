severity_guidance: medium
description: The provision of water damage protection primarily applies to organizational
  facilities that contain concentrations of system resources, including data centers,
  server rooms, and mainframe computer rooms. Isolation valves can be employed in
  addition to or in lieu of master shutoff valves to shut off water supplies in specific
  areas of concern without affecting entire organizations.
