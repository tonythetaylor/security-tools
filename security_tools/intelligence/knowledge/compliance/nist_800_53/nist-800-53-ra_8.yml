description: 'RA-8 PRIVACY IMPACT ASSESSMENTS requires: Developing or procuring information
  technology that processes personally identifiable information; and; Initiating a
  new collection of personally identifiable information that: 1. Will be processed
  using information technology; and 2. Includes personally identifiable information
  permitting the physical or virtual (online) contacting of a specific individual,
  if identical questions have been posed to, or identical reporting requirements imposed
  on, ten or more individuals, other than agencies, instrumentalities, or employees
  of the federal government.'
rationale: A privacy impact assessment is an analysis of how personally identifiable
  information is handled to ensure that handling conforms to applicable privacy requirements,
  determine the privacy risks associated with an information system or activity, and
  evaluate ways to mitigate privacy risks. A privacy impact assessment is both an
  analysis and a formal document that details the process and the outcome of the analysis.
  Organizations conduct and develop a privacy impact assessment with sufficient clarity
  and specificity to demonstrate that the organization fully considered privacy and
  incorporated appropriate privacy protections from the earliest stages of the organization’s
  activity and throughout the information life cycle. In order to conduct a meaningful
  privacy impact assessment, the organization’s senior agency official for privacy
  works closely with program managers, system owners, information technology experts,
  security officials, counsel, and other relevant organization personnel. Moreover,
  a privacy impact assessment is not a time-restricted activity that is limited to
  a particular milestone or stage of the information system or personally identifiable
  information life cycles. Rather, the privacy analysis continues throughout the system
  and personally identifiable information life cycles. Accordingly, a privacy impact
  assessment is a living document that organizations update whenever changes to the
  information technology, changes to the organization’s practices, or other factors
  alter the privacy risks associated with the use of such information technology.
  To conduct the privacy impact assessment, organizations can use security and privacy
  risk assessments. Organizations may also use other related processes that may have
  different names, _________________________________________________________________________________________________
  CHAPTER THREE PAGE 247 including privacy threshold analyses. A privacy impact assessment
  can also serve as notice to the public regarding the organization’s practices with
  respect to privacy. Although conducting and publishing privacy impact assessments
  may be required by law, organizations may develop such policies in the absence of
  applicable laws. For federal agencies, privacy impact assessments may be required
  by [EGOV]; agencies should consult with their senior agency official for privacy
  and legal counsel on this requirement and be aware of the statutory exceptions and
  OMB guidance relating to the provision.
developer_guidance: 'RA-8 PRIVACY IMPACT ASSESSMENTS is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Developing or procuring information technology that processes personally identifiable
  information; and

  - Initiating a new collection of personally identifiable information that: 1. Will
  be processed using information technology; and 2. Includes personally identifiable
  information permitting the physical or virtual (online) contacting of a specific
  individual, if identical questions have been posed to, or identical reporting requirements
  imposed on, ten or more individuals, other than agencies, instrumentalities, or
  employees of the federal government'
