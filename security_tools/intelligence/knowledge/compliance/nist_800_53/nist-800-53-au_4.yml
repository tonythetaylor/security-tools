description: Organizations consider the types of audit logging to be performed and
  the audit log processing requirements when allocating audit log storage capacity.
  Allocating sufficient audit log storage capacity reduces the likelihood of such
  capacity being exceeded and resulting in the potential loss or reduction of audit
  logging capability.
