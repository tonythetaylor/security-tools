description: 'SA-2 ALLOCATION OF RESOURCES requires: Determine the high-level information
  security and privacy requirements for the system or system service in mission and
  business process planning; Determine, document, and allocate the resources required
  to protect the system or system service as part of the organizational capital planning
  and investment control process; and; Establish a discrete line item for information
  security and privacy in organizational programming and budgeting documentation.'
rationale: Resource allocation for information security and privacy includes funding
  for system and services acquisition, sustainment, and supply chain-related risks
  throughout the system development life cycle.
developer_guidance: 'SA-2 ALLOCATION OF RESOURCES is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Determine the high-level information security and privacy requirements for the
  system or system service in mission and business process planning

  - Determine, document, and allocate the resources required to protect the system
  or system service as part of the organizational capital planning and investment
  control process; and

  - Establish a discrete line item for information security and privacy in organizational
  programming and budgeting documentation'
