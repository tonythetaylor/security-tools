rationale: Adversaries may compromise individual authentication mechanisms employed
  by organizations and subsequently attempt to impersonate legitimate users. To address
  this threat, organizations may employ specific techniques or mechanisms and establish
  protocols to assess suspicious behavior. Suspicious behavior may include accessing
  information that individuals do not typically access as part of their duties, roles,
  or responsibilities; accessing greater quantities of information than individuals
  would routinely access; or attempting to access information from suspicious network
  addresses. When pre-established conditions or triggers occur, organizations can
  require individuals to provide additional authentication information. Another potential
  use for adaptive authentication is to increase the strength of mechanism based on
  the number or types of records being accessed. Adaptive authentication does not
  replace and is not used to avoid the use of multi-factor authentication mechanisms
  but can augment implementations of multi-factor authentication.
