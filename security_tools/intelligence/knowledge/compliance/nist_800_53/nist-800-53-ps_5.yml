description: 'PS-5 PERSONNEL TRANSFER requires: Review and confirm ongoing operational
  need for current logical and physical access authorizations to systems and facilities
  when individuals are reassigned or transferred to other positions within the organization;
  Initiate [Assignment: organization-defined transfer or reassignment actions] within
  [Assignment: organization-defined time period following the formal transfer action];
  Modify access authorization as needed to correspond with any changes in operational
  need due to reassignment or transfer; and.'
rationale: Personnel transfer applies when reassignments or transfers of individuals
  are permanent or of such extended duration as to make the actions warranted. Organizations
  define actions appropriate for the types of reassignments or transfers, whether
  permanent or extended. Actions that may be required for personnel transfers or reassignments
  to other positions within _________________________________________________________________________________________________
  CHAPTER THREE PAGE 226 organizations include returning old and issuing new keys,
  identification cards, and building passes; closing system accounts and establishing
  new accounts; changing system access authorizations (i.e., privileges); and providing
  for access to official records to which individuals had access at previous work
  locations and in previous system accounts.
developer_guidance: 'PS-5 PERSONNEL TRANSFER is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Review and confirm ongoing operational need for current logical and physical access
  authorizations to systems and facilities when individuals are reassigned or transferred
  to other positions within the organization

  - Initiate [Assignment: organization-defined transfer or reassignment actions] within
  [Assignment: organization-defined time period following the formal transfer action]

  - Modify access authorization as needed to correspond with any changes in operational
  need due to reassignment or transfer; and

  - Notify [Assignment: organization-defined personnel or roles] within [Assignment:
  organization-defined time period]'
