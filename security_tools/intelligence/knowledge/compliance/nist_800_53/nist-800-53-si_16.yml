rationale: Some adversaries launch attacks with the intent of executing code in non-executable
  regions of memory or in memory locations that are prohibited. Controls employed
  to protect memory include data execution prevention and address space layout randomization.
  Data _________________________________________________________________________________________________
  CHAPTER THREE PAGE 356 execution prevention controls can either be hardware-enforced
  or software-enforced with hardware enforcement providing the greater strength of
  mechanism.
