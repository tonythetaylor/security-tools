severity_guidance: medium
description: 'AU-7 AUDIT RECORD REDUCTION AND REPORT GENERATION requires: Supports
  on-demand audit record review, analysis, and reporting requirements and after- the-fact
  investigations of incidents; and; Does not alter the original content or time ordering
  of audit records.'
rationale: Audit record reduction is a process that manipulates collected audit log
  information and organizes it into a summary format that is more meaningful to analysts.
  Audit record _________________________________________________________________________________________________
  CHAPTER THREE PAGE 73 reduction and report generation capabilities do not always
  emanate from the same system or from the same organizational entities that conduct
  audit logging activities. The audit record reduction capability includes modern
  data mining techniques with advanced data filters to identify anomalous behavior
  in audit records. The report generation capability provided by the system can generate
  customizable reports. Time ordering of audit records can be an issue if the granularity
  of the timestamp in the record is insufficient.
developer_guidance: 'AU-7 AUDIT RECORD REDUCTION AND REPORT GENERATION is a NIST SP
  800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Supports on-demand audit record review, analysis, and reporting requirements and
  after- the-fact investigations of incidents; and

  - Does not alter the original content or time ordering of audit records'
