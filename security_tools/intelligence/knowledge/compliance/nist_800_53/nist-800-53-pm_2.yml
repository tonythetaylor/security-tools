description: The senior agency information security officer is an organizational official.
  For federal agencies (as defined by applicable laws, executive orders, regulations,
  directives, policies, and standards), this official is the senior agency information
  security officer. Organizations may also refer to this official as the senior information
  security officer or chief information security officer.
