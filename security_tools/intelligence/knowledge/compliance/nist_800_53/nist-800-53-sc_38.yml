rationale: 'Operations security (OPSEC) is a systematic process by which potential
  adversaries can be denied information about the capabilities and intentions of organizations
  by identifying, controlling, and protecting generally unclassified information that
  specifically relates to the planning and execution of sensitive organizational activities.
  The OPSEC process involves five steps: identification of critical information, analysis
  of threats, analysis of vulnerabilities, assessment of risks, and the application
  of appropriate countermeasures. OPSEC controls are _________________________________________________________________________________________________
  CHAPTER THREE PAGE 324 applied to organizational systems and the environments in
  which those systems operate. OPSEC controls protect the confidentiality of information,
  including limiting the sharing of information with suppliers, potential suppliers,
  and other non-organizational elements and individuals. Information critical to organizational
  mission and business functions includes user identities, element uses, suppliers,
  supply chain processes, functional requirements, security requirements, system design
  specifications, testing and evaluation protocols, and security control implementation
  details.'
developer_guidance: 'SC-38 OPERATIONS SECURITY is a NIST SP 800-53 Rev. 5 requirement.

  Review and implement the control requirements within the applicable system and process
  boundaries.'
