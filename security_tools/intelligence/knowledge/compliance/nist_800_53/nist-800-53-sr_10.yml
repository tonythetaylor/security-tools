severity_guidance: high
description: The inspection of systems or systems components for tamper resistance
  and detection addresses physical and logical tampering and is applied to systems
  and system components removed from organization-controlled areas. Indications of
  a need for inspection include changes in packaging, specifications, factory location,
  or entity in which the part is purchased, and when individuals return from travel
  to high-risk locations.
