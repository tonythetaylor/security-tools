severity_guidance: medium
description: 'AU-14 SESSION AUDIT requires: Provide and implement the capability for
  [Assignment: organization-defined users or roles] to [Selection (one or more): record;
  view; hear; log] the content of a user session under [Assignment: organization-defined
  circumstances]; and; Develop, integrate, and use session auditing activities in
  consultation with legal counsel and in accordance with applicable laws, executive
  orders, directives, regulations, policies, standards, and guidelines.'
rationale: Session audits can include monitoring keystrokes, tracking websites visited,
  and recording information and/or file transfers. Session audit capability is implemented
  in addition to event logging and may involve implementation of specialized session
  capture technology. Organizations consider how session auditing can reveal information
  about individuals that may give rise to privacy risk as well as how to mitigate
  those risks. Because session auditing can impact system and network performance,
  organizations activate the capability under well- defined situations (e.g., the
  organization is suspicious of a specific individual). Organizations consult with
  legal counsel, civil liberties officials, and privacy officials to ensure that any
  legal, privacy, civil rights, or civil liberties issues, including the use of personally
  identifiable information, are appropriately addressed.
developer_guidance: 'AU-14 SESSION AUDIT is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Provide and implement the capability for [Assignment: organization-defined users
  or roles] to [Selection (one or more): record; view; hear; log] the content of a
  user session under [Assignment: organization-defined circumstances]; and

  - Develop, integrate, and use session auditing activities in consultation with legal
  counsel and in accordance with applicable laws, executive orders, directives, regulations,
  policies, standards, and guidelines'
