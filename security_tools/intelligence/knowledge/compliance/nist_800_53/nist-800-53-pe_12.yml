description: The provision of emergency lighting applies primarily to organizational
  facilities that contain concentrations of system resources, including data centers,
  server rooms, and mainframe computer rooms. Emergency lighting provisions for the
  system are described in the contingency plan for the organization. If emergency
  lighting for the system fails or cannot be provided, organizations consider alternate
  processing sites for power-related contingencies.
