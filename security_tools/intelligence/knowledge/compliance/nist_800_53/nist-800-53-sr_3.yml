severity_guidance: high
description: 'SR-3 SUPPLY CHAIN CONTROLS AND PROCESSES requires: Establish a process
  or processes to identify and address weaknesses or deficiencies in the supply chain
  elements and processes of [Assignment: organization-defined system or system component]
  in coordination with [Assignment: organization-defined supply chain personnel];
  Employ the following controls to protect against supply chain risks to the system,
  system component, or system service and to limit the harm or consequences from supply
  chain- related events: [Assignment: organization-defined supply chain controls];
  and; Document the selected and implemented supply chain processes and controls in
  [Selection: security and privacy plans; supply chain risk management plan; [Assignment:
  organization- defined document]].'
rationale: Supply chain elements include organizations, entities, or tools employed
  for the research and development, design, manufacturing, acquisition, delivery,
  integration, operations and maintenance, and disposal of systems and system components.
  Supply chain processes include hardware, software, and firmware development processes;
  shipping and handling procedures; personnel security and physical security programs;
  configuration management tools, techniques, and measures to maintain provenance;
  or other programs, processes, or procedures associated with the development, acquisition,
  maintenance and disposal of systems and system components. Supply chain elements
  and processes may be provided by organizations, system integrators, or external
  providers. Weaknesses or deficiencies in supply chain elements or processes represent
  potential vulnerabilities that can be exploited by adversaries to cause harm to
  the organization and affect its ability to carry out its core missions or business
  functions. Supply chain personnel are individuals with roles and responsibilities
  in the supply chain.
developer_guidance: 'SR-3 SUPPLY CHAIN CONTROLS AND PROCESSES is a NIST SP 800-53
  Rev. 5 requirement.

  Implementation expectations include:

  - Establish a process or processes to identify and address weaknesses or deficiencies
  in the supply chain elements and processes of [Assignment: organization-defined
  system or system component] in coordination with [Assignment: organization-defined
  supply chain personnel]

  - Employ the following controls to protect against supply chain risks to the system,
  system component, or system service and to limit the harm or consequences from supply
  chain- related events: [Assignment: organization-defined supply chain controls];
  and

  - Document the selected and implemented supply chain processes and controls in [Selection:
  security and privacy plans; supply chain risk management plan; [Assignment: organization-
  defined document]]'
