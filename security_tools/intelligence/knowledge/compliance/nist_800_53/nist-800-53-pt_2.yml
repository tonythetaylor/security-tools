severity_guidance: medium
description: 'PT-2 AUTHORITY TO PROCESS PERSONALLY IDENTIFIABLE INFORMATION requires:
  Determine and document the [Assignment: organization-defined authority] that permits
  the [Assignment: organization-defined processing] of personally identifiable information;
  and; Restrict the [Assignment: organization-defined processing] of personally identifiable
  information to only that which is authorized.'
rationale: The processing of personally identifiable information is an operation or
  set of operations that the information system or organization performs with respect
  to personally identifiable information across the information life cycle. Processing
  includes but is not limited to creation, collection, use, processing, storage, maintenance,
  dissemination, disclosure, and disposal. Processing operations also include logging,
  generation, and transformation, as well as analysis techniques, such as data mining.
  Organizations may be subject to laws, executive orders, directives, regulations,
  or policies that establish the organization’s authority and thereby limit certain
  types of processing of personally identifiable information or establish other requirements
  related to the processing. Organizational personnel consult with the senior agency
  official for privacy and legal counsel regarding such authority, particularly if
  the organization is subject to multiple jurisdictions or sources of authority. For
  organizations whose processing is not determined according to legal authorities,
  the organization’s policies and determinations govern how they process personally
  identifiable information. While processing of personally identifiable information
  may be legally permissible, privacy risks may still arise. Privacy risk assessments
  can identify the privacy risks associated with the authorized processing of personally
  identifiable information and support solutions to manage such risks. Organizations
  consider applicable requirements and organizational policies to determine how to
  document this authority. For federal agencies, the authority to process personally
  identifiable information is documented in privacy policies and notices, system of
  records notices, privacy impact assessments, [PRIVACT] statements, computer matching
  agreements and notices, contracts, information sharing agreements, memoranda of
  understanding, and other documentation. Organizations take steps to ensure that
  personally identifiable information is only processed for authorized purposes, including
  training organizational personnel on the authorized processing of personally identifiable
  information and monitoring and auditing organizational use of personally identifiable
  information.
developer_guidance: 'PT-2 AUTHORITY TO PROCESS PERSONALLY IDENTIFIABLE INFORMATION
  is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Determine and document the [Assignment: organization-defined authority] that permits
  the [Assignment: organization-defined processing] of personally identifiable information;
  and

  - Restrict the [Assignment: organization-defined processing] of personally identifiable
  information to only that which is authorized'
