rationale: Organizations apply any conditions or protections that may be necessary
  for specific categories of personally identifiable information. These conditions
  may be required by laws, executive orders, directives, regulations, policies, standards,
  or guidelines. The requirements may also come from the results of privacy risk assessments
  that factor in contextual changes that may result in an organizational determination
  that a particular category of personally identifiable information is particularly
  sensitive or raises particular privacy risks. Organizations consult with the senior
  agency official for privacy and legal counsel regarding any protections that may
  be necessary.
