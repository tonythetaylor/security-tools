description: 'PM-28 RISK FRAMING requires: Identify and document: 1. Assumptions affecting
  risk assessments, risk responses, and risk monitoring; 2. Constraints affecting
  risk assessments, risk responses, and risk monitoring; 3. Priorities and trade-offs
  considered by the organization for managing risk; and 4. Organizational risk tolerance;
  Distribute the results of risk framing activities to [Assignment: organization-defined
  personnel]; and; Review and update risk framing considerations [Assignment: organization-defined
  frequency].'
rationale: Risk framing is most effective when conducted at the organization level
  and in consultation with stakeholders throughout the organization including mission,
  business, and system owners. The assumptions, constraints, risk tolerance, priorities,
  and trade-offs identified as part of the risk framing process inform the risk management
  strategy, which in turn informs the conduct of risk assessment, risk response, and
  risk monitoring activities. Risk framing results are shared with organizational
  personnel, including mission and business owners, information _________________________________________________________________________________________________
  CHAPTER THREE PAGE 219 owners or stewards, system owners, authorizing officials,
  senior agency information security officer, senior agency official for privacy,
  and senior accountable official for risk management.
developer_guidance: 'PM-28 RISK FRAMING is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Identify and document: 1. Assumptions affecting risk assessments, risk responses,
  and risk monitoring; 2. Constraints affecting risk assessments, risk responses,
  and risk monitoring; 3. Priorities and trade-offs considered by the organization
  for managing risk; and 4. Organizational risk tolerance

  - Distribute the results of risk framing activities to [Assignment: organization-defined
  personnel]; and

  - Review and update risk framing considerations [Assignment: organization-defined
  frequency]'
