id: nist-800-53-cm_10
title: CM-10 SOFTWARE USAGE RESTRICTIONS
category: configuration_security
applies_to:
- secure_configuration
- baseline_configuration
- change_management
tags:
- 800-53
- baseline
- cm
- cm_10
- configuration
- hardening
