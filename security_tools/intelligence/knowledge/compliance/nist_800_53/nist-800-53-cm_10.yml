severity_guidance: medium
description: 'CM-10 SOFTWARE USAGE RESTRICTIONS requires: Use software and associated
  documentation in accordance with contract agreements and copyright laws; Track the
  use of software and associated documentation protected by quantity licenses to control
  copying and distribution; and; Control and document the use of peer-to-peer file
  sharing technology to ensure that this capability is not used for the unauthorized
  distribution, display, performance, or reproduction of copyrighted work.'
rationale: Software license tracking can be accomplished by manual or automated methods,
  depending on organizational needs. Examples of contract agreements include software
  license agreements and non-disclosure agreements.
developer_guidance: 'CM-10 SOFTWARE USAGE RESTRICTIONS is a NIST SP 800-53 Rev. 5
  requirement.

  Implementation expectations include:

  - Use software and associated documentation in accordance with contract agreements
  and copyright laws

  - Track the use of software and associated documentation protected by quantity licenses
  to control copying and distribution; and

  - Control and document the use of peer-to-peer file sharing technology to ensure
  that this capability is not used for the unauthorized distribution, display, performance,
  or reproduction of copyrighted work'
