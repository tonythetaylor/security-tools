description: 'SC-43 USAGE RESTRICTIONS requires: Establish usage restrictions and
  implementation guidelines for the following system components: [Assignment: organization-defined
  system components]; and _________________________________________________________________________________________________
  CHAPTER THREE PAGE 328; Authorize, monitor, and control the use of such components
  within the system.'
rationale: Usage restrictions apply to all system components including but not limited
  to mobile code, mobile devices, wireless access, and wired and wireless peripheral
  components (e.g., copiers, printers, scanners, optical devices, and other similar
  technologies). The usage restrictions and implementation guidelines are based on
  the potential for system components to cause damage to the system and help to ensure
  that only authorized system use occurs.
developer_guidance: 'SC-43 USAGE RESTRICTIONS is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Establish usage restrictions and implementation guidelines for the following system
  components: [Assignment: organization-defined system components]; and _________________________________________________________________________________________________
  CHAPTER THREE PAGE 328

  - Authorize, monitor, and control the use of such components within the system'
