description: 'PE-17 ALTERNATE WORK SITE requires: Determine and document the [Assignment:
  organization-defined alternate work sites] allowed for use by employees; Employ
  the following controls at alternate work sites: [Assignment: organization-defined
  controls]; Assess the effectiveness of controls at alternate work sites; and.'
rationale: Alternate work sites include government facilities or the private residences
  of employees. While distinct from alternative processing sites, alternate work sites
  can provide readily available alternate locations during contingency operations.
  Organizations can define different sets of controls for specific alternate work
  sites or types of sites depending on the work-related activities conducted at the
  sites. Implementing and assessing the effectiveness of organization-defined controls
  and providing a means to communicate incidents at alternate work sites supports
  the contingency planning activities of organizations.
developer_guidance: 'PE-17 ALTERNATE WORK SITE is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Determine and document the [Assignment: organization-defined alternate work sites]
  allowed for use by employees

  - Employ the following controls at alternate work sites: [Assignment: organization-defined
  controls]

  - Assess the effectiveness of controls at alternate work sites; and

  - Provide a means for employees to communicate with information security and privacy
  personnel in case of incidents'
