rationale: Organizations test incident response capabilities to determine their effectiveness
  and identify potential weaknesses or deficiencies. Incident response testing includes
  the use of checklists, walk-through or tabletop exercises, and simulations (parallel
  or full interrupt). Incident response testing can include a determination of the
  effects on organizational operations and assets and individuals due to incident
  response. The use of qualitative and quantitative data aids in determining the effectiveness
  of incident response processes.
developer_guidance: 'IR-3 INCIDENT RESPONSE TESTING is a NIST SP 800-53 Rev. 5 requirement.

