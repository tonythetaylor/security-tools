rationale: Hardware components that may require marking include input and output devices.
  Input devices include desktop and notebook computers, keyboards, tablets, and smart
  phones. Output devices include printers, monitors/video displays, facsimile machines,
  scanners, copiers, and audio devices. Permissions controlling output to the output
  devices are addressed in AC-3 or AC-4. Components are marked to indicate the impact
  level or classification level of the system to which the devices are connected,
  or the impact level or classification level of the information permitted to be output.
  Security marking refers to the use of human-readable security attributes. Security
  labeling refers to the use of security attributes for internal system data structures.
  Security marking is generally not required for hardware components that process,
  store, or transmit information determined by organizations to be in the public domain
  or to be publicly releasable. However, organizations may require markings for hardware
  components that process, store, or transmit public information in order to indicate
  that such information is publicly releasable. Marking of system hardware components
  reflects applicable laws, executive orders, directives, policies, regulations, and
  standards.
