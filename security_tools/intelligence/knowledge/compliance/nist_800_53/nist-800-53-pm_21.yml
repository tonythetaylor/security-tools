description: 'PM-21 ACCOUNTING OF DISCLOSURES requires: Develop and maintain an accurate
  accounting of disclosures of personally identifiable information, including: 1.
  Date, nature, and purpose of each disclosure; and 2. Name and address, or other
  contact information of the individual or organization to which the disclosure was
  made; Retain the accounting of disclosures for the length of the time the personally
  identifiable information is maintained or five years after the disclosure is made,
  whichever is longer; and; Make the accounting of disclosures available to the individual
  to whom the personally identifiable information relates upon request. _________________________________________________________________________________________________
  CHAPTER THREE PAGE 215.'
rationale: The purpose of accounting of disclosures is to allow individuals to learn
  to whom their personally identifiable information has been disclosed, to provide
  a basis for subsequently advising recipients of any corrected or disputed personally
  identifiable information, and to provide an audit trail for subsequent reviews of
  organizational compliance with conditions for disclosures. For federal agencies,
  keeping an accounting of disclosures is required by the [PRIVACT]; agencies should
  consult with their senior agency official for privacy and legal counsel on this
  requirement and be aware of the statutory exceptions and OMB guidance relating to
  the provision. Organizations can use any system for keeping notations of disclosures,
  if it can construct from such a system, a document listing of all disclosures along
  with the required information. Automated mechanisms can be used by organizations
  to determine when personally identifiable information is disclosed, including commercial
  services that provide notifications and alerts. Accounting of disclosures may also
  be used to help organizations verify compliance with applicable privacy statutes
  and policies governing the disclosure or dissemination of information and dissemination
  restrictions.
developer_guidance: 'PM-21 ACCOUNTING OF DISCLOSURES is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Develop and maintain an accurate accounting of disclosures of personally identifiable
  information, including: 1. Date, nature, and purpose of each disclosure; and 2.
  Name and address, or other contact information of the individual or organization
  to which the disclosure was made

  - Retain the accounting of disclosures for the length of the time the personally
  identifiable information is maintained or five years after the disclosure is made,
  whichever is longer; and

  - Make the accounting of disclosures available to the individual to whom the personally
  identifiable information relates upon request. _________________________________________________________________________________________________
  CHAPTER THREE PAGE 215'
