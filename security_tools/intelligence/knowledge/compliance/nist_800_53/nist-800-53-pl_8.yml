developer_guidance: 'PL-8 SECURITY AND PRIVACY ARCHITECTURES is a NIST SP 800-53 Rev.
  5 requirement.

  Implementation expectations include:

  - Develop security and privacy architectures for the system that: 1. Describe the
  requirements and approach to be taken for protecting the confidentiality, integrity,
  and availability of organizational information; 2. Describe the requirements and
  approach to be taken for processing personally identifiable information to minimize
  privacy risk to individuals; 3. Describe how the architectures are integrated into
  and support the enterprise architecture; and 4. Describe any assumptions about,
  and dependencies on, external systems and services

  - Review and update the architectures [Assignment: organization-defined frequency]
  to reflect changes in the enterprise architecture; and

  - Reflect planned architecture changes in security and privacy plans, Concept of
  Operations (CONOPS), criticality analysis, organizational procedures, and procurements
  and acquisitions'
