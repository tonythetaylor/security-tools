description: 'CA-2 CONTROL ASSESSMENTS requires: Select the appropriate assessor or
  assessment team for the type of assessment to be conducted; Develop a control assessment
  plan that describes the scope of the assessment including: 1. Controls and control
  enhancements under assessment; 2. Assessment procedures to be used to determine
  control effectiveness; and 3. Assessment environment, assessment team, and assessment
  roles and responsibilities; Ensure the control assessment plan is reviewed and approved
  by the authorizing official or designated representative prior to conducting the
  assessment.'
rationale: Organizations ensure that control assessors possess the required skills
  and technical expertise to develop effective assessment plans and to conduct assessments
  of system-specific, hybrid, common, and program management controls, as appropriate.
  The required skills include general knowledge of risk management concepts and approaches
  as well as comprehensive knowledge of and experience with the hardware, software,
  and firmware system components implemented. Organizations assess controls in systems
  and the environments in which those systems operate as part of initial and ongoing
  authorizations, continuous monitoring, FISMA annual assessments, system design and
  development, systems security engineering, privacy engineering, and the system development
  life cycle. Assessments help to ensure that organizations meet information security
  and privacy requirements, identify weaknesses and deficiencies in the system design
  and development process, provide essential information needed to make risk-based
  decisions as part of authorization processes, and comply with vulnerability mitigation
  procedures. Organizations conduct assessments on the implemented controls as documented
  in security and privacy plans. Assessments can also be conducted throughout the
  system development life cycle as part of systems engineering and systems security
  engineering processes. The design for controls can be assessed as RFPs are developed,
  responses assessed, and design reviews conducted. If a design to implement controls
  and subsequent implementation in accordance with the design are assessed during
  development, the final control testing can be a simple confirmation utilizing previously
  completed control assessment and aggregating the outcomes. Organizations may develop
  a single, consolidated security and privacy assessment plan for the system or maintain
  separate plans. A consolidated assessment plan clearly delineates the roles and
  responsibilities for control assessment. If multiple organizations participate in
  assessing a system, a coordinated approach can reduce redundancies and associated
  costs. Organizations can use other types of assessment activities, such as vulnerability
  scanning and system monitoring, to maintain the security and privacy posture of
