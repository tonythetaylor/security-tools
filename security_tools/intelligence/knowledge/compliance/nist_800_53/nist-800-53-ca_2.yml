developer_guidance: 'CA-2 CONTROL ASSESSMENTS is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Select the appropriate assessor or assessment team for the type of assessment
  to be conducted

  - Develop a control assessment plan that describes the scope of the assessment including:
  1. Controls and control enhancements under assessment; 2. Assessment procedures
  to be used to determine control effectiveness; and 3. Assessment environment, assessment
  team, and assessment roles and responsibilities

  - Ensure the control assessment plan is reviewed and approved by the authorizing
  official or designated representative prior to conducting the assessment

  - Assess the controls in the system and its environment of operation [Assignment:
  organization-defined frequency] to determine the extent to which the controls are
  implemented correctly, operating as intended, and producing the desired outcome
  with respect to meeting established security and privacy requirements

  - Produce a control assessment report that document the results of the assessment;
  and'
