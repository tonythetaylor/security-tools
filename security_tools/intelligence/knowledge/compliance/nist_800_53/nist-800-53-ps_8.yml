severity_guidance: medium
description: 'PS-8 PERSONNEL SANCTIONS requires: Employ a formal sanctions process
  for individuals failing to comply with established information security and privacy
  policies and procedures; and; Notify [Assignment: organization-defined personnel
  or roles] within [Assignment: organization-defined time period] when a formal employee
  sanctions process is initiated, identifying the individual sanctioned and the reason
  for the sanction.'
rationale: Organizational sanctions reflect applicable laws, executive orders, directives,
  regulations, policies, standards, and guidelines. Sanctions processes are described
  in access agreements and can be included as part of general personnel policies for
  organizations and/or specified in security and privacy policies. Organizations consult
  with the Office of the General Counsel regarding matters of employee sanctions.
  _________________________________________________________________________________________________
  CHAPTER THREE PAGE 228
developer_guidance: 'PS-8 PERSONNEL SANCTIONS is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Employ a formal sanctions process for individuals failing to comply with established
  information security and privacy policies and procedures; and

  - Notify [Assignment: organization-defined personnel or roles] within [Assignment:
  organization-defined time period] when a formal employee sanctions process is initiated,
  identifying the individual sanctioned and the reason for the sanction'
