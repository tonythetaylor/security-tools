rationale: Services that may require identification and authentication include web
  applications using digital certificates or services or applications that query a
  database. Identification and authentication methods for system services and applications
  include information or code signing, provenance graphs, and electronic signatures
  that indicate the sources of services. Decisions regarding the validity of identification
  and authentication claims can be made by services separate from the services acting
  on those decisions. This can occur in distributed system architectures. In such
  situations, the identification and authentication decisions (instead of actual identifiers
  and authentication data) are provided to the services that need to act on those
  decisions.
