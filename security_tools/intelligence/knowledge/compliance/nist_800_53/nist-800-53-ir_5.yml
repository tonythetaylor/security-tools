rationale: Documenting incidents includes maintaining records about each incident,
  the status of the incident, and other pertinent information necessary for forensics
  as well as evaluating incident details, trends, and handling. Incident information
  can be obtained from a variety of sources, including network monitoring, incident
  reports, incident response teams, user complaints, supply chain partners, audit
  monitoring, physical access monitoring, and user and administrator reports. IR-4
  provides information on the types of incidents that are appropriate for monitoring.
developer_guidance: 'IR-5 INCIDENT MONITORING is a NIST SP 800-53 Rev. 5 requirement.

  Review and implement the control requirements within the applicable system and process
  boundaries.'
