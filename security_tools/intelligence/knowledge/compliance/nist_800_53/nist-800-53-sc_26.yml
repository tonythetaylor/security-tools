severity_guidance: high
description: Decoys (i.e., honeypots, honeynets, or deception nets) are established
  to attract adversaries and deflect attacks away from the operational systems that
  support organizational mission and business functions. Use of decoys requires some
  supporting isolation measures to ensure that any deflected malicious code does not
  infect organizational systems. Depending on the specific usage of the decoy, consultation
  with the Office of the General Counsel before deployment may be needed.
