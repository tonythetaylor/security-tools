description: 'AT-4 TRAINING RECORDS requires: Document and monitor information security
  and privacy training activities, including security and privacy awareness training
  and specific role-based security and privacy training; and; Retain individual training
  records for [Assignment: organization-defined time period].'
rationale: Documentation for specialized training may be maintained by individual
  supervisors at the discretion of the organization. The National Archives and Records
  Administration provides guidance on records retention for federal agencies.
developer_guidance: 'AT-4 TRAINING RECORDS is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Document and monitor information security and privacy training activities, including
  security and privacy awareness training and specific role-based security and privacy
  training; and

  - Retain individual training records for [Assignment: organization-defined time
  period]'
