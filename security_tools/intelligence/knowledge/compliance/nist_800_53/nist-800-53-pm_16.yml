rationale: Because of the constantly changing and increasing sophistication of adversaries,
  especially the advanced persistent threat (APT), it may be more likely that adversaries
  can successfully breach or compromise organizational systems. One of the best techniques
  to address this concern is for organizations to share threat information, including
  threat events (i.e., tactics, techniques, and procedures) that organizations have
  experienced, mitigations that organizations have found are effective against certain
  types of threats, and threat intelligence (i.e., indications and warnings about
  threats). Threat information sharing may be bilateral or multilateral. Bilateral
  threat sharing includes government-to-commercial and government-to- government cooperatives.
  Multilateral threat sharing includes organizations taking part in threat- sharing
  consortia. Threat information may require special agreements and protection, or
  it may be freely shared.
