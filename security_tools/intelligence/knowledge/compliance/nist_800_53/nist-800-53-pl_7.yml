severity_guidance: medium
description: 'PL-7 CONCEPT OF OPERATIONS requires: Develop a Concept of Operations
  (CONOPS) for the system describing how the organization intends to operate the system
  from the perspective of information security and privacy; and; Review and update
  the CONOPS [Assignment: organization-defined frequency].'
rationale: The CONOPS may be included in the security or privacy plans for the system
  or in other system development life cycle documents. The CONOPS is a living document
  that requires updating throughout the system development life cycle. For example,
  during system design reviews, the concept of operations is checked to ensure that
  it remains consistent with the design for controls, the system architecture, and
  the operational procedures. Changes to the CONOPS are reflected in ongoing updates
  to the security and privacy plans, security and privacy architectures, and other
  organizational documents, such as procurement specifications, system development
  life cycle documents, and systems engineering documents.
developer_guidance: 'PL-7 CONCEPT OF OPERATIONS is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Develop a Concept of Operations (CONOPS) for the system describing how the organization
  intends to operate the system from the perspective of information security and privacy;
  and

  - Review and update the CONOPS [Assignment: organization-defined frequency]'
