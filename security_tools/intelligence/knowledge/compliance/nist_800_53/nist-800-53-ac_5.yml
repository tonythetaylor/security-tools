severity_guidance: high
description: 'AC-5 SEPARATION OF DUTIES requires: Identify and document [Assignment:
  organization-defined duties of individuals requiring separation]; and; Define system
  access authorizations to support separation of duties.'
rationale: Separation of duties addresses the potential for abuse of authorized privileges
  and helps to reduce the risk of malevolent activity without collusion. Separation
  of duties includes dividing mission or business functions and support functions
  among different individuals or roles, conducting system support functions with different
  individuals, and ensuring that security personnel who administer access control
  functions do not also administer audit functions. Because separation of duty violations
  can span systems and application domains, organizations consider the entirety of
  systems and system components when developing policy on separation of duties. Separation
  of duties is enforced through the account management activities in AC-2, access
  control mechanisms in AC-3, and identity management activities in IA-2, IA-4, and
  IA-12.
developer_guidance: 'AC-5 SEPARATION OF DUTIES is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Identify and document [Assignment: organization-defined duties of individuals
  requiring separation]; and

  - Define system access authorizations to support separation of duties'
