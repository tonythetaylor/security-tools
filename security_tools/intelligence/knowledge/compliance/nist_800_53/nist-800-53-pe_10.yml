severity_guidance: medium
description: 'PE-10 EMERGENCY SHUTOFF requires: Provide the capability of shutting
  off power to [Assignment: organization-defined system or individual system components]
  in emergency situations; Place emergency shutoff switches or devices in [Assignment:
  organization-defined location by system or system component] to facilitate access
  for authorized personnel; and; Protect emergency power shutoff capability from unauthorized
  activation.'
rationale: Emergency power shutoff primarily applies to organizational facilities
  that contain concentrations of system resources, including data centers, mainframe
  computer rooms, server rooms, and areas with computer-controlled machinery.
developer_guidance: 'PE-10 EMERGENCY SHUTOFF is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Provide the capability of shutting off power to [Assignment: organization-defined
  system or individual system components] in emergency situations

  - Place emergency shutoff switches or devices in [Assignment: organization-defined
  location by system or system component] to facilitate access for authorized personnel;
  and

  - Protect emergency power shutoff capability from unauthorized activation'
