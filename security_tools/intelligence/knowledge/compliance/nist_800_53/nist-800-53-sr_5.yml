rationale: The use of the acquisition process provides an important vehicle to protect
  the supply chain. There are many useful tools and techniques available, including
  obscuring the end use of a system or system component, using blind or filtered buys,
  requiring tamper-evident packaging, or using trusted or controlled distribution.
  The results from a supply chain risk assessment can guide and inform the strategies,
  tools, and methods that are most applicable to the situation. Tools and techniques
  may provide protections against unauthorized production, theft, tampering, insertion
  of counterfeits, insertion of malicious software or backdoors, and poor development
  practices throughout the system development life cycle. Organizations also _________________________________________________________________________________________________
  CHAPTER THREE PAGE 369 consider providing incentives for suppliers who implement
  controls, promote transparency into their processes and security and privacy practices,
  provide contract language that addresses the prohibition of tainted or counterfeit
  components, and restrict purchases from untrustworthy suppliers. Organizations consider
  providing training, education, and awareness programs for personnel regarding supply
  chain risk, available mitigation strategies, and when the programs should be employed.
  Methods for reviewing and protecting development plans, documentation, and evidence
  are commensurate with the security and privacy requirements of the organization.
  Contracts may specify documentation protection requirements.
