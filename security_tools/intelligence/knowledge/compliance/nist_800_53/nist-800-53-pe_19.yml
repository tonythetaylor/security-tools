rationale: Information leakage is the intentional or unintentional release of data
  or information to an untrusted environment from electromagnetic signals emanations.
  The security categories _________________________________________________________________________________________________
  CHAPTER THREE PAGE 192 or classifications of systems (with respect to confidentiality),
  organizational security policies, and risk tolerance guide the selection of controls
  employed to protect systems against information leakage due to electromagnetic signals
  emanations.
