description: 'PM-30 SUPPLY CHAIN RISK MANAGEMENT STRATEGY requires: Develop an organization-wide
  strategy for managing supply chain risks associated with the development, acquisition,
  maintenance, and disposal of systems, system components, and system services; Implement
  the supply chain risk management strategy consistently across the organization;
  and; Review and update the supply chain risk management strategy on [Assignment:
  organization-defined frequency] or as required, to address organizational changes.'
rationale: An organization-wide supply chain risk management strategy includes an
  unambiguous expression of the supply chain risk appetite and tolerance for the organization,
  acceptable supply chain risk mitigation strategies or controls, a process for consistently
  evaluating and monitoring supply chain risk, approaches for implementing and communicating
  the supply chain risk management strategy, and the associated roles and responsibilities.
  Supply chain risk management includes considerations of the security and privacy
  risks associated with the development, acquisition, maintenance, and disposal of
  systems, system components, and system services. The supply chain risk management
  strategy can be incorporated into the organization’s overarching risk management
  strategy and can guide and inform supply chain policies and system-level supply
  chain risk management plans. In addition, the use of a risk executive function can
  facilitate a consistent, organization-wide application of the supply chain risk
  management strategy. The supply chain risk management strategy is implemented at
  the organization and mission/business levels, whereas the supply chain risk management
  plan (see SR-2) is implemented at the system level.
developer_guidance: 'PM-30 SUPPLY CHAIN RISK MANAGEMENT STRATEGY is a NIST SP 800-53
  Rev. 5 requirement.

  Implementation expectations include:

  - Develop an organization-wide strategy for managing supply chain risks associated
  with the development, acquisition, maintenance, and disposal of systems, system
  components, and system services

  - Implement the supply chain risk management strategy consistently across the organization;
  and

  - Review and update the supply chain risk management strategy on [Assignment: organization-defined
  frequency] or as required, to address organizational changes'
