rationale: Failure in a known state addresses security concerns in accordance with
  the mission and business needs of organizations. Failure in a known state prevents
  the loss of confidentiality, integrity, or availability of information in the event
  of failures of organizational systems or system components. Failure in a known safe
  state helps to prevent systems from failing to a state that may cause injury to
  individuals or destruction to property. Preserving system state information facilitates
  system restart and return to the operational mode with less disruption of mission
  and business processes.
