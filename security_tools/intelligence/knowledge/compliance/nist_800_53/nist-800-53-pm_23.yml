rationale: A Data Governance Body can help ensure that the organization has coherent
  policies and the ability to balance the utility of data with security and privacy
  requirements. The Data Governance Body establishes policies, procedures, and standards
  that facilitate data governance so that data, including personally identifiable
  information, is effectively managed and maintained in accordance with applicable
  laws, executive orders, directives, regulations, policies, standards, and guidance.
  Responsibilities can include developing and implementing guidelines that support
  data modeling, quality, integrity, and the de-identification needs of personally
  identifiable information across the information life cycle as well as reviewing
  and approving applications to release data outside of the organization, archiving
  the applications and the released data, and performing post-release monitoring to
  ensure that the assumptions made as part of the data release continue to be valid.
  Members include the chief information officer, senior agency information security
  officer, and senior agency official for privacy. Federal agencies are required to
  establish a Data Governance Body with specific roles and responsibilities in accordance
  with the [EVIDACT] and policies set forth under [OMB M-19-23].
