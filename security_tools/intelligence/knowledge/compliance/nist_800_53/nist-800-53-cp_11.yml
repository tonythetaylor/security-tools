severity_guidance: medium
description: Contingency plans and the contingency training or testing associated
  with those plans incorporate an alternate communications protocol capability as
  part of establishing resilience in organizational systems. Switching communications
  protocols may affect software applications and operational aspects of systems. Organizations
  assess the potential side effects of introducing alternate communications protocols
  prior to implementation.
