severity_guidance: high
description: 'SI-22 INFORMATION DIVERSITY requires: Identify the following alternative
  sources of information for [Assignment: organization- defined essential functions
  and services]: [Assignment: organization-defined alternative information sources];
  and; Use an alternative information source for the execution of essential functions
  or services on [Assignment: organization-defined systems or system components] when
  the primary source of information is corrupted or unavailable.'
rationale: Actions taken by a system service or a function are often driven by the
  information it receives. Corruption, fabrication, modification, or deletion of that
  information could impact the ability of the service function to properly carry out
  its intended actions. By having multiple sources of input, the service or function
  can continue operation if one source is corrupted or no longer available. It is
  possible that the alternative sources of information may be less precise or less
  accurate than the primary source of information. But having such sub-optimal information
  sources may still provide a sufficient level of quality that the essential service
  or function can be carried out, even in a degraded or debilitated manner.
developer_guidance: 'SI-22 INFORMATION DIVERSITY is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Identify the following alternative sources of information for [Assignment: organization-
  defined essential functions and services]: [Assignment: organization-defined alternative
  information sources]; and

  - Use an alternative information source for the execution of essential functions
  or services on [Assignment: organization-defined systems or system components] when
  the primary source of information is corrupted or unavailable'
