description: 'PM-31 CONTINUOUS MONITORING STRATEGY requires: Establishing the following
  organization-wide metrics to be monitored: [Assignment: organization-defined metrics];
  Establishing [Assignment: organization-defined frequencies] for monitoring and [Assignment:
  organization-defined frequencies] for assessment of control effectiveness; Ongoing
  monitoring of organizationally-defined metrics in accordance with the continuous
  monitoring strategy.'
rationale: Continuous monitoring at the organization level facilitates ongoing awareness
  of the security and privacy posture across the organization to support organizational
  risk management decisions. The terms “continuous” and “ongoing” imply that organizations
  assess and monitor their controls and risks at a frequency sufficient to support
  risk-based decisions. Different types of controls may require different monitoring
  frequencies. The results of continuous monitoring guide and inform risk response
  actions by organizations. Continuous monitoring programs allow organizations to
  maintain the authorizations of systems and common controls in highly dynamic environments
  of operation with changing mission and business needs, threats, vulnerabilities,
  and technologies. Having access to security- and privacy-related information on
  a continuing basis through reports and dashboards gives organizational officials
  the capability to make effective, timely, and informed risk management decisions,
  including ongoing authorization decisions. To further facilitate security and privacy
  risk management, organizations consider aligning organization-defined monitoring
  metrics with organizational risk tolerance as defined in the risk management strategy.
  Monitoring requirements, including the need for monitoring, may be referenced in
  other controls and control enhancements such as, AC-2g, AC-2(7), AC-2(12)(a), AC-2(7)(b),
  AC-2(7)(c), AC-17(1), AT-4a, AU-13, AU-13(1), AU-13(2), CA-7, CM-3f, CM-6d, CM-11c,
  IR-5, MA-2b, MA-3a, MA-4a, PE-3d, PE-6, PE-14b, PE-16, PE-20, PM-6, PM-23, PS-7e,
  SA-9c, SC- 5(3)(b), SC-7a, SC-7(24)(b), SC-18b, SC-43b, SI-4.
developer_guidance: 'PM-31 CONTINUOUS MONITORING STRATEGY is a NIST SP 800-53 Rev.
  5 requirement.

  Implementation expectations include:

  - Establishing the following organization-wide metrics to be monitored: [Assignment:
  organization-defined metrics]

  - Establishing [Assignment: organization-defined frequencies] for monitoring and
  [Assignment: organization-defined frequencies] for assessment of control effectiveness

  - Ongoing monitoring of organizationally-defined metrics in accordance with the
  continuous monitoring strategy

  - Correlation and analysis of information generated by control assessments and monitoring

  - Response actions to address results of the analysis of control assessment and
  monitoring information; and'
