rationale: Organizations retain audit records until it is determined that the records
  are no longer needed for administrative, legal, audit, or other operational purposes.
  This includes the retention and availability of audit records relative to Freedom
  of Information Act (FOIA) requests, subpoenas, and law enforcement actions. Organizations
  develop standard categories of audit records relative to such types of actions and
  standard response processes for each type of action. The National Archives and Records
  Administration (NARA) General Records Schedules provide federal policy on records
  retention.
developer_guidance: 'AU-11 AUDIT RECORD RETENTION is a NIST SP 800-53 Rev. 5 requirement.

