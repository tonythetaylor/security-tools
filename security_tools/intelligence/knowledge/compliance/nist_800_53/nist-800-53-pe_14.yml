description: 'PE-14 ENVIRONMENTAL CONTROLS requires: Maintain [Selection (one or more):
  temperature; humidity; pressure; radiation; [Assignment: organization-defined environmental
  control]] levels within the facility where the system resides at [Assignment: organization-defined
  acceptable levels]; and; Monitor environmental control levels [Assignment: organization-defined
  frequency].'
rationale: The provision of environmental controls applies primarily to organizational
  facilities that contain concentrations of system resources (e.g., data centers,
  mainframe computer rooms, and server rooms). Insufficient environmental controls,
  especially in very harsh environments, can have a significant adverse impact on
  the availability of systems and system components that are needed to support organizational
  mission and business functions.
developer_guidance: 'PE-14 ENVIRONMENTAL CONTROLS is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Maintain [Selection (one or more): temperature; humidity; pressure; radiation;
  [Assignment: organization-defined environmental control]] levels within the facility
  where the system resides at [Assignment: organization-defined acceptable levels];
  and

  - Monitor environmental control levels [Assignment: organization-defined frequency]'
