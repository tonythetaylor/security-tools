severity_guidance: high
description: Distributing processing and storage across multiple physical locations
  or logical domains provides a degree of redundancy or overlap for organizations.
  The redundancy and overlap increase the work factor of adversaries to adversely
  impact organizational operations, assets, and individuals. The use of distributed
  processing and storage does not assume a single primary processing or storage location.
  Therefore, it allows for parallel processing and storage.
