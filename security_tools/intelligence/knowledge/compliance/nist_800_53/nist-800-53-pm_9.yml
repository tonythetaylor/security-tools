description: 'PM-9 RISK MANAGEMENT STRATEGY requires: Develops a comprehensive strategy
  to manage: 1. Security risk to organizational operations and assets, individuals,
  other organizations, and the Nation associated with the operation and use of organizational
  systems; and 2. Privacy risk to individuals resulting from the authorized processing
  of personally identifiable information; Implement the risk management strategy consistently
  across the organization; and; Review and update the risk management strategy [Assignment:
  organization-defined frequency] or as required, to address organizational changes.
  _________________________________________________________________________________________________
  CHAPTER THREE PAGE 208.'
rationale: An organization-wide risk management strategy includes an expression of
  the security and privacy risk tolerance for the organization, security and privacy
  risk mitigation strategies, acceptable risk assessment methodologies, a process
  for evaluating security and privacy risk across the organization with respect to
  the organization’s risk tolerance, and approaches for monitoring risk over time.
  The senior accountable official for risk management (agency head or designated official)
  aligns information security management processes with strategic, operational, and
  budgetary planning processes. The risk executive function, led by the senior accountable
  official for risk management, can facilitate consistent application of the risk
  management strategy organization-wide. The risk management strategy can be informed
  by security and privacy risk-related inputs from other sources, both internal and
  external to the organization, to ensure that the strategy is broad-based and comprehensive.
  The supply chain risk management strategy described in PM-30 can also provide useful
  inputs to the organization- wide risk management strategy.
developer_guidance: 'PM-9 RISK MANAGEMENT STRATEGY is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Develops a comprehensive strategy to manage: 1. Security risk to organizational
  operations and assets, individuals, other organizations, and the Nation associated
  with the operation and use of organizational systems; and 2. Privacy risk to individuals
  resulting from the authorized processing of personally identifiable information

  - Implement the risk management strategy consistently across the organization; and

  - Review and update the risk management strategy [Assignment: organization-defined
  frequency] or as required, to address organizational changes. _________________________________________________________________________________________________
  CHAPTER THREE PAGE 208'
