description: 'SA-21 DEVELOPER SCREENING requires: Has appropriate access authorizations
  as determined by assigned [Assignment: organization- defined official government
  duties]; and; Satisfies the following additional personnel screening criteria: [Assignment:
  organization- defined additional personnel screening criteria].'
rationale: Developer screening is directed at external developers. Internal developer
  screening is addressed by PS-3. Because the system, system component, or system
  service may be used in critical activities essential to the national or economic
  security interests of the United States, organizations have a strong interest in
  ensuring that developers are trustworthy. The degree of _________________________________________________________________________________________________
  CHAPTER THREE PAGE 290 trust required of developers may need to be consistent with
  that of the individuals who access the systems, system components, or system services
  once deployed. Authorization and personnel screening criteria include clearances,
  background checks, citizenship, and nationality. Developer trustworthiness may also
  include a review and analysis of company ownership and relationships that the company
  has with entities that may potentially affect the quality and reliability of the
  systems, components, or services being developed. Satisfying the required access
  authorizations and personnel screening criteria includes providing a list of all
  individuals who are authorized to perform development activities on the selected
  system, system component, or system service so that organizations can validate that
  the developer has satisfied the authorization and screening requirements.
developer_guidance: 'SA-21 DEVELOPER SCREENING is a NIST SP 800-53 Rev. 5 requirement.

  Implementation expectations include:

  - Has appropriate access authorizations as determined by assigned [Assignment: organization-
  defined official government duties]; and

  - Satisfies the following additional personnel screening criteria: [Assignment:
  organization- defined additional personnel screening criteria]'
