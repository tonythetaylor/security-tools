description: 'PM-29 RISK MANAGEMENT PROGRAM LEADERSHIP ROLES requires: Appoint a Senior
  Accountable Official for Risk Management to align organizational information security
  and privacy management processes with strategic, operational, and budgetary planning
  processes; and; Establish a Risk Executive (function) to view and analyze risk from
  an organization-wide perspective and ensure management of risk is consistent across
  the organization.'
rationale: The senior accountable official for risk management leads the risk executive
  (function) in organization-wide risk management activities.
developer_guidance: 'PM-29 RISK MANAGEMENT PROGRAM LEADERSHIP ROLES is a NIST SP 800-53
  Rev. 5 requirement.

  Implementation expectations include:

  - Appoint a Senior Accountable Official for Risk Management to align organizational
  information security and privacy management processes with strategic, operational,
  and budgetary planning processes; and

  - Establish a Risk Executive (function) to view and analyze risk from an organization-wide
  perspective and ensure management of risk is consistent across the organization'
