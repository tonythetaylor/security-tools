severity_guidance: medium
description: "4.3.3 Poorly separated inter-container network traffic \nOrchestrators\
  \ should be configured to separate network traffic into discrete virtual networks\
  \ by \nsensitivity level. While per-app segmentation is also possible, for most\
  \ organizations and use \ncases, simply defining networks by sensitivity level provides\
  \ sufficient mitigation of risk with a \nmanageable degree of complexity. For example,\
  \ public-facing apps can share a virtual network,\n\ninternal apps can use another,\
  \ and communication between the two should occur through a small \nnumber of well-defined\
  \ interfaces."
