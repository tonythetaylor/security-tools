severity_guidance: medium
description: "4.3.5 Orchestrator node trust \nOrchestration platforms should be configured\
  \ to provide features that create a secure \nenvironment for all the apps they run.\
  \ Orchestrators should ensure that nodes are securely \nintroduced to the cluster,\
  \ have a persistent identity throughout their lifecycle, and can also \nprovide\
  \ an accurate inventory of nodes and their connectivity states. Organizations should\
  \ ensure \nthat orchestration platforms are designed specifically to be resilient\
  \ to compromise of individual \nnodes without compromising the overall security\
  \ of the cluster. A compromised node must be \nable to be isolated and removed from\
  \ the cluster without disrupting or degrading overall cluster \noperations. Finally,\
  \ organizations should choose orchestrators that provide mutually \nauthenticated\
  \ network connections between cluster members and end-to-end encryption of intra-\n\
  cluster traffic. Because of the portability of containers, many deployments may\
  \ occur across \nnetworks organizations do not directly control, so a secure-by-default\
  \ posture is particularly \nimportant for this scenario."
