severity_guidance: medium
description: "3.5.5 Host OS file system tampering \nInsecure container configurations\
  \ can expose host volumes to greater risk of file tampering. For \nexample, if a\
  \ container is allowed to mount sensitive directories on the host OS, that container\
  \ \ncan then change files in those directories. These changes could impact the stability\
  \ and security \nof the host and all other containers running on it.\n\nCountermeasures\
  \ for Major Risks \nThis section recommends countermeasures for the major risks\
  \ identified in Section 3."
