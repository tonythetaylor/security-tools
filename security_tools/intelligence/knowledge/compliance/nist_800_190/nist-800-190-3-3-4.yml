severity_guidance: medium
description: "3.3.4 Mixing of workload sensitivity levels \nOrchestrators are typically\
  \ focused primarily on driving the scale and density of workloads. This \nmeans\
  \ that, by default, they can place workloads of differing sensitivity levels on\
  \ the same host. \nFor example, in a default configuration, an orchestrator may\
  \ place a container running a public-\nfacing web server on the same host as one\
  \ processing sensitive financial data, simply because \nthat host happens to have\
  \ the most available resources at the time of deployment. In the case of a \ncritical\
  \ vulnerability in the web server, this can put the container processing sensitive\
  \ financial \ndata at significantly greater risk of compromise."
