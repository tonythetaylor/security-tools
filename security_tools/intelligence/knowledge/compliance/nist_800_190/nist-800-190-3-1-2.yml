severity_guidance: medium
description: "3.1.2 Image configuration defects \nIn addition to software defects,\
  \ images may also have configuration defects. For example, an \nimage may not be\
  \ configured with a specific user account to “run as” and thus run with greater\
  \ \nprivileges than needed. As another example, an image may include an SSH daemon,\
  \ which \nexposes the container to unnecessary network risk. Much like in a traditional\
  \ server or VM, \nwhere a poor configuration can still expose a fully up-to-date\
  \ system to attack, so too can a \npoorly configured image increase risk even if\
  \ all the included components are up-to-date."
