severity_guidance: medium
description: "3.1.5 Use of untrusted images \nOne of the most common high-risk scenarios\
  \ in any environment is the execution of untrusted \nsoftware. The portability and\
  \ ease of reuse of containers increase the temptation for teams to run \nimages\
  \ from external sources that may not be well validated or trustworthy. For example,\
  \ when \ntroubleshooting a problem with a web app, a user may find another version\
  \ of that app available \nin an image provided by a third party. Using this externally\
  \ provided image results in the same \ntypes of risks that external software traditionally\
  \ has, such as introducing malware, leaking data, \nor including components with\
  \ vulnerabilities."
