severity_guidance: medium
description: "4.1.2 Image configuration defects \nOrganizations should adopt tools\
  \ and processes to validate and enforce compliance with secure \nconfiguration best\
  \ practices. For example, images should be configured to run as non-privileged \n\
  users. Tools and processes that should be adopted include: \n1. Validation of image\
  \ configuration settings, including vendor recommendations and third-\nparty best\
  \ practices. \n2. Ongoing, continuously updated, centralized reporting and monitoring\
  \ of image \ncompliance state to identify weaknesses and risks at the organizational\
  \ level. \n3. Enforcement of compliance requirements by optionally preventing the\
  \ running of non-\ncompliant images. \n4. Use of base layers from trusted sources\
  \ only, frequent updates of base layers, and \nselection of base layers from minimalistic\
  \ technologies like Alpine Linux and Windows \nNano Server to reduce attack surface\
  \ areas.\n\nA final recommendation for image configuration is that SSH and other\
  \ remote administration \ntools designed to provide remote shells to hosts should\
  \ never be enabled within containers. \nContainers should be run in an immutable\
  \ manner to derive the greatest security benefit from \ntheir use. Enabling remote\
  \ access to them via these tools implies a degree of change that violates \nthis\
  \ principle and exposes them to greater risk of network-based attack. Instead, all\
  \ remote \nmanagement of containers should be done through the container runtime\
  \ APIs, which may be \naccessed via orchestration tools, or by creating remote shell\
  \ sessions to the host on which the \ncontainer is running."
