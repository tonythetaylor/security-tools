severity_guidance: medium
description: "4.5.3 Host OS component vulnerabilities \nOrganizations should implement\
  \ management practices and tools to validate the versioning of \ncomponents provided\
  \ for base OS management and functionality. Even though container-\nspecific OSs\
  \ have a much more minimal set of components than general-purpose OSs, they still\
  \ \ndo have vulnerabilities and still require remediation. Organizations should\
  \ use tools provided by \nthe OS vendor or other trusted organizations to regularly\
  \ check for and apply updates to all \nsoftware components used within the OS. The\
  \ OS should be kept up to date not only with \nsecurity updates, but also the latest\
  \ component updates recommended by the vendor. This is \nparticularly important\
  \ for the kernel and container runtime components as newer releases of \nthese components\
  \ often add additional security protections and capabilities beyond simply \ncorrecting\
  \ vulnerabilities. Some organizations may choose to simply redeploy new OS instances\
  \ \nwith the necessary updates, rather than updating existing systems. This approach\
  \ is also valid, \nalthough it often requires more sophisticated operational practices.\
  \ \nHost OSs should be operated in an immutable manner with no data or state stored\
  \ uniquely and \npersistently on the host and no application-level dependencies\
  \ provided by the host. Instead, all \napp components and dependencies should be\
  \ packaged and deployed in containers. This enables \nthe host to be operated in\
  \ a nearly stateless manner with a greatly reduced attack surface. \nAdditionally,\
  \ it provides a more trustworthy way to identify anomalies and configuration drift."
