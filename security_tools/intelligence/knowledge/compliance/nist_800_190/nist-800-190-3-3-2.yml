severity_guidance: medium
description: "3.3.2 Unauthorized access \nOrchestrators often include their own authentication\
  \ directory service, which may be separate \nfrom the typical directories already\
  \ in use within an organization. This can lead to weaker \naccount management practices\
  \ and ‘orphaned’ accounts in the orchestrator because these \nsystems are less rigorously\
  \ managed. Because many of these accounts are highly privileged \nwithin the orchestrator,\
  \ compromise of them can lead to systemwide compromise. \nContainers typically use\
  \ data storage volumes that are managed by the orchestration tool and are \nnot\
  \ host specific. Because a container may run on any given node within a cluster,\
  \ the data \nrequired by the app within the container must be available to the container\
  \ regardless of which \nhost it is running on. At the same time, many organizations\
  \ manage data that must be encrypted \nat rest to prevent unauthorized access."
