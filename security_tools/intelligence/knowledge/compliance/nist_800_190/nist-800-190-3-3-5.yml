severity_guidance: medium
description: "3.3.5 Orchestrator node trust \nMaintenance of trust between the nodes\
  \ in the environment requires special care. The \norchestrator is the most foundational\
  \ node. Weak orchestrator configurations can expose the \norchestrator and all other\
  \ container technology components to increased risk. Examples of \npossible consequences\
  \ include: \n• Unauthorized hosts joining the cluster and running containers \n\
  • The compromise of a single cluster host implying compromise of the entire cluster—for\
  \ \nexample, if the same key pairs used for authentication are shared across all\
  \ nodes \n• Communications between the orchestrator and DevOps personnel, administrators,\
  \ and \nhosts being unencrypted and unauthenticated"
