severity_guidance: medium
description: "3.5.1 Large attack surface \nEvery host OS has an attack surface, which\
  \ is the collection of all ways attackers can attempt to \naccess and exploit the\
  \ host OS’s vulnerabilities. For example, any network-accessible service \nprovides\
  \ a potential entry point for attackers, adding to the attack surface. The larger\
  \ the attack \nsurface is, the better the odds are that an attacker can find and\
  \ access a vulnerability, leading to a \ncompromise of the host OS and the containers\
  \ running on top of it."
