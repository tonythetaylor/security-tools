description: "4.2.1 Insecure connections to registries \nOrganizations should configure\
  \ their development tools, orchestrators, and container runtimes to \nonly connect\
  \ to registries over encrypted channels. The specific steps vary between tools,\
  \ but the \nkey goal is to ensure that all data pushed to and pulled from a registry\
  \ occurs between trusted \nendpoints and is encrypted in transit."
