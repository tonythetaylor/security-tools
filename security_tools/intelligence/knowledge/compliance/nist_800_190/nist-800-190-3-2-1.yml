severity_guidance: medium
description: "3.2.1 Insecure connections to registries \nImages often contain sensitive\
  \ components like an organization’s proprietary software and \nembedded secrets.\
  \ If connections to registries are performed over insecure channels, the contents\
  \ \nof images are subject to the same confidentiality risks as any other data transmitted\
  \ in the clear. \nThere is also an increased risk of man-in-the-middle attacks that\
  \ could intercept network traffic \nintended for registries and steal developer\
  \ or administrator credentials within that traffic, provide \nfraudulent or outdated\
  \ images to orchestrators, etc."
