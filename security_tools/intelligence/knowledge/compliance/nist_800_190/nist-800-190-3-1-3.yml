severity_guidance: medium
description: "3.1.3 Embedded malware \nBecause images are just collections of files\
  \ packaged together, malicious files could be included \nintentionally or inadvertently\
  \ within them. Such malware would have the same capabilities as \nany other component\
  \ within the image and thus could be used to attack other containers or hosts \n\
  within the environment. A possible source of embedded malware is the use of base\
  \ layers and \nother images provided by third parties of which the full provenance\
  \ is not known."
