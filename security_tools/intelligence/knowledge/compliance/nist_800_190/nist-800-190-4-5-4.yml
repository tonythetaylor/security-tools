severity_guidance: medium
description: "4.5.4 Improper user access rights \nThough most container deployments\
  \ rely on orchestrators to distribute jobs across hosts, \norganizations should\
  \ still ensure that all authentication to the OS is audited, login anomalies are\
  \ \nmonitored, and any escalation to perform privileged operations is logged. This\
  \ makes it possible \nto identify anomalous access patterns such as an individual\
  \ logging on to a host directly and \nrunning privileged commands to manipulate\
  \ containers."
