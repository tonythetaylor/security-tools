severity_guidance: medium
description: "3.5.3 Host OS component vulnerabilities \nAll host OSs, even container-specific\
  \ ones, provide foundational system components—for \nexample, the cryptographic\
  \ libraries used to authenticate remote connections and the kernel \nprimitives\
  \ used for general process invocation and management. Like any other software, these\
  \ \ncomponents can have vulnerabilities and, because they exist low in the container\
  \ technology \narchitecture, they can impact all the containers and apps that run\
  \ on these hosts."
