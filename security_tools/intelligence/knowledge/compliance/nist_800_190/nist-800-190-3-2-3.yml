severity_guidance: medium
description: "3.2.3 Insufficient authentication and authorization restrictions \n\
  Because registries may contain images used to run sensitive or proprietary apps\
  \ and to access \nsensitive data, insufficient authentication and authorization\
  \ requirements can lead to intellectual\n\nproperty loss and expose significant\
  \ technical details about an app to an attacker. Even more \ncritically, because\
  \ registries are typically trusted as a source of valid, approved software, \ncompromise\
  \ of a registry can potentially lead to compromise of downstream containers and\
  \ \nhosts."
