severity_guidance: medium
description: "3.1.4 Embedded clear text secrets \nMany apps require secrets to enable\
  \ secure communication between components. For example, a \nweb app may need a username\
  \ and password to connect to a backend database. Other examples \nof embedded secrets\
  \ include connection strings, SSH private keys, and X.509 private keys. \nWhen an\
  \ app is packaged into an image, these secrets can be embedded directly into the\
  \ image \nfile system. However, this practice creates a security risk because anyone\
  \ with access to the \nimage can easily parse it to learn these secrets."
