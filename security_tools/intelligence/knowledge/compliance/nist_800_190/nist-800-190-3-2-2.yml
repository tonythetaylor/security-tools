severity_guidance: medium
description: "3.2.2 Stale images in registries \nBecause registries are typically\
  \ the source location for all the images an organization deploys, \nover time the\
  \ set of images they store can include many vulnerable, out-of-date versions. While\
  \ \nthese vulnerable images do not directly pose a threat simply by being stored\
  \ in the registry, they \nincrease the likelihood of accidental deployment of a\
  \ known-vulnerable version."
