severity_guidance: medium
description: "4.4.5 Rogue containers \nOrganizations should institute separate environments\
  \ for development, test, production, and \nother scenarios, each with specific controls\
  \ to provide role-based access control for container \ndeployment and management\
  \ activities. All container creation should be associated with \nindividual user\
  \ identities and logged to provide a clear audit trail of activity. Further, \n\
  organizations are encouraged to use security tools that can enforce baseline requirements\
  \ for \nvulnerability management and compliance prior to allowing an image to be\
  \ run."
