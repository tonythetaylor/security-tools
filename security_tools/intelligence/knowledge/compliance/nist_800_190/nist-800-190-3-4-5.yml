severity_guidance: medium
description: "3.4.5 Rogue containers \nRogue containers are unplanned or unsanctioned\
  \ containers in an environment. This can be a \ncommon occurrence, especially in\
  \ development environments, where app developers may launch \ncontainers as a means\
  \ of testing their code. If these containers are not put through the rigors of \n\
  vulnerability scanning and proper configuration, they may be more susceptible to\
  \ exploits. \nRogue containers therefore pose additional risk to the organization,\
  \ especially when they persist \nin the environment without the awareness of development\
  \ teams and security administrators."
