severity_guidance: medium
description: "3.3.1 Unbounded administrative access \nHistorically, many orchestrators\
  \ were designed with the assumption that all users interacting \nwith them would\
  \ be administrators and those administrators should have environment-wide \ncontrol.\
  \ However, in many cases, a single orchestrator may run many different apps, each\
  \ \nmanaged by different teams, and with different sensitivity levels. If the access\
  \ provided to users \nand groups is not scoped to their specific needs, a malicious\
  \ or careless user could affect or \nsubvert the operation of other containers managed\
  \ by the orchestrator."
