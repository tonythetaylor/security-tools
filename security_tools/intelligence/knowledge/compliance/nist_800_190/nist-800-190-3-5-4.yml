severity_guidance: medium
description: "3.5.4 Improper user access rights \nContainer-specific OSs are typically\
  \ not optimized to support multiuser scenarios since \ninteractive user logon should\
  \ be rare. Organizations are exposed to risk when users log on \ndirectly to hosts\
  \ to manage containers, rather than going through an orchestration layer. Direct\
  \ \nmanagement enables wide-ranging changes to the system and all containers on\
  \ it, and can \npotentially enable a user that only needs to manage a specific app’s\
  \ containers to impact many \nothers."
