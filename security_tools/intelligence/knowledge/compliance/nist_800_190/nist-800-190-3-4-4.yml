severity_guidance: medium
description: "3.4.4 App vulnerabilities \nEven when organizations are taking the precautions\
  \ recommended in this guide, containers may \nstill be compromised due to flaws\
  \ in the apps they run. This is not a problem with containers \nthemselves, but\
  \ instead is just the manifestation of typical software flaws within a container\
  \ \nenvironment. For example, a containerized web app may be vulnerable to cross-site\
  \ scripting \nvulnerabilities, and a database front end container may be subject\
  \ to Structured Query Language \n(SQL) injection. When a container is compromised,\
  \ it can be misused in many ways, such as \ngranting unauthorized access to sensitive\
  \ information or enabling attacks against other containers \nor the host OS."
