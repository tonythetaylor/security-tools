- nist
- section_4_3_1
severity_guidance: medium
description: "4.3.1 Unbounded administrative access \nEspecially because of their\
  \ wide-ranging span of control, orchestrators should use a least \nprivilege access\
  \ model in which users are only granted the ability to perform the specific actions\
  \ \non the specific hosts, containers, and images their job roles require. For example,\
  \ members of the \ntest team should only be given access to the images used in testing\
  \ and the hosts used for running \nthem, and should only be able to manipulate the\
  \ containers they created. Test team members \nshould have limited or no access\
  \ to containers used in production."
