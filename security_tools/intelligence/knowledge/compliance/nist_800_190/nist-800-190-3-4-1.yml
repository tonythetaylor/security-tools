severity_guidance: medium
description: "3.4.1 Vulnerabilities within the runtime software \nWhile relatively\
  \ uncommon, vulnerabilities within the runtime software are particularly \ndangerous\
  \ if they allow ‘container escape’ scenarios in which malicious software can attack\
  \ \nresources in other containers and the host OS itself. An attacker may also be\
  \ able to exploit \nvulnerabilities to compromise the runtime software itself, and\
  \ then alter that software so it allows \nthe attacker to access other containers,\
  \ monitor container-to-container communications, etc."
