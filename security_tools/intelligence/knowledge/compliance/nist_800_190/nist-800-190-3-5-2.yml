severity_guidance: medium
description: "3.5.2 Shared kernel \nContainer-specific OSs have a much smaller attack\
  \ surface than that of general-purpose OSs. For \nexample, they do not contain libraries\
  \ and package managers that enable a general-purpose OS to \ndirectly run database\
  \ and web server apps. However, although containers provide strong \nsoftware-level\
  \ isolation of resources, the use of a shared kernel invariably results in a larger\
  \ \ninter-object attack surface than seen with hypervisors, even for container-specific\
  \ OSs. In other \nwords, the level of isolation provided by container runtimes is\
  \ not as high as that provided by \nhypervisors."
