severity_guidance: medium
description: "4.4.1 Vulnerabilities within the runtime software \nThe container runtime\
  \ must be carefully monitored for vulnerabilities, and when problems are \ndetected,\
  \ they must be remediated quickly. A vulnerable runtime exposes all containers it\
  \ \nsupports, as well as the host itself, to potentially significant risk. Organizations\
  \ should use tools \nto look for Common Vulnerabilities and Exposures (CVEs) vulnerabilities\
  \ in the runtimes \ndeployed, to upgrade any instances at risk, and to ensure that\
  \ orchestrators only allow \ndeployments to properly maintained runtimes."
