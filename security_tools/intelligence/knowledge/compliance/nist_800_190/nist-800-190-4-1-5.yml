severity_guidance: medium
description: "4.1.5 Use of untrusted images \nOrganizations should maintain a set\
  \ of trusted images and registries and ensure that only images \nfrom this set are\
  \ allowed to run in their environment, thus mitigating the risk of untrusted or\
  \ \nmalicious components being deployed. \nTo mitigate these risks, organizations\
  \ should take a multilayered approach that includes: \n\nFor more information on\
  \ NIST-validated cryptographic implementations, see the Cryptographic Module Validation\
  \ Program \n(CMVP) page at https://csrc.nist.gov/groups/STM/cmvp/.\n\n• Capability\
  \ to centrally control exactly what images and registries are trusted in their \n\
  environment; \n• Discrete identification of each image by cryptographic signature,\
  \ using a NIST-validated \nimplementation6; \n• Enforcement to ensure that all hosts\
  \ in the environment only run images from these \napproved lists; \n• Validation\
  \ of image signatures before image execution to ensure images are from trusted \n\
  sources and have not been tampered with; and \n• Ongoing monitoring and maintenance\
  \ of these repositories to ensure images within them \nare maintained and updated\
  \ as vulnerabilities and configuration requirements change."
