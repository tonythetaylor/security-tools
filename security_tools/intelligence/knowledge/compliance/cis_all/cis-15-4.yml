severity_guidance: medium
description: "15.4\nEnsure Service Provider Contracts Include Security Requirements\n\
  N/A\n-Protect-\n• •\nEnsure service provider contracts include security requirements.\
  \ Example requirements may include minimum security program \nrequirements, security\
  \ incident and/or data breach notification and response, data encryption requirements,\
  \ and data disposal \ncommitments. These security requirements must be consistent\
  \ with the enterprise’s service provider management policy. Review service \nprovider\
  \ contracts annually to ensure contracts are not missing security requirements.\n\
  \nCIS Controls v8\nA14 \n\uFEFFControls and Safeguards Index\nControl 15 / Safeguard\
  \ 15.5 — Control 16 / Safeguard 16.7\nCONTROL\nSAFEGUARD\nNUMBER\nTITLE/ \nDESCRIPTION\n\
  ASSET TYPE\nSECURITY FUNCTION\nIG1\nIG2\nIG3"
