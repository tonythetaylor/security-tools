description: "17.2\nEstablish and Maintain Contact Information for Reporting Security\
  \ Incidents\nN/A\n-Respond-\n• • •\nEstablish and maintain contact information for\
  \ parties that need to be informed of security incidents. Contacts may include internal\
  \ \nstaff, third-party vendors, law enforcement, cyber insurance providers, relevant\
  \ government agencies, Information Sharing and Analysis \nCenter (ISAC) partners,\
  \ or other stakeholders. Verify contacts annually to ensure that information is\
  \ up-to-date."
