description: "16.14\nConduct Threat Modeling\nApplications\n-Protect-\n•\nConduct\
  \ threat modeling. Threat modeling is the process of identifying and addressing\
  \ application security design flaws within a design, \nbefore code is created. It\
  \ is conducted through specially trained individuals who evaluate the application\
  \ design and gauge security \nrisks for each entry point and access level. The goal\
  \ is to map out the application, architecture, and infrastructure in a structured\
  \ way to \nunderstand its weaknesses."
