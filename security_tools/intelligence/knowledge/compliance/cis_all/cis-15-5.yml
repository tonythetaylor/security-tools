severity_guidance: medium
description: "15.5\nAssess Service Providers\nN/A\n-Identify-\n•\nAssess service providers\
  \ consistent with the enterprise’s service provider management policy. Assessment\
  \ scope may vary based on \nclassification(s), and may include review of standardized\
  \ assessment reports, such as Service Organization Control 2 (SOC 2) and \nPayment\
  \ Card Industry (PCI) Attestation of Compliance (AoC), customized questionnaires,\
  \ or other appropriately rigorous processes. \nReassess service providers annually,\
  \ at a minimum, or with new and renewed contracts."
