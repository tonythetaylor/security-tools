description: "13.1\nCentralize Security Event Alerting\nNetwork\n-Detect-\n• •\nCentralize\
  \ security event alerting across enterprise assets for log correlation and analysis.\
  \ Best practice implementation requires the use \nof a SIEM, which includes vendor-defined\
  \ event correlation alerts. A log analytics platform configured with security-relevant\
  \ correlation \nalerts also satisfies this Safeguard."
