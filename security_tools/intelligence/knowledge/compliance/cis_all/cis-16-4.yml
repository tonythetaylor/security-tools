severity_guidance: medium
description: "16.4\nEstablish and Manage an Inventory of Third-Party Software Components\n\
  Applications\n-Protect-\n• •\nEstablish and manage an updated inventory of third-party\
  \ components used in development, often referred to as a “bill of materials,” as\
  \ \nwell as components slated for future use. This inventory is to include any risks\
  \ that each third-party component could pose. Evaluate the \nlist at least monthly\
  \ to identify any changes or updates to these components, and validate that the\
  \ component is still supported."
