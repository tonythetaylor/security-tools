description: "4.12\nSeparate Enterprise Workspaces on Mobile End-User Devices\nDevices\n\
  -Protect-\n•\nEnsure separate enterprise workspaces are used on mobile end-user\
  \ devices, where supported. Example implementations \ninclude using an Apple® Configuration\
  \ Profile or Android™ Work Profile to separate enterprise applications and data\
  \ from personal \napplications and data."
