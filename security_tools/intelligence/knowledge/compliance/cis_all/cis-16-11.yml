severity_guidance: medium
description: "16.11\nLeverage Vetted Modules or Services for Application Security\
  \ Components\nApplications\n-Protect-\n• •\nLeverage vetted modules or services\
  \ for application security components, such as identity management, encryption,\
  \ and auditing and \nlogging. Using platform features in critical security functions\
  \ will reduce developers’ workload and minimize the likelihood of design or \nimplementation\
  \ errors. Modern operating systems provide effective mechanisms for identification,\
  \ authentication, and authorization \nand make those mechanisms available to applications.\
  \ Use only standardized, currently accepted, and extensively reviewed encryption\
  \ \nalgorithms. Operating systems also provide mechanisms to create and maintain\
  \ secure audit logs."
