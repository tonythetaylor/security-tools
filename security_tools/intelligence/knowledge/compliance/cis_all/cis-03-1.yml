description: "3.1\nEstablish and Maintain a Data Management Process\nData\n-Identify-\n\
  • • •\nEstablish and maintain a data management process. In the process, address\
  \ data sensitivity, data owner, handling of data, data retention \nlimits, and disposal\
  \ requirements, based on sensitivity and retention standards for the enterprise.\
  \ Review and update documentation \nannually, or when significant enterprise changes\
  \ occur that could impact this Safeguard."
