description: "14.4\nTrain Workforce on Data Handling Best Practices\nN/A\n-Protect-\n\
  • • •\nTrain workforce members on how to identify and properly store, transfer,\
  \ archive, and destroy sensitive data. This also includes training \nworkforce members\
  \ on clear screen and desk best practices, such as locking their screen when they\
  \ step away from their enterprise \nasset, erasing physical and virtual whiteboards\
  \ at the end of meetings, and storing data and assets securely."
