description: "1.2\nAddress Unauthorized Assets\nDevices\n-Respond-\n• • •\nEnsure\
  \ that a process exists to address unauthorized assets on a weekly basis. The enterprise\
  \ may choose to remove the asset from the \nnetwork, deny the asset from connecting\
  \ remotely to the network, or quarantine the asset."
