description: "16.7\nUse Standard Hardening Configuration Templates for Application\
  \ Infrastructure\nApplications\n-Protect-\n• •\nUse standard, industry-recommended\
  \ hardening configuration templates for application infrastructure components. This\
  \ includes \nunderlying servers, databases, and web servers, and applies to cloud\
  \ containers, Platform as a Service (PaaS) components, and SaaS \ncomponents. Do\
  \ not allow in-house developed software to weaken configuration hardening.\n\nCIS\
  \ Controls v8\nA15 \n\uFEFFControls and Safeguards Index\nControl 16 / Safeguard\
  \ 16.8 — Control 17 / Safeguard 17.4\nCONTROL\nSAFEGUARD\nNUMBER\nTITLE/ \nDESCRIPTION\n\
  ASSET TYPE\nSECURITY FUNCTION\nIG1\nIG2\nIG3"
