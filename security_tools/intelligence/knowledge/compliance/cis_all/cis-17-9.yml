description: "17.9\nEstablish and Maintain Security Incident Thresholds\nN/A\n-Recover-\n\
  •\nEstablish and maintain security incident thresholds, including, at a minimum,\
  \ differentiating between an incident and an event. Examples \ncan include: abnormal\
  \ activity, security vulnerability, security weakness, data breach, privacy incident,\
  \ etc. Review annually, or when \nsignificant enterprise changes occur that could\
  \ impact this Safeguard."
