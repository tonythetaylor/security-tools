description: "6.8\nDefine and Maintain Role-Based Access Control\nData\n-Protect-\n\
  •\nDefine and maintain role-based access control, through determining and documenting\
  \ the access rights necessary for each role within \nthe enterprise to successfully\
  \ carry out its assigned duties. Perform access control reviews of enterprise assets\
  \ to validate that all \nprivileges are authorized, on a recurring schedule at a\
  \ minimum annually, or more frequently."
