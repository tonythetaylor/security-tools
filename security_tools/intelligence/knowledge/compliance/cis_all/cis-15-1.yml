description: "15.1\nEstablish and Maintain an Inventory of Service Providers\nN/A\n\
  -Identify-\n• • •\nEstablish and maintain an inventory of service providers. The\
  \ inventory is to list all known service providers, include classification(s), \n\
  and designate an enterprise contact for each service provider. Review and update\
  \ the inventory annually, or when significant enterprise \nchanges occur that could\
  \ impact this Safeguard."
