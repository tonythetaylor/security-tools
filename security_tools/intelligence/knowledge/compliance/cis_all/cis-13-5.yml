description: "13.5\nManage Access Control for Remote Assets\nDevices\n-Protect-\n\
  \ • •\nManage access control for assets remotely connecting to enterprise resources.\
  \ Determine amount of access to enterprise resources \nbased on: up-to-date anti-malware\
  \ software installed, configuration compliance with the enterprise’s secure configuration\
  \ process, and \nensuring the operating system and applications are up-to-date."
