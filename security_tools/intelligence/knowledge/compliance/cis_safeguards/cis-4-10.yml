description: "4.10\nEnforce Automatic Device Lockout on Portable End-User Devices\n\
  Devices\n-Respond-\n• •\nEnforce automatic device lockout following a predetermined\
  \ threshold of local failed authentication attempts on portable end-user \ndevices,\
  \ where supported. For laptops, do not allow more than 20 failed authentication\
  \ attempts; for tablets and smartphones, no more \nthan 10 failed authentication\
  \ attempts. Example implementations include Microsoft® InTune Device Lock and Apple®\
  \ Configuration Profile \nmaxFailedAttempts."
