description: "16.6\nEstablish and Maintain a Severity Rating System and Process for\
  \ Application \nVulnerabilities\nApplications\n-Protect-\n• •\nEstablish and maintain\
  \ a severity rating system and process for application vulnerabilities that facilitates\
  \ prioritizing the order in \nwhich discovered vulnerabilities are fixed. This process\
  \ includes setting a minimum level of security acceptability for releasing code\
  \ or \napplications. Severity ratings bring a systematic way of triaging vulnerabilities\
  \ that improves risk management and helps ensure the most \nsevere bugs are fixed\
  \ first. Review and update the system and process annually."
