description: "12.8\nEstablish and Maintain Dedicated Computing Resources for All Administrative\
  \ Work\nDevices\n-Protect-\n•\nEstablish and maintain dedicated computing resources,\
  \ either physically or logically separated, for all administrative tasks or tasks\
  \ \nrequiring administrative access. The computing resources should be segmented\
  \ from the enterprise’s primary network and not be \nallowed internet access.\n\n\
