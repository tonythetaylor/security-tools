description: "8.1\nEstablish and Maintain an Audit Log Management Process\nNetwork\n\
  -Protect-\n• • •\nEstablish and maintain an audit log management process that defines\
  \ the enterprise’s logging requirements. At a minimum, address \nthe collection,\
  \ review, and retention of audit logs for enterprise assets. Review and update documentation\
  \ annually, or when significant \nenterprise changes occur that could impact this\
  \ Safeguard."
