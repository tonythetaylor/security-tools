description: "2.2\nEnsure Authorized Software is Currently Supported \nApplications\n\
  -Identify-\n• • •\nEnsure that only currently supported software is designated as\
  \ authorized in the software inventory for enterprise assets. If software \nis unsupported,\
  \ yet necessary for the fulfillment of the enterprise’s mission, document an exception\
  \ detailing mitigating controls and \nresidual risk acceptance. For any unsupported\
  \ software without an exception documentation, designate as unauthorized. Review\
  \ the \nsoftware list to verify software support at least monthly, or more frequently."
