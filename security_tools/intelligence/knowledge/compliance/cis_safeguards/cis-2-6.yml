description: "2.6\nAllowlist Authorized Libraries\nApplications\n-Protect-\n• •\n\
  Use technical controls to ensure that only authorized software libraries, such as\
  \ specific .dll, .ocx, .so, etc., files are allowed to load into a \nsystem process.\
  \ Block unauthorized libraries from loading into a system process. Reassess bi-annually,\
  \ or more frequently."
