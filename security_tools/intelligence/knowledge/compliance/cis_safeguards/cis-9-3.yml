description: "9.3\nMaintain and Enforce Network-Based URL Filters\nNetwork\n-Protect-\n\
  • •\nEnforce and update network-based URL filters to limit an enterprise asset from\
  \ connecting to potentially malicious or unapproved \nwebsites. Example implementations\
  \ include category-based filtering, reputation-based filtering, or through the use\
  \ of block lists. Enforce \nfilters for all enterprise assets."
