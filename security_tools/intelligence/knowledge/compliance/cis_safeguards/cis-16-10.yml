description: "16.10\nApply Secure Design Principles in Application Architectures\n\
  Applications\n-Protect-\n• •\nApply secure design principles in application architectures.\
  \ Secure design principles include the concept of least privilege and enforcing\
  \ \nmediation to validate every operation that the user makes, promoting the concept\
  \ of “never trust user input.” Examples include ensuring \nthat explicit error checking\
  \ is performed and documented for all input, including for size, data type, and\
  \ acceptable ranges or formats. \nSecure design also means minimizing the application\
  \ infrastructure attack surface, such as turning off unprotected ports and services,\
  \ \nremoving unnecessary programs and files, and renaming or removing default accounts."
