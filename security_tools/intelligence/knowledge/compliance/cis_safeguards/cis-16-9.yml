description: "16.9\nTrain Developers in Application Security Concepts and Secure Coding\n\
  Applications\n-Protect-\n• •\nEnsure that all software development personnel receive\
  \ training in writing secure code for their specific development environment and\
  \ \nresponsibilities. Training can include general security principles and application\
  \ security standard practices. Conduct training at least \nannually and design in\
  \ a way to promote security within the development team, and build a culture of\
  \ security among the developers."
