description: "4.3\nConfigure Automatic Session Locking on Enterprise Assets\nUsers\n\
  -Protect-\n• • •\nConfigure automatic session locking on enterprise assets after\
  \ a defined period of inactivity. For general purpose operating systems, the \n\
  period must not exceed 15 minutes. For mobile end-user devices, the period must\
  \ not exceed 2 minutes."
