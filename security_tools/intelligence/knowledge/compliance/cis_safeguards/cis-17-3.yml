description: "17.3\nEstablish and Maintain an Enterprise Process for Reporting Incidents\n\
  N/A\n-Respond-\n• • •\nEstablish and maintain an enterprise process for the workforce\
  \ to report security incidents. The process includes reporting timeframe, \npersonnel\
  \ to report to, mechanism for reporting, and the minimum information to be reported.\
  \ Ensure the process is publicly available to \nall of the workforce. Review annually,\
  \ or when significant enterprise changes occur that could impact this Safeguard."
