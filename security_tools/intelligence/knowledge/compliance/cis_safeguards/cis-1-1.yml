description: "1.1\nEstablish and Maintain Detailed Enterprise Asset Inventory\nDevices\n\
  -Identify-\n• • •\nEstablish and maintain an accurate, detailed, and up-to-date\
  \ inventory of all enterprise assets with the potential to store or process data,\
  \ \nto include: end-user devices (including portable and mobile), network devices,\
  \ non-computing/IoT devices, and servers. Ensure the \ninventory records the network\
  \ address (if static), hardware address, machine name, enterprise asset owner, department\
  \ for each asset, \nand whether the asset has been approved to connect to the network.\
  \ For mobile end-user devices, MDM type tools can support this \nprocess, where\
  \ appropriate. This inventory includes assets connected to the infrastructure physically,\
  \ virtually, remotely, and those within \ncloud environments. Additionally, it includes\
  \ assets that are regularly connected to the enterprise’s network infrastructure,\
  \ even if they \nare not under control of the enterprise. Review and update the\
  \ inventory of all enterprise assets bi-annually, or more frequently."
