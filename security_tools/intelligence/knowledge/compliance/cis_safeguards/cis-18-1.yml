description: "18.1\nEstablish and Maintain a Penetration Testing Program\nN/A\n-Identify-\n\
  • •\nEstablish and maintain a penetration testing program appropriate to the size,\
  \ complexity, and maturity of the enterprise. Penetration \ntesting program characteristics\
  \ include scope, such as network, web application, Application Programming Interface\
  \ (API), hosted \nservices, and physical premise controls; frequency; limitations,\
  \ such as acceptable hours, and excluded attack types; point of contact \ninformation;\
  \ remediation, such as how findings will be routed internally; and retrospective\
  \ requirements."
