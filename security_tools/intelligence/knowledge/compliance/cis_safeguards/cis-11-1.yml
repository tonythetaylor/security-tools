description: "11.1\nEstablish and Maintain a Data Recovery Process \nData\n-Recover-\n\
  • • •\nEstablish and maintain a data recovery process. In the process, address the\
  \ scope of data recovery activities, recovery prioritization, and \nthe security\
  \ of backup data. Review and update documentation annually, or when significant\
  \ enterprise changes occur that could impact \nthis Safeguard."
