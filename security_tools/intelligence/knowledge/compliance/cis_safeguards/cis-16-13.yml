description: "16.13\nConduct Application Penetration Testing\nApplications\n-Protect-\n\
  •\nConduct application penetration testing. For critical applications, authenticated\
  \ penetration testing is better suited to finding business \nlogic vulnerabilities\
  \ than code scanning and automated security testing. Penetration testing relies\
  \ on the skill of the tester to manually \nmanipulate an application as an authenticated\
  \ and unauthenticated user."
