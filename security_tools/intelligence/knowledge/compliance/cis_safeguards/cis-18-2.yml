description: "18.2\nPerform Periodic External Penetration Tests\nNetwork\n-Identify-\n\
  • •\nPerform periodic external penetration tests based on program requirements,\
  \ no less than annually. External penetration testing must \ninclude enterprise\
  \ and environmental reconnaissance to detect exploitable information. Penetration\
  \ testing requires specialized skills and \nexperience and must be conducted through\
  \ a qualified party. The testing may be clear box or opaque box."
