description: "3.8\nDocument Data Flows\nData\n-Identify-\n• •\nDocument data flows.\
  \ Data flow documentation includes service provider data flows and should be based\
  \ on the enterprise’s data \nmanagement process. Review and update documentation\
  \ annually, or when significant enterprise changes occur that could impact \nthis\
  \ Safeguard."
