description: "15.2\nEstablish and Maintain a Service Provider Management Policy\n\
  N/A\n-Identify-\n• •\nEstablish and maintain a service provider management policy.\
  \ Ensure the policy addresses the classification, inventory, assessment, \nmonitoring,\
  \ and decommissioning of service providers. Review and update the policy annually,\
  \ or when significant enterprise changes \noccur that could impact this Safeguard."
