description: "5.5\nEstablish and Maintain an Inventory of Service Accounts\nUsers\n\
  -Identify-\n• •\nEstablish and maintain an inventory of service accounts. The inventory,\
  \ at a minimum, must contain department owner, review date, \nand purpose. Perform\
  \ service account reviews to validate that all active accounts are authorized, on\
  \ a recurring schedule at a minimum \nquarterly, or more frequently."
