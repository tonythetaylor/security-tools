description: "17.7\nConduct Routine Incident Response Exercises\nN/A\n-Recover-\n\
  • •\nPlan and conduct routine incident response exercises and scenarios for key\
  \ personnel involved in the incident response process to \nprepare for responding\
  \ to real-world incidents. Exercises need to test communication channels, decision\
  \ making, and workflows. \nConduct testing on an annual basis, at a minimum."
