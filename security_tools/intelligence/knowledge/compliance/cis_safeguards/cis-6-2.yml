description: "6.2\nEstablish an Access Revoking Process\nUsers\n-Protect-\n• • •\n\
  Establish and follow a process, preferably automated, for revoking access to enterprise\
  \ assets, through disabling accounts immediately \nupon termination, rights revocation,\
  \ or role change of a user. Disabling accounts, instead of deleting accounts, may\
  \ be necessary to \npreserve audit trails."
