description: "3.7\nEstablish and Maintain a Data Classification Scheme\nData\n-Identify-\n\
  • •\nEstablish and maintain an overall data classification scheme for the enterprise.\
  \ Enterprises may use labels, such as “Sensitive,” \n“Confidential,” and “Public,”\
  \ and classify their data according to those labels. Review and update the classification\
  \ scheme annually, or \nwhen significant enterprise changes occur that could impact\
  \ this Safeguard."
