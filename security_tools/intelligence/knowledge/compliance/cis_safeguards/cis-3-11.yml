description: "3.11\nEncrypt Sensitive Data at Rest\nData\n-Protect-\n• •\nEncrypt\
  \ sensitive data at rest on servers, applications, and databases containing sensitive\
  \ data. Storage-layer encryption, also known \nas server-side encryption, meets\
  \ the minimum requirement of this Safeguard. Additional encryption methods may include\
  \ application-\nlayer encryption, also known as client-side encryption, where access\
  \ to the data storage device(s) does not permit access to the \nplain-text data."
