description: "14.1\nEstablish and Maintain a Security Awareness Program\nN/A\n-Protect-\n\
  • • •\nEstablish and maintain a security awareness program. The purpose of a security\
  \ awareness program is to educate the enterprise’s \nworkforce on how to interact\
  \ with enterprise assets and data in a secure manner. Conduct training at hire and,\
  \ at a minimum, annually. \nReview and update content annually, or when significant\
  \ enterprise changes occur that could impact this Safeguard."
