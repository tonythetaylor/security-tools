description: "2.7\nAllowlist Authorized Scripts\nApplications\n-Protect-\n•\nUse technical\
  \ controls, such as digital signatures and version control, to ensure that only\
  \ authorized scripts, such as specific .ps1, .py, etc., \nfiles are allowed to execute.\
  \ Block unauthorized scripts from executing. Reassess bi-annually, or more frequently."
