description: "17.6\nDefine Mechanisms for Communicating During Incident Response\n\
  N/A\n-Respond-\n• •\nDetermine which primary and secondary mechanisms will be used\
  \ to communicate and report during a security incident. Mechanisms \ncan include\
  \ phone calls, emails, or letters. Keep in mind that certain mechanisms, such as\
  \ emails, can be affected during a security \nincident. Review annually, or when\
  \ significant enterprise changes occur that could impact this Safeguard."
