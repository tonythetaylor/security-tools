description: "PW.6.1: Use compiler, interpreter, and build tools that \noffer features\
  \ to improve executable security. \nExample 1: Use up-to-date versions of compiler,\
  \ interpreter, and build tools. \nExample 2: Follow change management processes\
  \ when deploying or updating \ncompiler, interpreter, and build tools, and audit\
  \ all unexpected changes to tools. \nExample 3: Regularly validate the authenticity\
  \ and integrity of compiler, \ninterpreter, and build tools. See PO.3. \nBSAFSS:\
