description: "PW.4.4: Verify that acquired commercial, open-source, \nand all other\
  \ third-party software components comply \nwith the requirements, as defined by\
  \ the organization, \nthroughout their life cycles. \nExample 1: Regularly check\
  \ whether there are publicly known vulnerabilities in \nthe software modules and\
  \ services that vendors have not yet fixed. \nExample 2: Build into the toolchain\
  \ automatic detection of known vulnerabilities in \nsoftware components. \nExample\
  \ 3: Use existing results from commercial services for vetting the software \nmodules\
  \ and services. \nExample 4: Ensure that each software component is still actively\
  \ maintained and \nhas not reached end of life; this should include new vulnerabilities\
  \ found in the \nsoftware being remediated. \nExample 5: Determine a plan of action\
  \ for each software component that is no \nlonger being maintained or will not be\
  \ available in the near future. \nExample 6: Confirm the integrity of software components\
  \ through digital \nsignatures or other mechanisms. \nExample 7: Review, analyze,\
  \ and/or test code. See PW.7 and PW.8. \nBSAFSS: SC.3-1, SM.2-1, SM.2-2, SM.2-3,\
  \ TV.2, TV.3 \nBSIMM: CP3.2, SR2.4, SR3.1, SR3.2, SE2.4, SE3.6 \nCNCFSSCP: Securing\
  \ Materials—Verification, Automation \nEO14028: 4e(iii), 4e(iv), 4e(vi), 4e(ix),\
  \ 4e(x) \nIDASOAR: 21 \nIEC62443: SI-1, SM-9, SM-10, DM-1 \nIR8397: 2.11 \nMSSDL:\
  \ 7 \nNISTCSF: ID.SC-4, PR.DS-6 \nNISTLABEL: 2.2.2.2 \nOWASPASVS: 10, 14.2 \nOWASPMASVS:\
  \ 7.5 \nOWASPSAMM: TA3-A, SR3-B \nOWASPSCVS: 4, 5, 6 \nPCISSLC: 3.2, 3.4, 4.1 \n\
  SCAGILE: Tasks Requiring the Help of Security Experts 8 \nSCFPSSD: Manage Security\
  \ Risk Inherent in the Use of Third-Party Components \nSCSIC: Vendor Sourcing Integrity\
  \ Controls, Peer Reviews and Security Testing \nSCTPC: MAINTAIN, ASSESS \nSP80053:\
