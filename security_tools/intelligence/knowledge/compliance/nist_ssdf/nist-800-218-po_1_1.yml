severity_guidance: medium
description: "PO.1.1: Identify and document all security \nrequirements for the organization’s\
  \ software \ndevelopment infrastructures and processes, and \nmaintain the requirements\
  \ over time. \nExample 1: Define policies for securing software development infrastructures\
  \ and \ntheir components, including development endpoints, throughout the SDLC and\
  \ \nmaintaining that security. \nExample 2: Define policies for securing software\
  \ development processes \nthroughout the SDLC and maintaining that security, including\
  \ for open-source and \nother third-party software components utilized by software\
  \ being developed. \nExample 3: Review and update security requirements at least\
  \ annually, or sooner \nif there are new requirements from internal or external\
  \ sources, or a major \nsecurity incident targeting software development infrastructure\
  \ has occurred. \nExample 4: Educate affected individuals on impending changes to\
  \ requirements. \nBSAFSS: SM.3, DE.1, IA.1, IA.2 \nBSIMM: CP1.1, CP1.3, SR1.1, SR2.2,\
  \ SE1.2, SE2.6 \nEO14028: 4e(ix) \nIEC62443: SM-7, SM-9 \nNISTCSF: ID.GV-3 \nOWASPASVS:\
  \ 1.1.1 \nOWASPMASVS: 1.10 \nOWASPSAMM: PC1-A, PC1-B, PC2-A \nPCISSLC: 2.1, 2.2\
  \ \nSCFPSSD: Planning the Implementation and Deployment of Secure Development Practices\
  \ \nSP80053: SA-1, SA-8, SA-15, SR-3 \nSP800160: 3.1.2, 3.2.1, 3.2.2, 3.3.1, 3.4.2,\
  \ 3.4.3 \nSP800161: SA-1, SA-8, SA-15, SR-3 \nSP800181: T0414; K0003, K0039, K0044,\
  \ K0157, K0168, K0177, K0211, K0260, K0261, \nK0262, K0524; S0010, S0357, S0368;\
  \ A0033, A0123, A0151"
