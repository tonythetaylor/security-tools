severity_guidance: high
description: "RV.1.3: Have a policy that addresses vulnerability \ndisclosure and\
  \ remediation, and implement the roles, \nresponsibilities, and processes needed\
  \ to support that \npolicy. \nExample 1: Establish a vulnerability disclosure program,\
  \ and make it easy for \nsecurity researchers to learn about your program and report\
  \ possible \nvulnerabilities. \nExample 2: Have a Product Security Incident Response\
  \ Team (PSIRT) and \nprocesses in place to handle the responses to vulnerability\
  \ reports and incidents, \nincluding communications plans for all stakeholders.\
  \ \nExample 3: Have a security response playbook to handle a generic reported \n\
  vulnerability, a report of zero-days, a vulnerability being exploited in the wild,\
  \ and \na major ongoing incident involving multiple parties and open-source software\
  \ \ncomponents. \nExample 4: Periodically conduct exercises of the product security\
  \ incident \nresponse processes. \nBSAFSS: VM.1-1, VM.2 \nBSIMM: CMVM1.1, CMVM2.1,\
  \ CMVM3.3, CMVM3.7 \nEO14028: 4e(viii), 4e(ix) \nIEC62443: DM-1, DM-2, DM-3, DM-4,\
  \ DM-5 \nISO29147: All \nISO30111: All \nMSSDL: 12 \nNISTLABEL: 2.2.2.3 \nOWASPMASVS:\
  \ 1.11 \nOWASPSAMM: IM1-A, IM1-B, IM2-A, IM2-B \nPCISSLC: 9.2, 9.3 \nSCFPSSD: Vulnerability\
  \ Response and Disclosure \nSP80053: SA-15(10) \nSP800160: 3.3.8 \nSP800161: SA-15(10)\
  \ \nSP800181: K0041, K0042, K0151, K0292, K0317; S0054; A0025 \nSP800216: All \n\
  Assess, Prioritize, and Remediate \nVulnerabilities (RV.2): Help ensure that \n\
  vulnerabilities are remediated in accordance with \nrisk to reduce the window of\
  \ opportunity for \nattackers."
