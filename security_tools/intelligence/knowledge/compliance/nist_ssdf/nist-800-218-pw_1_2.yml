developer_guidance: "PW.1.2 Track and maintain the software’s security defines an\
  \ actionable SSDF task. Use it when findings indicate a gap in development workflow,\
  \ toolchain, review, testing, or vulnerability response.\n\nPW.1.2: Track and maintain\
  \ the software’s security \nrequirements, risks, and design decisions. \nExample\
  \ 1: Record the response to each risk, including how mitigations are to be \nachieved\
  \ and what the rationales are for any approved exceptions to the security \nrequirements.\
  \ Add any mitigations to the software’s security requirements. \nExample 2: Maintain\
  \ records of design decisions, risk responses, and approved \nexceptions that can\
  \ be used for auditing and maintenance purposes throughout \nthe rest of the software\
  \ life cycle. \nExample 3: Periodically re-evaluate all approved exceptions to the\
  \ security \nrequirements, and implement changes as needed. \nBSAFSS: SC.1-1, PD.1-1\
  \ \nBSIMM: SFD3.1, SFD3.3, AA2.2, AA3.2 \nEO14028: 4e(v), 4e(ix) \nIEC62443: SD-1\
  \ \nISO27034: 7.3.3 \nMSSDL: 4 \nNISTLABEL: 2.2.2.2 \nOWASPASVS: 1.1.3, 1.1.4 \n\
  OWASPMASVS: 1.3, 1.6 \nOWASPSAMM: DR1-B \nPCISSLC: 3.2, 3.3 \nSP80053: SA-8, SA-10,\
  \ SA-17 \nSP800161: SA-8, SA-17 \nSP800181: T0256; K0005, K0038, K0039, K0147, K0149,\
  \ K0160, K0161, K0162, K0165, \nK0344, K0362, K0487; S0006, S0009, S0078, S0171,\
  \ S0229, S0248; A0092, A0107\n\nEnriched Guidance:\nPW.1.2 Track and maintain the\
  \ software’s security is an SSDF practice or task."
