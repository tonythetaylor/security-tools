description: "PW.1.2: Track and maintain the software’s security \nrequirements, risks,\
  \ and design decisions. \nExample 1: Record the response to each risk, including\
  \ how mitigations are to be \nachieved and what the rationales are for any approved\
  \ exceptions to the security \nrequirements. Add any mitigations to the software’s\
  \ security requirements. \nExample 2: Maintain records of design decisions, risk\
  \ responses, and approved \nexceptions that can be used for auditing and maintenance\
  \ purposes throughout \nthe rest of the software life cycle. \nExample 3: Periodically\
  \ re-evaluate all approved exceptions to the security \nrequirements, and implement\
  \ changes as needed. \nBSAFSS: SC.1-1, PD.1-1 \nBSIMM: SFD3.1, SFD3.3, AA2.2, AA3.2\
  \ \nEO14028: 4e(v), 4e(ix) \nIEC62443: SD-1 \nISO27034: 7.3.3 \nMSSDL: 4 \nNISTLABEL:\
  \ 2.2.2.2 \nOWASPASVS: 1.1.3, 1.1.4 \nOWASPMASVS: 1.3, 1.6 \nOWASPSAMM: DR1-B \n\
  PCISSLC: 3.2, 3.3 \nSP80053: SA-8, SA-10, SA-17 \nSP800161: SA-8, SA-17 \nSP800181:\
