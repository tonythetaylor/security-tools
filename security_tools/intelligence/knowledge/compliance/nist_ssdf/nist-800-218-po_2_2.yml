description: "PO.2.2: Provide role-based training for all personnel \nwith responsibilities\
  \ that contribute to secure \ndevelopment. Periodically review personnel proficiency\
  \ \nand role-based training, and update the training as \nneeded. \nExample 1: Document\
  \ the desired outcomes of training for each role. \nExample 2: Define the type of\
  \ training or curriculum required to achieve the \ndesired outcome for each role.\
  \ \nExample 3: Create a training plan for each role. \nExample 4: Acquire or create\
  \ training for each role; acquired training may need \nto be customized for the\
  \ organization. \nExample 5: Measure outcome performance to identify areas where\
  \ changes to \ntraining may be beneficial. \nBSAFSS: PD.2-2 \nBSIMM: T1.1, T1.7,\
  \ T1.8, T2.5, T2.8, T2.9, T3.1, T3.2, T3.4 \nEO14028: 4e(ix) \nIEC62443: SM-4 \n\
  MSSDL: 1 \nNISTCSF: PR.AT \nOWASPSAMM: EG1-A, EG2-A \nPCISSLC: 1.3 \nSCAGILE: Operational\
  \ Security Tasks 14, 15; Tasks Requiring the Help of Security Experts \n1 \nSCFPSSD:\
  \ Planning the Implementation and Deployment of Secure Development Practices \n\
