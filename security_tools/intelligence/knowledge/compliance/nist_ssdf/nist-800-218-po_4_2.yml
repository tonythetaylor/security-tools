developer_guidance: "PO.4.2 Implement processes, mechanisms, etc. to defines an actionable\
  \ SSDF task. Use it when findings indicate a gap in development workflow, toolchain,\
  \ review, testing, or vulnerability response.\n\nPO.4.2: Implement processes, mechanisms,\
  \ etc. to \ngather and safeguard the necessary information in \nsupport of the criteria.\
  \ \nExample 1: Use the toolchain to automatically gather information that informs\
  \ \nsecurity decision-making. \nExample 2: Deploy additional tools if needed to\
  \ support the generation and \ncollection of information supporting the criteria.\
  \ \nExample 3: Automate decision-making processes utilizing the criteria, and \n\
  periodically review these processes. \nExample 4: Only allow authorized personnel\
  \ to access the gathered information, \nand prevent any alteration or deletion of\
  \ the information. \nBSAFSS: PD.1-4, PD.1-5 \nBSIMM: SM1.4, SM2.1, SM2.2, SM3.4\
  \ \nEO14028: 4e(iv), 4e(v), 4e(ix) \nIEC62443: SI-1, SVV-1, SVV-2, SVV-3, SVV-4\
  \ \nOWASPSAMM: PC3-B \nPCISSLC: 2.5 \nSCSIC: Vendor Software Delivery Integrity\
  \ Controls \nSP80053: SA-15, SA-15(1), SA-15(11) \nSP800160: 3.2.5, 3.3.7 \nSP800161:\
  \ SA-15, SA-15(1), SA-15(11) \nSP800181: T0349; K0153 \nImplement and Maintain Secure\
  \ \nEnvironments for Software Development \n(PO.5): Ensure that all components of\
  \ the \nenvironments for software development are \nstrongly protected from internal\
  \ and external \nthreats to prevent compromises of the \nenvironments or the software\
  \ being developed \nor maintained within them. Examples of \nenvironments for software\
  \ development include \ndevelopment, build, test, and distribution \nenvironments.\n\
  \nEnriched Guidance:\nPO.4.2 Implement processes, mechanisms, etc. to is an SSDF\
