severity_guidance: high
description: "PS.2.1: Make software integrity verification information \navailable\
  \ to software acquirers. \nExample 1: Post cryptographic hashes for release files\
  \ on a well-secured \nwebsite. \nExample 2: Use an established certificate authority\
  \ for code signing so that \nconsumers’ operating systems or other tools and services\
  \ can confirm the validity \nof signatures before use. \nExample 3: Periodically\
  \ review the code signing processes, including certificate \nrenewal, rotation,\
  \ revocation, and protection. \nBSAFSS: SM.4, SM.5, SM.6 \nBSIMM: SE2.4 \nCNCFSSCP:\
  \ Securing Deployments—Verification \nEO14028: 4e(iii), 4e(ix), 4e(x) \nIEC62443:\
  \ SM-6, SM-8, SUM-4 \nNISTCSF: PR.DS-6 \nNISTLABEL: 2.2.2.4 \nOWASPSAMM: OE3-B \n\
  OWASPSCVS: 4 \nPCISSLC: 6.1, 6.2 \nSCSIC: Vendor Software Delivery Integrity Controls\
  \ \nSP80053: SA-8 \nSP800161: SA-8 \nSP800181: K0178 \nArchive and Protect Each\
  \ Software Release \n(PS.3): Preserve software releases in order to \nhelp identify,\
  \ analyze, and eliminate \nvulnerabilities discovered in the software after \nrelease."
