description: "PW.1.3: Where appropriate, build in support for using \nstandardized\
  \ security features and services (e.g., \nenabling software to integrate with existing\
  \ log \nmanagement, identity management, access control, \nand vulnerability management\
  \ systems) instead of \ncreating proprietary implementations of security \nfeatures\
  \ and services. [Formerly PW.4.3] \nExample 1: Maintain one or more software repositories\
  \ of modules for supporting \nstandardized security features and services. \nExample\
  \ 2: Determine secure configurations for modules for supporting \nstandardized security\
  \ features and services, and make these configurations \navailable (e.g., as configuration-as-code)\
  \ so developers can readily use them. \nExample 3: Define criteria for which security\
  \ features and services must be \nsupported by software to be developed. \nBSAFSS:\
  \ SI.2-1, SI.2-2, LO.1 \nBSIMM: SFD1.1, SFD2.1, SFD3.2, SR1.1, SR3.4 \nEO14028:\
  \ 4e(ix) \nIEC62443: SD-1, SD-4 \nMSSDL: 5 \nOWASPASVS: 1.1.6 \nOWASPSAMM: SA2-A\
  \ \nSCFPSSD: Standardize Identity and Access Management; Establish Log Requirements\
  \ and \nAudit Practices\n\n \n \n \n \n \n12 \nPractices \nTasks \nNotional Implementation\
  \ Examples \nReferences \nReview the Software Design to Verify \nCompliance with\
  \ Security Requirements and \nRisk Information (PW.2): Help ensure that the \nsoftware\
  \ will meet the security requirements and \nsatisfactorily address the identified\
  \ risk \ninformation."
