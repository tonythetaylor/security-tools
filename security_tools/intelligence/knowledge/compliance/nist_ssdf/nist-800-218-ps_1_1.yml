description: "PS.1.1: Store all forms of code – including source \ncode, executable\
  \ code, and configuration-as-code – \nbased on the principle of least privilege\
  \ so that only \nauthorized personnel, tools, services, etc. have \naccess. \nExample\
  \ 1: Store all source code and configuration-as-code in a code repository, \nand\
  \ restrict access to it based on the nature of the code. For example, open-\nsource\
  \ code intended for public access may need its integrity and availability \nprotected;\
  \ other code may also need its confidentiality protected. \nExample 2: Use version\
  \ control features of the repository to track all changes \nmade to the code with\
  \ accountability to the individual account. \nExample 3: Use commit signing for\
  \ code repositories. \nExample 4: Have the code owner review and approve all changes\
  \ made to the \ncode by others. \nExample 5: Use code signing8 to help protect the\
  \ integrity of executables. \nExample 6: Use cryptography (e.g., cryptographic hashes)\
  \ to help protect file \nintegrity. \nBSAFSS: IA.1, IA.2, SM.4-1, DE.1-2 \nBSIMM:\
  \ SE2.4 \nCNCFSSCP: Securing the Source Code—Verification, Automation, Controlled\
  \ \nEnvironments, Secure Authentication; Securing Materials—Automation \nEO14028:\
  \ 4e(iii), 4e(iv), 4e(ix) \nIDASOAR: Fact Sheet 25 \nIEC62443: SM-6, SM-7, SM-8\
  \ \nNISTCSF: PR.AC-4, PR.DS-6, PR.IP-3 \nOWASPASVS: 1.10, 10.3.2 \nOWASPMASVS: 7.1\
  \ \nOWASPSAMM: OE3-B \nPCISSLC: 5.1, 6.1 \nSCSIC: Vendor Software Delivery Integrity\
  \ Controls, Vendor Software Development Integrity \nControls \nSP80053: SA-10 \n\
  SP800161: SA-8, SA-10 \n \n7 \nSee NIST SP 800-207, Zero Trust Architecture, for\
  \ additional information (https://doi.org/10.6028/NIST.SP.800-207). \n8 \nFor more\
  \ information on code signing, see NIST Cybersecurity White Paper, Security Considerations\
  \ for Code Signing (https://doi.org/10.6028/NIST.CSWP.01262018).\n\n \n \n \n \n\
  \ \n10 \nPractices \nTasks \nNotional Implementation Examples \nReferences \nProvide\
  \ a Mechanism for Verifying Software \nRelease Integrity (PS.2): Help software \n\
  acquirers ensure that the software they acquire \nis legitimate and has not been\
  \ tampered with."
