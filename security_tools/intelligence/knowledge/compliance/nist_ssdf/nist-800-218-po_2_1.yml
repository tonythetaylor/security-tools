description: "PO.2.1: Create new roles and alter responsibilities for \nexisting roles\
  \ as needed to encompass all parts of the \nSDLC. Periodically review and maintain\
  \ the defined \nroles and responsibilities, updating them as needed. \nExample 1:\
  \ Define SDLC-related roles and responsibilities for all members of the \nsoftware\
  \ development team. \nExample 2: Integrate the security roles into the software\
  \ development team. \nExample 3: Define roles and responsibilities for cybersecurity\
  \ staff, security \nchampions, project managers and leads, senior management, software\
  \ \ndevelopers, software testers, software assurance leads and staff, product owners,\
  \ \noperations and platform engineers, and others involved in the SDLC. \nExample\
  \ 4: Conduct an annual review of all roles and responsibilities. \nExample 5: Educate\
  \ affected individuals on impending changes to roles and \nresponsibilities, and\
  \ confirm that the individuals understand the changes and \nagree to follow them.\
  \ \nExample 6: Implement and use tools and processes to promote communication \n\
  and engagement among individuals with SDLC-related roles and responsibilities, \n\
  such as creating messaging channels for team discussions. \nExample 7: Designate\
  \ a group of individuals or a team as the code owner for \neach project. \nBSAFSS:\
  \ PD.2-1, PD.2-2 \nBSIMM: SM1.1, SM2.3, SM2.7, CR1.7 \nEO14028: 4e(ix) \nIEC62443:\
  \ SM-2, SM-13 \nNISTCSF: ID.AM-6, ID.GV-2 \nPCISSLC: 1.2 \nSCSIC: Vendor Software\
  \ Development Integrity Controls \nSP80053: SA-3 \nSP800160: 3.2.1, 3.2.4, 3.3.1\
  \ \nSP800161: SA-3 \nSP800181: K0233"
