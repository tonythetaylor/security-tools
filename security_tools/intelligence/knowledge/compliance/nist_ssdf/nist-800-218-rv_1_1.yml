description: "RV.1.1: Gather information from software acquirers, \nusers, and public\
  \ sources on potential vulnerabilities in \nthe software and third-party components\
  \ that the \nsoftware uses, and investigate all credible reports. \nExample 1: Monitor\
  \ vulnerability databases9, security mailing lists, and other \nsources of vulnerability\
  \ reports through manual or automated means. \nExample 2: Use threat intelligence\
  \ sources to better understand how \nvulnerabilities in general are being exploited.\
  \ \nExample 3: Automatically review provenance and software composition data for\
  \ \nall software components to identify any new vulnerabilities they have. \nBSAFSS:\
