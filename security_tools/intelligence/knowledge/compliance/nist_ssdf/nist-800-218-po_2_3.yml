description: "PO.2.3: Obtain upper management or authorizing \nofficial commitment\
  \ to secure development, and \nconvey that commitment to all with development-\n\
  related roles and responsibilities. \nExample 1: Appoint a single leader or leadership\
  \ team to be responsible for the \nentire secure software development process, including\
  \ being accountable for \nreleasing software to production and delegating responsibilities\
  \ as appropriate. \nExample 2: Increase authorizing officials’ awareness of the\
  \ risks of developing \nsoftware without integrating security throughout the development\
  \ life cycle and \nthe risk mitigation provided by secure development practices.\
  \ \nExample 3: Assist upper management in incorporating secure development \nsupport\
  \ into their communications with personnel with development-related roles \nand\
  \ responsibilities. \nExample 4: Educate all personnel with development-related\
  \ roles and \nresponsibilities on upper management’s commitment to secure development\
  \ and \nthe importance of secure development to the organization. \nBSIMM: SM1.3,\
  \ SM2.7, CP2.5 \nEO14028: 4e(ix) \nNISTCSF: ID.RM-1, ID.SC-1 \nOWASPSAMM: SM1.A\
  \ \nPCISSLC: 1.1 \nSP800181: T0001, T0004 \nImplement Supporting Toolchains (PO.3):\
  \ \nUse automation to reduce human effort and \nimprove the accuracy, reproducibility,\
  \ usability, \nand comprehensiveness of security practices \nthroughout the SDLC,\
  \ as well as provide a way \nto document and demonstrate the use of these \npractices.\
  \ Toolchains and tools may be used at \ndifferent levels of the organization, such\
  \ as \norganization-wide or project-specific, and may \naddress a particular part\
  \ of the SDLC, like a \nbuild pipeline."
