description: "PW.7.1: Determine whether code review (a person \nlooks directly at\
  \ the code to find issues) and/or code \nanalysis (tools are used to find issues\
  \ in code, either in \na fully automated way or in conjunction with a person) \n\
  should be used, as defined by the organization. \nExample 1: Follow the organization’s\
  \ policies or guidelines for when code review \nshould be performed and how it should\
  \ be conducted. This may include third-\nparty code and reusable code modules written\
  \ in-house. \nExample 2: Follow the organization’s policies or guidelines for when\
  \ code \nanalysis should be performed and how it should be conducted. \nExample\
  \ 3: Choose code review and/or analysis methods based on the stage of \nthe software.\
  \ \nBSIMM: CR1.5 \nEO14028: 4e(iv), 4e(ix) \nIEC62443: SM-5, SI-1, SVV-1 \nNISTLABEL:\
