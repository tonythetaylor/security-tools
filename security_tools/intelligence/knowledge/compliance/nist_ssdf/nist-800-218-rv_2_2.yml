  \ review, testing, or vulnerability response.\n\nRV.2.2: Plan and implement risk\
  \ responses for \nvulnerabilities. \nExample 1: Make a risk-based decision as to\
  \ whether each vulnerability will be \nremediated or if the risk will be addressed\
