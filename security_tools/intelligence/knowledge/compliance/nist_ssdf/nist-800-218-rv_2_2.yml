  \ any actions to be taken. \nExample 2: If a permanent mitigation for a vulnerability\
  \ is not yet available, \ndetermine how the vulnerability can be temporarily mitigated\
  \ until the permanent \nsolution is available, and add that temporary remediation\
  \ to the plan. \nExample 3: Develop and release security advisories that provide\
  \ the necessary \ninformation to software acquirers, including descriptions of what\
  \ the vulnerabilities \nare, how to find instances of the vulnerable software, and\
  \ how to address them \n(e.g., where to get patches and what the patches change\
  \ in the software; what \nconfiguration settings may need to be changed; how temporary\
  \ workarounds \ncould be implemented). \nExample 4: Deliver remediations to acquirers\
  \ via an automated and trusted \ndelivery mechanism. A single remediation could\
  \ address multiple vulnerabilities. \nExample 5: Update records of design decisions,\
  \ risk responses, and approved \nexceptions as needed. See PW.1.2. \nBSAFSS: VM.1-1,\
  \ VM-2 \nBSIMM: CMVM2.1 \nEO14028: 4e(iv), 4e(vi), 4e(viii), 4e(ix) \nIEC62443:\
