severity_guidance: high
description: "PS.3.1: Securely archive the necessary files and \nsupporting data (e.g.,\
  \ integrity verification information, \nprovenance data) to be retained for each\
  \ software \nrelease. \nExample 1: Store the release files, associated images, etc.\
  \ in repositories \nfollowing the organization’s established policy. Allow read-only\
  \ access to them by \nnecessary personnel and no access by anyone else. \nExample\
  \ 2: Store and protect release integrity verification information and \nprovenance\
  \ data, such as by keeping it in a separate location from the release \nfiles or\
  \ by signing the data. \nBSAFSS: PD.1-5, DE.1-2, IA.2 \nCNCFSSCP: Securing Artefacts—Automation,\
  \ Controlled Environments, Encryption; \nSecuring Deployments—Verification \nEO14028:\
  \ 4e(iii), 4e(vi), 4e(ix), 4e(x) \nIDASOAR: 25 \nIEC62443: SM-6, SM-7 \nNISTCSF:\
  \ PR.IP-4 \nOWASPSCVS: 1, 3.18, 3.19, 6.3 \nPCISSLC: 5.2, 6.1, 6.2 \nSCSIC: Vendor\
  \ Software Delivery Integrity Controls \nSP80053: SA-10, SA-15, SA-15(11), SR-4\
  \ \nSP800161: SA-8, SA-10, SA-15(11), SR-4"
