description: "Produce Well-Secured Software (PW) \nDesign Software to Meet Security\
  \ \nRequirements and Mitigate Security Risks \n(PW.1): Identify and evaluate the\
  \ security \nrequirements for the software; determine what \nsecurity risks the\
  \ software is likely to face during \noperation and how the software’s design and\
  \ \narchitecture should mitigate those risks; and \njustify any cases where risk-based\
  \ analysis \nindicates that security requirements should be \nrelaxed or waived.\
  \ Addressing security \nrequirements and risks during software design \n(secure\
  \ by design) is key for improving software \nsecurity and also helps improve development\
  \ \nefficiency. \nPW.1.1: Use forms of risk modeling – such as threat \nmodeling,\
  \ attack modeling, or attack surface mapping \n– to help assess the security risk\
  \ for the software. \nExample 1: Train the development team (security champions,\
  \ in particular) or \ncollaborate with a risk modeling expert to create models and\
  \ analyze how to use \na risk-based approach to communicate the risks and determine\
  \ how to address \nthem, including implementing mitigations. \nExample 2: Perform\
  \ more rigorous assessments for high-risk areas, such as \nprotecting sensitive\
  \ data and safeguarding identification, authentication, and \naccess control, including\
  \ credential management. \nExample 3: Review vulnerability reports and statistics\
  \ for previous software to \ninform the security risk assessment. \nExample 4: Use\
  \ data classification methods to identify and characterize each \ntype of data that\
  \ the software will interact with. \nBSAFSS: SC.1 \nBSIMM: AM1.2, AM1.3, AM1.5,\
  \ AM2.1, AM2.2, AM2.5, AM2.6, AM2.7, SFD2.2, AA1.1, \nAA1.2, AA1.3, AA2.1 \nEO14028:\
  \ 4e(ix) \nIDASOAR: 1 \nIEC62443: SM-4, SR-1, SR-2, SD-1 \nIR8397: 2.1 \nISO27034:\
  \ 7.3.3 \nMSSDL: 4 \nNISTCSF: ID.RA \nOWASPASVS: 1.1.2, 1.2, 1.4, 1.6, 1.8, 1.9,\
  \ 1.11, 2, 3, 4, 6, 8, 9, 11, 12, 13 \nOWASPMASVS: 1.6, 1.8, 2, 3, 4, 5, 6 \nOWASPSAMM:\
  \ TA1-A, TA1-B, TA3-B, DR1-A \nPCISSLC: 3.2, 3.3 \nSCAGILE: Tasks Requiring the\
  \ Help of Security Experts 3 \nSCFPSSD: Threat Modeling \nSCTTM: Entire guide \n\
  SP80053: SA-8, SA-11(2), SA-11(6), SA-15(5) \nSP800160: 3.3.4, 3.4.5 \nSP800161:\
  \ SA-8, SA-11(2), SA-11(6), SA-15(5) \nSP800181: T0038, T0062; K0005, K0009, K0038,\
  \ K0039, K0070, K0080, K0119, K0147, \nK0149, K0151, K0152, K0160, K0161, K0162,\
  \ K0165, K0297, K0310, K0344, K0362, \nK0487, K0624; S0006, S0009, S0022, S0078,\
  \ S0171, S0229, S0248; A0092, A0093, \nA0107 \nPW.1.2: Track and maintain the software’s\
  \ security \nrequirements, risks, and design decisions. \nExample 1: Record the\
  \ response to each risk, including how mitigations are to be \nachieved and what\
  \ the rationales are for any approved exceptions to the security \nrequirements.\
  \ Add any mitigations to the software’s security requirements. \nExample 2: Maintain\
  \ records of design decisions, risk responses, and approved \nexceptions that can\
  \ be used for auditing and maintenance purposes throughout \nthe rest of the software\
  \ life cycle. \nExample 3: Periodically re-evaluate all approved exceptions to the\
  \ security \nrequirements, and implement changes as needed. \nBSAFSS: SC.1-1, PD.1-1\
  \ \nBSIMM: SFD3.1, SFD3.3, AA2.2, AA3.2 \nEO14028: 4e(v), 4e(ix) \nIEC62443: SD-1\
  \ \nISO27034: 7.3.3 \nMSSDL: 4 \nNISTLABEL: 2.2.2.2 \nOWASPASVS: 1.1.3, 1.1.4 \n\
  OWASPMASVS: 1.3, 1.6 \nOWASPSAMM: DR1-B \nPCISSLC: 3.2, 3.3 \nSP80053: SA-8, SA-10,\
  \ SA-17 \nSP800161: SA-8, SA-17 \nSP800181: T0256; K0005, K0038, K0039, K0147, K0149,\
  \ K0160, K0161, K0162, K0165, \nK0344, K0362, K0487; S0006, S0009, S0078, S0171,\
  \ S0229, S0248; A0092, A0107 \nPW.1.3: Where appropriate, build in support for using\
  \ \nstandardized security features and services (e.g., \nenabling software to integrate\
  \ with existing log \nmanagement, identity management, access control, \nand vulnerability\
  \ management systems) instead of \ncreating proprietary implementations of security\
  \ \nfeatures and services. [Formerly PW.4.3] \nExample 1: Maintain one or more software\
  \ repositories of modules for supporting \nstandardized security features and services.\
  \ \nExample 2: Determine secu"
