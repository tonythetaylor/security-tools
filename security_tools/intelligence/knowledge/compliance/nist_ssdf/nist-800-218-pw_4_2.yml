description: "PW.4.2: Create and maintain well-secured software \ncomponents in-house\
  \ following SDLC processes to \nmeet common internal software development needs\
  \ \nthat cannot be better met by third-party software \ncomponents. \nExample 1:\
  \ Follow organization-established security practices for secure \nsoftware development\
  \ when creating and maintaining the components. \nExample 2: Determine secure configurations\
  \ for software components, and make \nthese available (e.g., as configuration-as-code)\
  \ so developers can readily use the \nconfigurations. \nExample 3: Maintain one\
  \ or more software repositories for these components. \nExample 4: Designate which\
  \ components must be included in software to be \ndeveloped. \nExample 5: Implement\
  \ processes to update deployed software components to \nnewer versions, and maintain\
  \ older versions of software components until all \ntransitions from those versions\
  \ have been completed successfully. \nBSIMM: SFD1.1, SFD2.1, SFD3.2, SR1.1 \nEO14028:\
  \ 4e(ix) \nIDASOAR: 19 \nOWASPASVS: 1.1.6 \nSCTPC: MAINTAIN \nSP80053: SA-8(3) \n\
  SP800161: SA-8(3) \nSP800181: SP-DEV-001"
