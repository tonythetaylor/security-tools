description: "PO.1.3: Communicate requirements to all third parties \nwho will provide\
  \ commercial software components to \nthe organization for reuse by the organization’s\
  \ own \nsoftware. [Formerly PW.3.1] \nExample 1: Define a core set of security requirements\
  \ for software components, \nand include it in acquisition documents, software contracts,\
  \ and other agreements \nwith third parties. \nExample 2: Define security-related\
  \ criteria for selecting software; the criteria can \ninclude the third party’s\
  \ vulnerability disclosure program and product security \nincident response capabilities\
  \ or the third party’s adherence to organization-\ndefined practices. \nExample\
  \ 3: Require third parties to attest that their software complies with the \norganization’s\
  \ security requirements. \nBSAFSS: SM.1, SM.2, SM.2-1, SM.2-4 \nBSIMM: CP2.4, CP3.2,\
  \ SR2.5, SR3.2 \nEO14028: 4e(vi), 4e(ix) \nIDASOAR: 19, 21 \nIEC62443: SM-9, SM-10\
  \ \nMSSDL: 7 \nNISTCSF: ID.SC-3 \nOWASPSAMM: SR3-A\n\n \n \n \n \n \n6 \nPractices\
  \ \nTasks \nNotional Implementation Examples \nReferences \nExample 4: Require third\
  \ parties to provide provenance5 data and integrity \nverification mechanisms for\
  \ all components of their software. \nExample 5: Establish and follow processes\
  \ to address risk when there are \nsecurity requirements that third-party software\
  \ components to be acquired do not \nmeet; this should include periodic reviews\
  \ of all approved exceptions to \nrequirements. \nSCAGILE: Tasks Requiring the Help\
  \ of Security Experts 8 \nSCFPSSD: Manage Security Risk Inherent in the Use of Third-Party\
  \ Components \nSCSIC: Vendor Sourcing Integrity Controls \nSP80053: SA-4, SA-9,\
  \ SA-10, SA-10(1), SA-15, SR-3, SR-4, SR-5 \nSP800160: 3.1.1, 3.1.2 \nSP800161:\
  \ SA-4, SA-9, SA-9(1), SA-9(3), SA-10, SA-10(1), SA-15, SR-3, SR-4, SR-5 \nSP800181:\
  \ T0203, T0415; K0039; S0374; A0056, A0161 \nImplement Roles and Responsibilities\
  \ (PO.2): \nEnsure that everyone inside and outside of the \norganization involved\
  \ in the SDLC is prepared to \nperform their SDLC-related roles and \nresponsibilities\
  \ throughout the SDLC."
