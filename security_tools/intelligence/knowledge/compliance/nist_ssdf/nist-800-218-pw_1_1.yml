description: "PW.1.1: Use forms of risk modeling – such as threat \nmodeling, attack\
  \ modeling, or attack surface mapping \n– to help assess the security risk for the\
  \ software. \nExample 1: Train the development team (security champions, in particular)\
  \ or \ncollaborate with a risk modeling expert to create models and analyze how\
  \ to use \na risk-based approach to communicate the risks and determine how to address\
  \ \nthem, including implementing mitigations. \nExample 2: Perform more rigorous\
  \ assessments for high-risk areas, such as \nprotecting sensitive data and safeguarding\
  \ identification, authentication, and \naccess control, including credential management.\
  \ \nExample 3: Review vulnerability reports and statistics for previous software\
  \ to \ninform the security risk assessment. \nExample 4: Use data classification\
  \ methods to identify and characterize each \ntype of data that the software will\
  \ interact with. \nBSAFSS: SC.1 \nBSIMM: AM1.2, AM1.3, AM1.5, AM2.1, AM2.2, AM2.5,\
