description: "PO.3.1: Specify which tools or tool types must or \nshould be included\
  \ in each toolchain to mitigate \nidentified risks, as well as how the toolchain\
  \ \ncomponents are to be integrated with each other. \nExample 1: Define categories\
  \ of toolchains, and specify the mandatory tools or \ntool types to be used for\
  \ each category. \nExample 2: Identify security tools to integrate into the developer\
  \ toolchain. \nExample 3: Define what information is to be passed between tools\
  \ and what data \nformats are to be used. \nExample 4: Evaluate tools’ signing capabilities\
  \ to create immutable records/logs \nfor auditability within the toolchain. \nExample\
  \ 5: Use automated technology for toolchain management and \norchestration. \nBSIMM:\
  \ CR1.4, ST1.4, ST2.5, SE2.7 \nCNCFSSCP: Securing Materials—Verification; Securing\
  \ Build Pipelines—Verification, \nAutomation, Secure Authentication/Access; Securing\
  \ Artefacts—Verification; Securing \nDeployments—Verification \nEO14028: 4e(iii),\
  \ 4e(ix) \nMSSDL: 8 \nOWASPSAMM: IR2-B, ST2-B \nSCAGILE: Tasks Requiring the Help\
  \ of Security Experts 9 \nSCSIC: Vendor Software Delivery Integrity Controls \n\
  SP80053: SA-15 \nSP800161: SA-15 \nSP800181: K0013, K0178"
