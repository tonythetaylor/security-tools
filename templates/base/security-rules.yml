.security_rule_template:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'
    - if: '$CI_PIPELINE_SOURCE == "pipeline"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

.security_base:
  extends: .security_rule_template
  stage: security
  allow_failure: true