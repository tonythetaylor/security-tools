include:
  - local: "/templates/base/security-rules.yml"

security_review:
  extends: .security_rule_template
  stage: review
  image: python:${PYTHON_VERSION}

  needs:
    - job: dependency_scan
      optional: true
      artifacts: true
    - job: secret_detection
      optional: true
      artifacts: true
    - job: sast
      optional: true
      artifacts: true
    - job: container_scanning
      optional: true
      artifacts: true
    - job: dockerfile_scan
      optional: true
      artifacts: true
    - job: iac_scanning
      optional: true
      artifacts: true

  script:
    - apt-get update && apt-get install -y git >/dev/null 2>&1 || true

    - |
      if [ ! -d .security-tools ]; then
        git clone --depth 1 \
          --branch "${SECURITY_TOOLS_REF:-main}" \
          "http://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${SECURITY_TOOLS_PROJECT_PATH}.git" \
          .security-tools
      fi

    - python -m pip install ./.security-tools

    - ls -la
    - find . -maxdepth 2 -type f | sort

    - python -m security_tools.cli