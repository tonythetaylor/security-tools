include:
  - local: "/templates/base/security-rules.yml"

security_review:
  extends: .security_rule_template
  stage: review
  image: python:${PYTHON_VERSION}

  needs:
    - job: dependency_scan
      optional: true
      artifacts: true
    - job: secret_detection
      optional: true
      artifacts: true
    - job: sast
      optional: true
      artifacts: true
    - job: container_scanning
      optional: true
      artifacts: true
    - job: dockerfile_scan
      optional: true
      artifacts: true
    - job: iac_scanning
      optional: true
      artifacts: true
    - job: container_runtime_verify
      optional: true
      artifacts: true

  variables:
    SECURITY_TOOLS_CLONE_DIR: "/tmp/security-tools"

  before_script:
    - apt-get update -qq && apt-get install -y -qq git >/dev/null 2>&1 || true

  script:
    - |-
      set +e

      write_status() {
        echo "$1" > security-review-status.json
      }

      fail() {
        MESSAGE="$1"
        PAYLOAD="$2"
        EXIT_CODE="$3"
        write_status "$PAYLOAD"
        echo "$MESSAGE"
        exit "$EXIT_CODE"
      }

      CLONE_URL="http://gitlab-ci-token:${CI_JOB_TOKEN}@host.docker.internal:8088/${SECURITY_TOOLS_PROJECT_PATH}.git"
      TOOLS_DIR="${SECURITY_TOOLS_CLONE_DIR}"

      rm -rf "${TOOLS_DIR}"

      git clone --depth 1 \
        --branch "${SECURITY_TOOLS_REF:-main}" \
        "${CLONE_URL}" \
        "${TOOLS_DIR}"

      if [ $? -ne 0 ]; then
        fail \
          "Failed to clone security-tools repository" \
          '{"status":"operational_error","step":"clone","message":"Unable to clone shared repo","final_verdict":"OPERATIONAL_ERROR"}' \
          2
      fi

      python -m pip install "${TOOLS_DIR}"

      if [ $? -ne 0 ]; then
        fail \
          "Failed to install security-tools package" \
          '{"status":"operational_error","step":"install","message":"Unable to install shared package","final_verdict":"OPERATIONAL_ERROR"}' \
          2
      fi

      echo "Workspace snapshot:"
      find . \
        -path "./.git" -prune -o \
        -path "./.security-tools" -prune -o \
        -type f -maxdepth 2 -print | sort

      security-review
      REVIEW_RC=$?

      case "$REVIEW_RC" in
        1)
          fail \
            "Security review completed with BLOCK" \
            '{"status":"block","final_verdict":"BLOCK","message":"Security review completed with BLOCK"}' \
            1
          ;;
        2)
          fail \
            "Security review completed with OPERATIONAL_ERROR" \
            '{"status":"operational_error","step":"review","final_verdict":"OPERATIONAL_ERROR","message":"Security review returned operational error"}' \
            2
          ;;
        *)
          write_status '{"status":"pass","final_verdict":"PASS_OR_WARN","message":"Security review completed successfully"}'
          echo "Security review completed successfully"
          exit 0
          ;;
      esac

  artifacts:
    when: always
    paths:
      - security-review-status.json
      - runtime-report.json
      - runtime-summary.md
      - gl-*.json
      - gl-*.sarif
      - checkov-report.json
      - hadolint-report.json
      - safety-report.json
    expire_in: 1 week

  allow_failure:
    exit_codes:
      - 2