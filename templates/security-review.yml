stages:
  - build
  - security
  - review
  - test

default:
  tags:
    - docker

variables:
  PYTHON_VERSION: "3.12"
  GITLEAKS_VERSION: "8.24.2"
  TRIVY_VERSION: "0.69.3"
  SECURITY_TOOLS_REF: "main"
  SECURITY_TOOLS_PROJECT_PATH: "root/security-tools"
  ENABLE_MR_COMMENTS: "true"

dependency_scan:
  stage: security
  image: python:${PYTHON_VERSION}
  script:
    - pip install safety || true
    - safety check --json > safety-report.json || echo "[]" > safety-report.json
  artifacts:
    paths:
      - safety-report.json
    expire_in: 1 week
  allow_failure: true

secret_detection:
  stage: security
  image: alpine:latest
  script:
    - apk add --no-cache curl tar
    - ARCH="$(uname -m)"
    - |
      if [ "$ARCH" = "aarch64" ]; then
        GITLEAKS_ARCH="arm64"
      else
        GITLEAKS_ARCH="x64"
      fi
    - curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_${GITLEAKS_ARCH}.tar.gz" -o gitleaks.tar.gz
    - tar -xzf gitleaks.tar.gz
    - chmod +x gitleaks
    - ./gitleaks detect --source . --report-format json --report-path gl-secret-detection-report.json || true
    - test -f gl-secret-detection-report.json || echo "[]" > gl-secret-detection-report.json
  artifacts:
    paths:
      - gl-secret-detection-report.json
    reports:
      secret_detection: gl-secret-detection-report.json
    expire_in: 1 week
  allow_failure: true

sast:
  stage: security
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b . "v${TRIVY_VERSION}"
    - ./trivy fs . --format sarif --output gl-sast-report.sarif || true
    - test -f gl-sast-report.sarif || printf '%s\n' '{"version":"2.1.0","runs":[]}' > gl-sast-report.sarif
  artifacts:
    paths:
      - gl-sast-report.sarif
    reports:
      sast: gl-sast-report.sarif
    expire_in: 1 week
  allow_failure: true

container_scanning:
  stage: security
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b . "v${TRIVY_VERSION}"
    - ./trivy fs . --format json --output gl-container-scanning-report.json || true
    - test -f gl-container-scanning-report.json || echo '{"Results":[]}' > gl-container-scanning-report.json
  artifacts:
    paths:
      - gl-container-scanning-report.json
    reports:
      container_scanning: gl-container-scanning-report.json
    expire_in: 1 week
  allow_failure: true

dockerfile_scan:
  stage: security
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - ARCH="$(uname -m)"
    - |
      if [ "$ARCH" = "aarch64" ]; then
        HADOLINT_URL="https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-arm64"
      else
        HADOLINT_URL="https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64"
      fi
    - curl -sSL "$HADOLINT_URL" -o hadolint
    - chmod +x hadolint
    - ./hadolint Dockerfile -f json > hadolint-report.json || true
    - test -f hadolint-report.json || echo "[]" > hadolint-report.json
  artifacts:
    paths:
      - hadolint-report.json
    expire_in: 1 week
  allow_failure: true

iac_scanning:
  stage: security
  image: python:${PYTHON_VERSION}
  script:
    - pip install checkov || true
    - checkov -d . -o json > checkov-report.json || true
    - test -f checkov-report.json || echo '{"results":{"failed_checks":[],"passed_checks":[],"skipped_checks":[]}}' > checkov-report.json
  artifacts:
    paths:
      - checkov-report.json
    expire_in: 1 week
  allow_failure: true

security_review:
  stage: review
  image: python:${PYTHON_VERSION}
  needs:
    - dependency_scan
    - secret_detection
    - sast
    - container_scanning
    - dockerfile_scan
    - iac_scanning
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_MERGE_REQUEST_IID'
  before_script:
    - apt-get update && apt-get install -y git >/dev/null 2>&1 || true
  script:
    - |
      if [ ! -d .security-tools ]; then
        git clone "http://oauth2:${GITLAB_API_TOKEN}@host.docker.internal:8088/${SECURITY_TOOLS_PROJECT_PATH}.git" .security-tools
        cd .security-tools
        git checkout "${SECURITY_TOOLS_REF}"
        cd ..
      fi
    - python -m pip install -r .security-tools/requirements.txt
    - python .security-tools/cli/run_security_review.py
  allow_failure: false
