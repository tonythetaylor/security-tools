include:
  - project: "root/security-tools"
    ref: "main"
    file: "/templates/security-scans.yml"
    
security_review:
  stage: review
  image: python:${PYTHON_VERSION}
  needs:
    - job: dependency_scan
      optional: true
      artifacts: true
    - job: secret_detection
      optional: true
      artifacts: true
    - job: sast
      optional: true
      artifacts: true
    - job: container_scanning
      optional: true
      artifacts: true
    - job: dockerfile_scan
      optional: true
      artifacts: true
    - job: iac_scanning
      optional: true
      artifacts: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_IID'
  before_script:
    - apt-get update && apt-get install -y git >/dev/null 2>&1 || true
  script:
    - |
      if [ ! -d .security-tools ]; then
        git clone "http://oauth2:${GITLAB_API_TOKEN}@host.docker.internal:8088/${SECURITY_TOOLS_PROJECT_PATH}.git" .security-tools
        cd .security-tools
        git checkout "${SECURITY_TOOLS_REF}"
        cd ..
      fi
    - python -m pip install ./.security-tools
    - python -m security_tools.cli
  allow_failure: false