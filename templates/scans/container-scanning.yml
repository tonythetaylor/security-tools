include:
  - local: "/templates/base/security-rules.yml"

container_scanning:
  extends: .security_base
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b . "v${TRIVY_VERSION}"
    - ./trivy fs . --format json --output gl-container-scanning-report.json || true
    - test -f gl-container-scanning-report.json || echo '{"Results":[]}' > gl-container-scanning-report.json
  artifacts:
    when: always
    paths:
      - gl-container-scanning-report.json
    reports:
      container_scanning: gl-container-scanning-report.json
    expire_in: 1 week