include:
  - local: "/templates/base/security-rules.yml"

secret_detection:
  extends: .security_base
  image: alpine:latest
  script:
    - apk add --no-cache curl tar
    - ARCH="$(uname -m)"
    - |
      if [ "$ARCH" = "aarch64" ]; then
        GITLEAKS_ARCH="arm64"
      else
        GITLEAKS_ARCH="x64"
      fi
    - curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_${GITLEAKS_ARCH}.tar.gz" -o gitleaks.tar.gz
    - tar -xzf gitleaks.tar.gz
    - chmod +x gitleaks
    - ./gitleaks detect --source . --report-format json --report-path gl-secret-detection-report.json || true
    - test -f gl-secret-detection-report.json || echo "[]" > gl-secret-detection-report.json
  artifacts:
    when: always
    paths:
      - gl-secret-detection-report.json
    reports:
      secret_detection: gl-secret-detection-report.json
    expire_in: 1 week