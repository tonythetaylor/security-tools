include:
  - local: "/templates/base/security-rules.yml"

sast:
  extends: .security_base
  image: alpine:latest
  script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b . "v${TRIVY_VERSION}"
    - ./trivy fs . --format sarif --output gl-sast-report.sarif || true
    - test -f gl-sast-report.sarif || printf '%s\n' '{"version":"2.1.0","runs":[]}' > gl-sast-report.sarif
  artifacts:
    when: always
    paths:
      - gl-sast-report.sarif
    reports:
      sast: gl-sast-report.sarif
    expire_in: 1 week