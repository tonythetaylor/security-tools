include:
  - local: "/templates/base/security-rules.yml"

container_runtime_verify:
  extends: .security_base
  image: docker:27-cli
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    RUNTIME_IMAGE_TAG: "$CI_PROJECT_PATH_SLUG:$CI_COMMIT_SHA"
    RUNTIME_VERIFY_STARTUP_TIMEOUT: "45"
  before_script:
    - apk add --no-cache python3 py3-pip git curl bash
    - |
      if [ ! -d .security-tools ]; then
        CLONE_URL="http://gitlab-ci-token:${CI_JOB_TOKEN}@host.docker.internal:8088/${SECURITY_TOOLS_PROJECT_PATH}.git"
        git clone --depth 1 --branch "${SECURITY_TOOLS_REF:-main}" "$CLONE_URL" .security-tools
      fi
    - python3 -m pip install ./.security-tools
  script:
    - |
      python3 -m security_tools.runtime.cli \
        --image "${RUNTIME_IMAGE_TAG}" \
        --startup-timeout "${RUNTIME_VERIFY_STARTUP_TIMEOUT}" \
        --output-json runtime-report.json \
        --output-md runtime-summary.md
  artifacts:
    when: always
    paths:
      - runtime-report.json
      - runtime-summary.md
    expire_in: 1 week