include:
  - local: "/templates/base/security-rules.yml"

.control_plane_setup:
  before_script:
    - python --version
    - apt-get update && apt-get install -y git >/dev/null 2>&1 || true
    - |
      CLONE_URL="http://gitlab-ci-token:${CI_JOB_TOKEN}@host.docker.internal:8088/${SECURITY_TOOLS_PROJECT_PATH}.git"

      if [ ! -d .security-tools ]; then
        git clone --depth 1 \
          --branch "${SECURITY_TOOLS_REF:-main}" \
          "$CLONE_URL" \
          .security-tools
      fi

      python -m pip install ./.security-tools

control_plane_evaluate:
  extends: .security_rule_template
  stage: promote
  image: python:${PYTHON_VERSION}
  before_script:
    - !reference [.control_plane_setup, before_script]
  needs:
    - job: build
      optional: true
      artifacts: true
    - job: security_review
      optional: true
      artifacts: true
  script:
    - test -n "$TEAM"
    - test -n "$ARTIFACT_TYPE"
    - test -n "$SERVICE_NAME"
    - test -n "$ARTIFACT_DIGEST"
    - test -n "$SOURCE_ENV"
    - test -n "$TARGET_ENV"
    - control-plane-evaluate \
        --team "$TEAM" \
        --artifact-type "$ARTIFACT_TYPE" \
        --name "$SERVICE_NAME" \
        --digest "$ARTIFACT_DIGEST" \
        --source-env "$SOURCE_ENV" \
        --target-env "$TARGET_ENV" \
        --requested-by "${GITLAB_USER_LOGIN:-ci}" \
        --sbom-present \
        --runtime-verification-passed
  artifacts:
    when: always
    paths:
      - data/control_plane_state/
      - data/evidence/
    expire_in: 1 week

control_plane_promote:
  extends: .security_rule_template
  stage: promote
  image: python:${PYTHON_VERSION}
  before_script:
    - !reference [.control_plane_setup, before_script]
  needs:
    - job: build
      optional: true
      artifacts: true
    - job: control_plane_evaluate
      optional: false
      artifacts: true
  script:
    - test -n "$TEAM"
    - test -n "$ARTIFACT_TYPE"
    - test -n "$SERVICE_NAME"
    - test -n "$ARTIFACT_DIGEST"
    - test -n "$SOURCE_ENV"
    - test -n "$TARGET_ENV"
    - test -n "$PROMOTION_TARGET_REPO"
    - test -n "$PROMOTION_TARGET_TAG"
    - control-plane-promote \
        --team "$TEAM" \
        --artifact-type "$ARTIFACT_TYPE" \
        --name "$SERVICE_NAME" \
        --digest "$ARTIFACT_DIGEST" \
        --source-env "$SOURCE_ENV" \
        --target-env "$TARGET_ENV" \
        --requested-by "${GITLAB_USER_LOGIN:-ci}" \
        --sbom-present \
        --runtime-verification-passed \
        --target-repo "$PROMOTION_TARGET_REPO" \
        --target-tag "$PROMOTION_TARGET_TAG" \
        --dry-run
  artifacts:
    when: always
    paths:
      - data/control_plane_state/
      - data/evidence/
    expire_in: 1 week

control_plane_record_deployment:
  extends: .security_rule_template
  stage: verify
  image: python:${PYTHON_VERSION}
  before_script:
    - !reference [.control_plane_setup, before_script]
  needs:
    - job: build
      optional: true
      artifacts: true
    - job: control_plane_promote
      optional: false
      artifacts: true
  script:
    - test -n "$ARTIFACT_DIGEST"
    - test -n "$TARGET_ENV"
    - test -n "$DEPLOY_MANIFEST_HASH"
    - test -n "$RUNTIME_CONFIG_REF_1"
    - test -n "$RUNTIME_CONFIG_REF_2"
    - control-plane-record-deployment \
        --artifact-digest "$ARTIFACT_DIGEST" \
        --environment "$TARGET_ENV" \
        --deployed-by "${GITLAB_USER_LOGIN:-ci}" \
        --manifest-hash "$DEPLOY_MANIFEST_HASH" \
        --runtime-verification-verdict PASS \
        --config-ref "$RUNTIME_CONFIG_REF_1" \
        --config-ref "$RUNTIME_CONFIG_REF_2" \
        --env-var "APP_ENV=$TARGET_ENV"
  artifacts:
    when: always
    paths:
      - data/control_plane_state/
    expire_in: 1 week

control_plane_check_drift:
  extends: .security_rule_template
  stage: verify
  image: python:${PYTHON_VERSION}
  before_script:
    - !reference [.control_plane_setup, before_script]
  needs:
    - job: build
      optional: true
      artifacts: true
    - job: control_plane_record_deployment
      optional: false
      artifacts: true
  script:
    - test -n "$ARTIFACT_DIGEST"
    - test -n "$TARGET_ENV"
    - test -n "$DEPLOY_MANIFEST_HASH"
    - test -n "$RUNTIME_CONFIG_REF_1"
    - test -n "$RUNTIME_CONFIG_REF_2"
    - control-plane-check-drift \
        --approved-environment "$TARGET_ENV" \
        --approved-artifact-digest "$ARTIFACT_DIGEST" \
        --approved-manifest-hash "$DEPLOY_MANIFEST_HASH" \
        --approved-config-ref "$RUNTIME_CONFIG_REF_1" \
        --approved-config-ref "$RUNTIME_CONFIG_REF_2" \
        --approved-env-var "APP_ENV=$TARGET_ENV" \
        --deployed-environment "$TARGET_ENV" \
        --deployed-artifact-digest "$ARTIFACT_DIGEST" \
        --deployed-manifest-hash "$DEPLOY_MANIFEST_HASH" \
        --deployed-config-ref "$RUNTIME_CONFIG_REF_1" \
        --deployed-config-ref "$RUNTIME_CONFIG_REF_2" \
        --deployed-env-var "APP_ENV=$TARGET_ENV"
  artifacts:
    when: always
    paths:
      - data/control_plane_state/
    expire_in: 1 week